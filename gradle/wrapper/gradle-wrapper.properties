# ============================================================
# Gradle Wrapper 설정 파일
# ============================================================
# 이 파일의 역할:
#   "이 프로젝트는 어떤 버전의 Gradle로 빌드할지"를 지정하는 파일
#
# 왜 필요한가?
#   팀원 A는 Gradle 8.10, B는 8.14가 설치되어 있으면
#   같은 코드인데 빌드 결과가 달라질 수 있음
#   → 이 파일에 버전을 고정해두면, 누가 빌드하든 동일한 Gradle 버전이 사용됨
#
# 어떻게 동작하는가?
#   ./gradlew build 실행 시:
#   1) gradlew 스크립트가 이 파일을 읽음
#   2) 지정된 버전의 Gradle이 내 PC에 없으면 → 자동 다운로드
#   3) 이미 있으면 → 바로 그 버전으로 빌드 실행
#
# IntelliJ에서는?
#   프로젝트를 열 때 이 파일을 자동으로 읽어서
#   해당 Gradle 버전을 다운받고, 그걸로 빌드함
#   (Settings → Build Tools → Gradle 에서 "Gradle Wrapper" 선택되어 있으면 적용됨)
# ============================================================

# 📂 다운로드한 Gradle 배포판의 기본 저장 위치
# → GRADLE_USER_HOME은 보통 ~/.gradle (사용자 홈 디렉토리 아래 .gradle 폴더)
# → 여기가 Gradle이 다운받은 파일들을 저장하는 루트 경로
distributionBase=GRADLE_USER_HOME

# 📂 Gradle 배포판이 저장될 하위 폴더 경로
# → 최종 경로 예시: ~/.gradle/wrapper/dists/gradle-8.14.4-bin/xxxx/
distributionPath=wrapper/dists

# 🌐 Gradle 배포판을 다운로드할 URL (핵심 설정!)
# → 이 URL이 "이 프로젝트는 Gradle 8.14.4를 사용한다"를 결정함
# → ./gradlew 실행 시, 이 URL에서 Gradle을 다운받아 로컬에 캐시함
# → 한번 다운로드하면 캐시되므로, 매번 다운받지 않음
#
# 📌 버전 변경 방법 (2가지):
#   방법 1) 이 파일의 URL을 직접 수정
#   방법 2) 터미널에서: ./gradlew wrapper --gradle-version=8.14.4
#
# 📌 -bin vs -all 차이:
#   gradle-8.14.4-bin.zip → 실행에 필요한 바이너리만 포함 (가볍고 빠름, 보통 이걸 씀)
#   gradle-8.14.4-all.zip → 소스코드 + 문서까지 포함 (IntelliJ 자동완성에 도움, 용량 큼)
distributionUrl=https\://services.gradle.org/distributions/gradle-8.14.4-bin.zip

# ⏱ Gradle 다운로드 시 네트워크 타임아웃 (밀리초 단위)
# → 10000ms = 10초. 10초 안에 응답이 없으면 다운로드 실패 처리
# → 네트워크가 느린 환경에서는 이 값을 늘릴 수 있음
networkTimeout=10000

# 🔒 다운로드 URL의 유효성을 검증할지 여부
# → true: Gradle이 URL 형식이 올바른지 체크하고, 위변조 가능성을 검사함
# → 보안을 위해 true 유지 권장
validateDistributionUrl=true

# 📂 다운로드한 zip 파일의 기본 저장 위치
# → distributionBase와 동일하게 GRADLE_USER_HOME 사용
zipStoreBase=GRADLE_USER_HOME

# 📂 zip 파일이 저장될 하위 폴더 경로
# → 최종 경로 예시: ~/.gradle/wrapper/dists/gradle-8.14.4-bin.zip
zipStorePath=wrapper/dists