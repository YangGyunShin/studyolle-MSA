server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8090"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # 공개 API - account-service (JWT 검증 없이 통과)
        - id: account-service-public
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/auth/**

        # 인증 필요 - account-service 보호 API
        - id: account-service-private
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/accounts/**
          filters:
            - JwtAuthenticationFilter

        # frontend-service 페이지 라우팅 (JWT 검증 없이 통과)
        # 브라우저가 이메일 인증 링크를 클릭하면 api-gateway(8080)로 들어온다.
        # api-gateway가 이 경로들을 frontend-service(8090)로 전달한다.
        # frontend-service의 HTML 페이지가 내려진 뒤 JS가 /api/** 로 실제 API를 호출한다.
        - id: frontend-service-pages
          uri: lb://FRONTEND-SERVICE
          predicates:
            - Path=/check-email-token,/check-email,/sign-up,/login,/email-login

        # 추후 추가
        # - id: study-service
        #   uri: lb://STUDY-SERVICE
        #   predicates:
        #     - Path=/api/studies/**
        #   filters:
        #     - JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
