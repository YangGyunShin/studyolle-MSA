server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8090"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # 공개 API - account-service (JWT 검증 없이 통과)
        - id: account-service-public
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/auth/**

        # 인증 필요 - account-service 보호 API
        - id: account-service-private
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/accounts/**
          filters:
            - JwtAuthenticationFilter

        # frontend-service - 모든 페이지와 정적 리소스를 포괄하는 단일 라우트
        # /css/**, /js/**, /images/** 등 정적 파일도 frontend-service가 서빙한다.
        # Path=/** 로 설정하면 위의 /api/** 라우트와 충돌하므로
        # 반드시 api 라우트들을 먼저 선언해야 한다.
        # Spring Cloud Gateway는 선언 순서대로 매칭하므로
        # /api/auth/**, /api/accounts/** 가 먼저 매칭된 후
        # 나머지 요청이 frontend-service로 간다.
        - id: frontend-service
          uri: lb://FRONTEND-SERVICE
          predicates:
            - Path=/**
          filters:
            - OptionalJwtFilter

        # 추후 추가
        # - id: study-service
        #   uri: lb://STUDY-SERVICE
        #   predicates:
        #     - Path=/api/studies/**
        #   filters:
        #     - JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
