server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8080"
              - "http://localhost:8090"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # 내부 API 외부 접근 전면 차단 (가장 먼저 선언)
        - id: block-internal
          uri: no://op
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=403

        # 공개 API - account-service (JWT 검증 없이 통과)
        - id: account-service-public
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/auth/**

        # 인증 필요 - account-service 보호 API
        - id: account-service-private
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/accounts/**
          filters:
            - JwtAuthenticationFilter

        # event-service (study-service보다 먼저 선언 - 더 구체적인 경로)
        - id: event-service
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/studies/*/events/**
          filters:
            - JwtAuthenticationFilter

        # study-service
        - id: study-service
          uri: lb://STUDY-SERVICE
          predicates:
            - Path=/api/studies/**
          filters:
            - JwtAuthenticationFilter

        # frontend-service - 모든 페이지와 정적 리소스를 포괄하는 단일 라우트
        # Spring Cloud Gateway는 선언 순서대로 매칭하므로
        # 반드시 모든 /api/** 라우트 및 /internal/** 차단 이후에 선언해야 한다.
        - id: frontend-service
          uri: lb://FRONTEND-SERVICE
          predicates:
            - Path=/**
          filters:
            - OptionalJwtFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
