<!DOCTYPE html>
<!--
    notifications.html  (MSA 버전)

    [페이지 역할]
    로그인 사용자의 읽지 않은 알림 목록을 표시한다.
    각 알림 카드는 클릭 시 해당 링크로 이동하고, 동시에 읽음 처리된다.
    "전체 읽음" 버튼으로 한 번에 모든 알림을 읽음 처리할 수 있다.

    [데이터 흐름]
    1. 페이지 진입 시 JS 가 fetch(GET /api/notifications) 호출
       → api-gateway 가 JWT 검증 → notification-service 로 라우팅
       → notification-service 가 PostgreSQL 에서 unread 목록 반환
    2. 알림 카드 클릭 → fetch(PATCH /api/notifications/{id}) → 링크로 이동
       (notification-service 가 PostgreSQL UPDATE + Redis 카운터 -1)
    3. "전체 읽음" 클릭 → fetch(PATCH /api/notifications) → 페이지 새로고침
       (notification-service 가 PostgreSQL 벌크 UPDATE + Redis 카운터 0)

    [필요한 model 속성]
    - apiBase                 : String (API Gateway URL)
    - account                 : AccountSummaryDto (nav 바 닉네임)
    - unreadNotificationCount : Long (nav 바 🔔 배지) — GlobalModelAttributes 자동 주입
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head('알림')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-sm-12">

            <!-- 페이지 헤더 -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h3 class="fw-bold mb-1" style="color: #2c2843;">
                        <i class="bi bi-bell-fill me-2" style="color: #8e85b0;"></i>알림
                    </h3>
                    <p class="text-muted small mb-0">
                        새로운 소식을 확인해 보세요
                    </p>
                </div>
                <!--
                    "전체 읽음" 버튼.
                    알림이 1건 이상 있을 때만 활성화된다.
                    JS 가 fetch 후 페이지 새로고침해 nav 배지도 같이 업데이트된다.
                -->
                <button id="markAllBtn" type="button"
                        class="btn btn-sm rounded-pill px-3"
                        style="border: 1.5px solid #8e85b0; color: #8e85b0; font-size: 0.85rem;"
                        disabled>
                    <i class="fa-solid fa-check-double me-1"></i>전체 읽음
                </button>
            </div>

            <!--
                로딩 스피너.
                fetch 응답 도착 전까지 잠깐 표시. 응답 후 숨김.
            -->
            <div id="loadingBox" class="text-center py-5">
                <div class="spinner-border" style="color: #8e85b0;" role="status">
                    <span class="visually-hidden">로딩 중...</span>
                </div>
                <p class="text-muted small mt-2 mb-0">알림을 불러오는 중...</p>
            </div>

            <!--
                빈 상태 (알림 0건).
                응답이 빈 배열일 때 표시.
            -->
            <div id="emptyBox" class="card border-0 shadow-sm rounded-3 text-center py-5"
                 style="display: none;">
                <div class="card-body">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                         style="width: 72px; height: 72px; background: #f0eff5;">
                        <i class="bi bi-bell-slash" style="font-size: 1.8rem; color: #8e85b0;"></i>
                    </div>
                    <h6 class="fw-bold mb-1" style="color: #2c2843;">새로운 알림이 없습니다</h6>
                    <p class="text-muted small mb-0">스터디 활동이나 모임 신청 결과가 있으면 여기에 표시됩니다.</p>
                </div>
            </div>

            <!--
                알림 카드 목록.
                JS 가 동적으로 채운다. 각 카드는 클릭 가능한 영역.
            -->
            <div id="notificationList" class="d-flex flex-column gap-2"></div>

            <!-- 일반 에러 박스 -->
            <div id="errorBox" class="alert alert-danger border-0 rounded-3 mt-3"
                 role="alert" style="display: none;">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <span id="errorMsg"></span>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<script th:inline="javascript">
    // ---------------------------------------------------------------
    // API_BASE 는 fragments.html footer 에서 var 로 이미 선언되어 있음.
    // 여기서는 그대로 재사용한다.
    // ---------------------------------------------------------------

    // ---------------------------------------------------------------
    // 알림 타입별 아이콘 / 색상 매핑
    // notification-service 의 NotificationType enum 과 일치해야 한다.
    //   STUDY      : 스터디 이벤트 (생성, 공개, 모집)
    //   ENROLLMENT : 모임 신청 이벤트 (수락, 거절, 출석)
    // ---------------------------------------------------------------
    const TYPE_META = {
        STUDY: {
            icon: 'fa-solid fa-book-open',
            bgColor: '#e8e6f0',
            iconColor: '#8e85b0',
            label: '스터디'
        },
        ENROLLMENT: {
            icon: 'fa-solid fa-calendar-check',
            bgColor: '#e6f0e8',
            iconColor: '#7fac8e',
            label: '모임'
        }
    };

    // ---------------------------------------------------------------
    // 페이지 진입 시 알림 목록을 fetch
    // ---------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', function () {
        loadNotifications();

        document.getElementById('markAllBtn')
                .addEventListener('click', markAllAsRead);
    });

    /**
     * GET /api/notifications
     * 응답: { success: true, data: [ { id, message, link, type, checked, createdAt }, ... ] }
     */
    async function loadNotifications() {
        try {
            const res = await fetch(API_BASE + '/api/notifications', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                }
            });

            if (!res.ok) {
                throw new Error('서버 응답 오류: ' + res.status);
            }

            const result = await res.json();
            const notifications = result.data || [];

            renderNotifications(notifications);

        } catch (e) {
            console.error('알림 로드 실패:', e);
            showError('알림을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
        } finally {
            document.getElementById('loadingBox').style.display = 'none';
        }
    }

    /**
     * 알림 배열을 받아 카드 DOM 을 생성한다.
     *
     * "전체 읽음" 버튼 상태:
     *   - 안 읽은 알림이 1건 이상 있을 때만 활성화
     *   - 모두 읽었거나 목록이 비어 있으면 비활성화
     */
    function renderNotifications(notifications) {
        const listEl = document.getElementById('notificationList');
        const emptyEl = document.getElementById('emptyBox');
        const markAllBtn = document.getElementById('markAllBtn');

        listEl.innerHTML = '';

        if (notifications.length === 0) {
            emptyEl.style.display = 'block';
            markAllBtn.disabled = true;
            return;
        }

        emptyEl.style.display = 'none';

        // 안 읽은 알림이 1건 이상 있을 때만 "전체 읽음" 활성화
        const hasUnread = notifications.some(function (n) { return !n.checked; });
        markAllBtn.disabled = !hasUnread;

        notifications.forEach(function (n) {
            const card = createNotificationCard(n);
            listEl.appendChild(card);
        });
    }

    /**
     * 알림 카드 1개의 DOM 을 생성한다.
     *
     * [읽음/안 읽음 시각 구분]
     * - 안 읽은 카드: 진한 색 + 왼쪽 세로 선 + 파란 점 + 클릭 가능
     * - 읽은 카드: 흐릿한 색 (opacity 0.6) + 클릭 가능 (링크 이동만)
     *
     * 읽은 카드를 클릭해도 이미 checked=true 이므로 PATCH 호출은 생략한다.
     */
    function createNotificationCard(n) {
        const meta = TYPE_META[n.type] || TYPE_META.STUDY;
        const isRead = n.checked;

        const card = document.createElement('div');
        card.className = 'card border-0 shadow-sm rounded-3 position-relative';
        card.style.cursor = 'pointer';
        card.style.transition = 'transform 0.15s, box-shadow 0.15s, opacity 0.15s';

        // 읽은 알림은 흐릿하게 표시
        if (isRead) {
            card.style.opacity = '0.6';
            card.style.background = '#fafafa';
        }

        // hover 효과
        card.addEventListener('mouseenter', function () {
            card.style.transform = 'translateY(-2px)';
            card.style.boxShadow = '0 0.5rem 1rem rgba(0,0,0,0.1)';
            if (isRead) card.style.opacity = '0.8';
        });
        card.addEventListener('mouseleave', function () {
            card.style.transform = 'translateY(0)';
            card.style.boxShadow = '';
            if (isRead) card.style.opacity = '0.6';
        });

        // 안 읽은 알림은 왼쪽에 두꺼운 세로 선 추가 (눈에 잘 띄다)
        const unreadBar = isRead
            ? ''
            : '<div class="position-absolute start-0 top-0 bottom-0 rounded-start-3" ' +
              'style="width: 4px; background: #8e85b0;"></div>';

        // 안 읽은 알림 우측 상단에 파란 점 표시
        const unreadDot = isRead
            ? ''
            : '<span class="position-absolute rounded-circle" ' +
              'style="width: 8px; height: 8px; background: #8e85b0; top: 12px; right: 12px;"></span>';

        card.innerHTML = `
            ${unreadBar}
            ${unreadDot}
            <div class="card-body p-3 ps-4 d-flex align-items-start gap-3">
                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width: 44px; height: 44px; background: ${meta.bgColor};">
                    <i class="${meta.icon}" style="color: ${meta.iconColor}; font-size: 1rem;"></i>
                </div>
                <div class="flex-grow-1 min-w-0">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge rounded-pill"
                              style="background: ${meta.bgColor}; color: ${meta.iconColor}; font-size: 0.7rem;">
                            ${meta.label}
                        </span>
                        <span class="text-muted small" style="font-size: 0.75rem;">
                            ${formatRelativeTime(n.createdAt)}
                        </span>
                        ${isRead
                            ? '<span class="text-muted small" style="font-size: 0.7rem;">· 읽음</span>'
                            : ''}
                    </div>
                    <p class="mb-0" style="color: #2c2843; font-size: 0.9rem; ${isRead ? '' : 'font-weight: 600;'}">
                        ${escapeHtml(n.message)}
                    </p>
                </div>
                <i class="fa-solid fa-chevron-right text-muted align-self-center"
                   style="font-size: 0.75rem;"></i>
            </div>
        `;

        // 카드 클릭 처리
        card.addEventListener('click', function () {
            handleNotificationClick(n.id, n.link, isRead);
        });

        return card;
    }

    /**
     * 알림 카드 클릭 시 호출.
     *
     * [이미 읽은 알림]
     *   PATCH 호출 없이 링크만 이동.
     *
     * [안 읽은 알림]
     *   1. PATCH /api/notifications/{id} 로 읽음 처리 (await 로 완료 대기)
     *   2. 완료 후 링크로 이동
     *
     * [왜 await 가 필요한가]
     * fetch() 는 비동기이므로 await 없이 바로 window.location.href 로 이동하면
     * 요청이 네트워크에 나가기도 전에 페이지 이동으로 인해 취소될 수 있다.
     * 읽음 처리가 확실히 반영되도록 수십 ms 기다린다.
     */
    async function handleNotificationClick(id, link, isAlreadyRead) {
        // 이미 읽은 알림은 서버 호출 없이 바로 이동
        if (isAlreadyRead) {
            window.location.href = link;
            return;
        }

        try {
            await fetch(API_BASE + '/api/notifications/' + id, {
                method: 'PATCH',
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                }
            });
        } catch (e) {
            console.warn('읽음 처리 실패:', e);
            // 실패해도 링크 이동은 진행 (사용자 경험 우선)
        }
        window.location.href = link;
    }

    /**
     * "전체 읽음" 버튼 클릭 시 호출.
     * PATCH /api/notifications → 페이지 새로고침으로 모든 카드가 읽은 상태로 재렌더링.
     */
    async function markAllAsRead() {
        const btn = document.getElementById('markAllBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>처리 중...';

        try {
            const res = await fetch(API_BASE + '/api/notifications', {
                method: 'PATCH',
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                }
            });

            if (!res.ok) {
                throw new Error('서버 응답 오류: ' + res.status);
            }

            // 새로고침: 서버가 모든 카드를 읽은 상태로 반환하고 nav 배지도 0으로 갱신됨
            window.location.reload();

        } catch (e) {
            console.error('전체 읽음 처리 실패:', e);
            showError('전체 읽음 처리에 실패했습니다.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check-double me-1"></i>전체 읽음';
        }
    }

    // ---------------------------------------------------------------
    // 헬퍼 함수
    // ---------------------------------------------------------------

    /**
     * createdAt(ISO String) 을 "방금 전", "5분 전", "2시간 전", "3일 전" 형식으로 변환.
     * 7일 이상은 날짜로 표시.
     */
    function formatRelativeTime(isoString) {
        if (!isoString) return '';
        const now = new Date();
        const created = new Date(isoString);
        const diffSec = Math.floor((now - created) / 1000);

        if (diffSec < 60) return '방금 전';
        if (diffSec < 3600) return Math.floor(diffSec / 60) + '분 전';
        if (diffSec < 86400) return Math.floor(diffSec / 3600) + '시간 전';
        if (diffSec < 604800) return Math.floor(diffSec / 86400) + '일 전';

        return created.getFullYear() + '.' +
               String(created.getMonth() + 1).padStart(2, '0') + '.' +
               String(created.getDate()).padStart(2, '0');
    }

    /**
     * XSS 방지: 사용자 입력 텍스트를 HTML 에 삽입하기 전에 이스케이프.
     * notification.message 는 서버가 생성하지만 안전을 위해 항상 이스케이프한다.
     */
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showError(message) {
        document.getElementById('errorMsg').textContent = message;
        document.getElementById('errorBox').style.display = 'block';
    }
</script>

</body>
</html>
