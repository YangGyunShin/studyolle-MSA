<!DOCTYPE html>
<!--
    event/form.html  (MSA 버전)

    [역할]
    모임 생성 및 수정을 위한 폼 페이지.
    EventPageController 가 isEdit=false 면 생성, true 면 수정 모드로 렌더링한다.

    [인증/권한]
    EventPageController 에서 isManager=false 이면 403 반환 -> 이 페이지는 항상 관리자 전용.

    [데이터 저장 방식]
    - 생성: fetch() POST  /api/studies/{path}/events       (Bearer 토큰)
    - 수정: fetch() PUT   /api/studies/{path}/events/{id}  (Bearer 토큰)
    - api-gateway -> event-service (JWT 검증 후 X-Account-Id 헤더로 전달)

    [필요한 model 속성]
    - study       : StudyPageDataDto
    - account     : AccountSummaryDto
    - event       : EventSummaryDto (수정 시 기본값 바인딩, 생성 시 null)
    - isEdit      : boolean
    - isManager   : boolean  (항상 true — 컨트롤러에서 보장)
    - isMember    : boolean
    - hasPendingRequest : boolean
    - apiBase     : String

    [Summernote]
    description 필드에 Summernote 에디터를 사용한다.
    저장 시 summernote('code') 로 HTML 을 추출해 JSON body 에 포함한다.

    [datetime-local 포맷]
    브라우저의 datetime-local input 은 "yyyy-MM-ddTHH:mm" 형식을 반환한다.
    event-service Jackson 은 이 형식을 LocalDateTime 으로 자동 파싱한다.
    Thymeleaf 에서 기존 값을 바인딩할 때는 #temporals.format() 으로 동일 포맷 출력.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head(${isEdit ? '모임 수정' : '모임 만들기'})}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>
<div th:replace="~{fragments.html :: study-info}"></div>

<!-- Summernote CSS -->
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-bs5.min.css" rel="stylesheet">

<!-- 본문 -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- 페이지 헤더 -->
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{'/study/' + ${study.path}}"
                   class="btn btn-sm btn-outline-secondary rounded-pill me-3 px-3">
                    <i class="fa-solid fa-arrow-left me-1"></i>스터디로
                </a>
                <div>
                    <h4 class="fw-bold mb-0" style="color: #2c2843;">
                        <i class="fa-solid fa-calendar-plus me-2" style="color: #8e85b0;"></i>
                        <span th:text="${isEdit ? '모임 수정' : '새 모임 만들기'}">모임</span>
                    </h4>
                    <small class="text-muted" th:text="${study.title}">스터디명</small>
                </div>
            </div>

            <!-- 폼 카드 -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">

                    <!-- 모임 이름 -->
                    <div class="mb-4">
                        <label for="title" class="form-label fw-semibold"
                               style="color: #2c2843; font-size: 0.9rem;">
                            <i class="fa-solid fa-pen me-1" style="color: #8e85b0;"></i>
                            모임 이름 <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="title" class="form-control rounded-3"
                               placeholder="모임 이름을 입력하세요"
                               maxlength="50"
                               th:value="${event?.title}"
                               style="border-color: #d0ccdf; font-size: 0.9rem;">
                        <div class="form-text">최대 50자</div>
                    </div>

                    <!-- 모임 종류 -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block"
                               style="color: #2c2843; font-size: 0.9rem;">
                            <i class="fa-solid fa-sliders me-1" style="color: #8e85b0;"></i>
                            모임 종류 <span class="text-danger">*</span>
                        </label>
                        <div class="d-flex gap-3 flex-wrap">
                            <!--
                                FCFS: 선착순 — limitOfEnrollments 까지 자동 수락
                                CONFIRMATIVE: 관리자 확인 — 관리자가 수동으로 수락/거절
                            -->
                            <div class="form-check d-flex align-items-center p-0">
                                <input class="form-check-input visually-hidden" type="radio"
                                       name="eventType" id="typeFCFS" value="FCFS"
                                       th:checked="${event == null || event.eventType == 'FCFS'}">
                                <label class="event-type-label rounded-3 px-4 py-2 me-0"
                                       for="typeFCFS"
                                       style="cursor: pointer; border: 2px solid #d0ccdf;
                                              font-size: 0.85rem; color: #666; transition: all 0.15s;">
                                    <i class="fa-solid fa-bolt me-1" style="color: #bfa473;"></i>선착순
                                </label>
                            </div>
                            <div class="form-check d-flex align-items-center p-0">
                                <input class="form-check-input visually-hidden" type="radio"
                                       name="eventType" id="typeCONFIRMATIVE" value="CONFIRMATIVE"
                                       th:checked="${event?.eventType == 'CONFIRMATIVE'}">
                                <label class="event-type-label rounded-3 px-4 py-2 me-0"
                                       style="cursor: pointer; border: 2px solid #d0ccdf;
                                              font-size: 0.85rem; color: #666; transition: all 0.15s;"
                                       for="typeCONFIRMATIVE">
                                    <i class="fa-solid fa-user-check me-1" style="color: #8e85b0;"></i>관리자 확인
                                </label>
                            </div>
                        </div>
                        <div class="form-text mt-1">
                            <span id="typeHint">
                                선착순: 신청 순서대로 자동 수락됩니다.
                            </span>
                        </div>
                    </div>

                    <!-- 모집 인원 -->
                    <div class="mb-4">
                        <label for="limitOfEnrollments" class="form-label fw-semibold"
                               style="color: #2c2843; font-size: 0.9rem;">
                            <i class="fa-solid fa-users me-1" style="color: #8e85b0;"></i>
                            모집 인원 <span class="text-danger">*</span>
                        </label>
                        <div class="input-group" style="max-width: 180px;">
                            <input type="number" id="limitOfEnrollments"
                                   class="form-control rounded-start-3 text-center"
                                   min="2" max="500"
                                   th:value="${event?.limitOfEnrollments ?: 2}"
                                   style="border-color: #d0ccdf; font-size: 0.9rem;">
                            <span class="input-group-text bg-white rounded-end-3"
                                  style="border-color: #d0ccdf; font-size: 0.85rem; color: #8e85b0;">명</span>
                        </div>
                        <div class="form-text">최소 2명</div>
                    </div>

                    <!-- 일정 (3개 날짜) -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block"
                               style="color: #2c2843; font-size: 0.9rem;">
                            <i class="fa-solid fa-calendar-days me-1" style="color: #8e85b0;"></i>
                            일정 <span class="text-danger">*</span>
                        </label>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="endEnrollmentDateTime"
                                       class="form-label small text-muted mb-1">모집 마감 일시</label>
                                <input type="datetime-local" id="endEnrollmentDateTime"
                                       class="form-control rounded-3"
                                       style="border-color: #d0ccdf; font-size: 0.85rem;"
                                       th:value="${event?.endEnrollmentDateTime != null
                                                  ? #temporals.format(event.endEnrollmentDateTime, 'yyyy-MM-dd''T''HH:mm')
                                                  : ''}">
                            </div>
                            <div class="col-md-4">
                                <label for="startDateTime"
                                       class="form-label small text-muted mb-1">모임 시작 일시</label>
                                <input type="datetime-local" id="startDateTime"
                                       class="form-control rounded-3"
                                       style="border-color: #d0ccdf; font-size: 0.85rem;"
                                       th:value="${event?.startDateTime != null
                                                  ? #temporals.format(event.startDateTime, 'yyyy-MM-dd''T''HH:mm')
                                                  : ''}">
                            </div>
                            <div class="col-md-4">
                                <label for="endDateTime"
                                       class="form-label small text-muted mb-1">모임 종료 일시</label>
                                <input type="datetime-local" id="endDateTime"
                                       class="form-control rounded-3"
                                       style="border-color: #d0ccdf; font-size: 0.85rem;"
                                       th:value="${event?.endDateTime != null
                                                  ? #temporals.format(event.endDateTime, 'yyyy-MM-dd''T''HH:mm')
                                                  : ''}">
                            </div>
                        </div>
                        <div class="form-text mt-1">
                            모집 마감 → 모임 시작 → 모임 종료 순서여야 합니다.
                        </div>
                    </div>

                    <!-- 모임 소개 (Summernote) -->
                    <div class="mb-5">
                        <label for="description" class="form-label fw-semibold"
                               style="color: #2c2843; font-size: 0.9rem;">
                            <i class="fa-solid fa-file-lines me-1" style="color: #8e85b0;"></i>
                            모임 소개
                        </label>
                        <!--
                            th:utext: 수정 모드에서 Summernote 가 저장한 HTML 을 그대로 주입.
                            Summernote 초기화 시 이 내용이 에디터 본문이 된다.
                        -->
                        <textarea id="description" class="form-control"
                                  style="display: none;"
                                  th:utext="${event?.description}"></textarea>
                    </div>

                    <!-- 유효성 에러 메시지 -->
                    <div id="errorAlert" class="alert alert-danger rounded-3 d-none mb-3" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="errorMsg"></span>
                    </div>

                    <!-- 버튼 -->
                    <div class="d-flex gap-3 justify-content-end">
                        <a th:href="@{'/study/' + ${study.path}}"
                           class="btn btn-outline-secondary rounded-pill px-4"
                           style="font-size: 0.9rem;">취소</a>
                        <button type="button" id="submitBtn"
                                class="btn rounded-pill px-4 text-white"
                                style="background: #8e85b0; border: none; font-size: 0.9rem;"
                                onclick="submitEvent()">
                            <i class="fa-solid fa-floppy-disk me-1"></i>
                            <span th:text="${isEdit ? '수정 완료' : '모임 만들기'}">저장</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<!-- Summernote JS (jQuery 이후에 로드됨 — footer Bootstrap Bundle 이후) -->
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-bs5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/lang/summernote-ko-KR.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const STUDY_PATH = [[${study.path}]];
    const EVENT_ID   = [[${event?.id}]];  // null = 신규 생성
    const IS_EDIT    = [[${isEdit}]];

    // Summernote 초기화
    document.addEventListener('DOMContentLoaded', function () {
        $('#description').summernote({
            lang: 'ko-KR',
            height: 200,
            toolbar: [
                ['style', ['bold', 'italic', 'underline', 'clear']],
                ['para',  ['ul', 'ol', 'paragraph']],
                ['insert', ['link']],
                ['view',  ['fullscreen', 'codeview']]
            ],
            placeholder: '모임에 대해 설명해 주세요 (선택사항)',
            callbacks: {
                onInit: function () {
                    // Summernote 툴바 border 스타일 통일
                    $('.note-toolbar').css('border-color', '#d0ccdf');
                }
            }
        });

        // 모임 종류 라벨 스타일 초기화
        updateTypeLabel();
        document.querySelectorAll('input[name="eventType"]').forEach(function (radio) {
            radio.addEventListener('change', updateTypeLabel);
        });
    });

    // 선택된 모임 종류에 따라 라벨 강조 + 힌트 텍스트 변경
    function updateTypeLabel() {
        var selected = document.querySelector('input[name="eventType"]:checked');
        document.querySelectorAll('.event-type-label').forEach(function (label) {
            label.style.borderColor = '#d0ccdf';
            label.style.background = 'white';
            label.style.color = '#666';
        });
        if (selected) {
            var label = document.querySelector('label[for="' + selected.id + '"]');
            if (label) {
                label.style.borderColor = '#8e85b0';
                label.style.background = '#f5f4fb';
                label.style.color = '#8e85b0';
            }
            document.getElementById('typeHint').textContent =
                selected.value === 'FCFS'
                    ? '선착순: 신청 순서대로 자동 수락됩니다.'
                    : '관리자 확인: 관리자가 신청자를 직접 수락/거절합니다.';
        }
    }

    // 폼 유효성 검사
    function validateForm(data) {
        if (!data.title || data.title.trim().length === 0) {
            return '모임 이름을 입력해 주세요.';
        }
        if (data.title.length > 50) {
            return '모임 이름은 50자 이하여야 합니다.';
        }
        if (!data.limitOfEnrollments || data.limitOfEnrollments < 2) {
            return '모집 인원은 최소 2명 이상이어야 합니다.';
        }
        if (!data.endEnrollmentDateTime) {
            return '모집 마감 일시를 입력해 주세요.';
        }
        if (!data.startDateTime) {
            return '모임 시작 일시를 입력해 주세요.';
        }
        if (!data.endDateTime) {
            return '모임 종료 일시를 입력해 주세요.';
        }
        if (data.endEnrollmentDateTime >= data.startDateTime) {
            return '모집 마감 일시는 모임 시작 전이어야 합니다.';
        }
        if (data.startDateTime >= data.endDateTime) {
            return '모임 시작 일시는 종료 전이어야 합니다.';
        }
        return null;
    }

    // 에러 표시 헬퍼
    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        document.getElementById('errorAlert').classList.remove('d-none');
        document.getElementById('errorAlert').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 제출 메인 함수
    async function submitEvent() {
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;

        var data = {
            title: document.getElementById('title').value.trim(),
            description: $('#description').summernote('code'),
            eventType: document.querySelector('input[name="eventType"]:checked')?.value || 'FCFS',
            limitOfEnrollments: parseInt(document.getElementById('limitOfEnrollments').value, 10),
            endEnrollmentDateTime: document.getElementById('endEnrollmentDateTime').value,
            startDateTime: document.getElementById('startDateTime').value,
            endDateTime: document.getElementById('endDateTime').value
        };

        // 유효성 검사
        var err = validateForm(data);
        if (err) { showError(err); btn.disabled = false; return; }
        document.getElementById('errorAlert').classList.add('d-none');

        // API 호출
        var url    = IS_EDIT
            ? API_BASE + '/api/studies/' + STUDY_PATH + '/events/' + EVENT_ID
            : API_BASE + '/api/studies/' + STUDY_PATH + '/events';
        var method = IS_EDIT ? 'PUT' : 'POST';

        try {
            var res = await fetch(url, {
                method: method,
                headers: authHeaders(),
                body: JSON.stringify(data)
            });

            if (res.ok) {
                var result = await res.json();
                // 생성 응답의 data.id 로 이동, 수정이면 기존 eventId 로 이동
                var savedId = result.data?.id || EVENT_ID;
                window.location.href = '/study/' + STUDY_PATH + '/events/' + savedId;
            } else {
                var errData = await res.json().catch(() => ({}));
                showError(errData.message || '저장 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
                btn.disabled = false;
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
            btn.disabled = false;
            console.error(e);
        }
    }
    /*]]>*/
</script>

</body>
</html>
