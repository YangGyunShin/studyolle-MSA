<!DOCTYPE html>
<!--
    account/check-email-token.html  (MSA 버전)
    [모노리틱 원본: checked-email.html]

    [모노리틱과의 가장 큰 차이 - 렌더링 시점]
    - 모노리틱: 사용자가 이메일 링크를 클릭하면
                /check-email-token?token=UUID&email=xxx 요청이 서버 컨트롤러에 도달.
                컨트롤러가 직접 토큰을 검증하고, 성공이면 ${nickname} 을 모델에 담아
                checked-email.html 을 렌더링. 실패면 ${error} 를 담아 에러 뷰 렌더링.
                즉, 브라우저에 도달하는 HTML 이 이미 성공/실패 상태를 담고 있었다.

    - MSA:      사용자가 이메일 링크를 클릭하면
                frontend-service(:8090)/check-email-token?token=UUID&email=xxx 로 이동.
                AuthPageController 는 토큰 검증 없이 이 HTML 파일만 내려준다.
                페이지가 브라우저에 로드된 직후 JS 가 URL 파라미터를 읽어
                GET /api/auth/check-email-token?token=UUID&email=xxx 를 호출한다.
                API 응답을 받은 뒤에야 성공/실패 카드를 DOM 에 표시한다.
                성공 시: 응답의 JWT 를 localStorage 에 저장 + 성공 카드 + nickname 표시.
                실패 시: 에러 카드 표시.

    [초기 렌더링 상태]
    - 성공 카드(#successCard)와 실패 카드(#errorCard)는 display:none 으로 숨겨둔다.
    - 대신 #loadingCard(로딩 스피너)를 먼저 표시한다.
    - API 응답이 오면 loadingCard 를 숨기고 successCard 또는 errorCard 를 보여준다.

    - 인라인 <style> 블록 제거: 모든 스타일이 glassmorphism.css 섹션 13 에 포함됨.

    [account-service 의 app.host 설정 주의]
    account-service 가 발송하는 인증 이메일 링크의 호스트는
    account-service 의 application.yml 의 app.host 값을 따른다.
    이 값을 http://localhost:8090 (frontend-service 주소) 으로 설정해야
    이메일 링크 클릭 시 이 페이지로 정확히 도달한다.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이메일 인증 - StudyOlle</title>

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- .result-card, .success-icon, .error-icon, .confetti, .btn-home 등
         모두 auth-style.css 섹션 13 에 정의됨 -->
    <link rel="stylesheet" th:href="@{/css/auth-style.css}">
</head>

<body class="glass-page">

    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <a class="page-logo" href="/">
        <span>StudyOlle</span>
    </a>

    <!-- ---------------------------------------------------------------
         로딩 카드
         페이지 최초 진입 시 API 호출이 완료될 때까지 표시한다.
         API 응답이 오면 JS 가 이 카드를 숨기고 성공/실패 카드를 표시한다.
    --------------------------------------------------------------- -->
    <div id="loadingCard" class="result-card">
        <div class="mail-icon" style="animation: none; transform: scale(1); opacity: 1;">
            <i class="fa-solid fa-spinner fa-spin"></i>
        </div>
        <h1 class="result-title" style="animation: none; opacity: 1; transform: none;">
            인증 확인 중...
        </h1>
        <p class="result-subtitle" style="animation: none; opacity: 1; transform: none;">
            잠시만 기다려주세요
        </p>
    </div>

    <!-- ---------------------------------------------------------------
         성공 카드 (초기 숨김)
         [모노리틱과의 차이]
         모노리틱: th:if="${error == null}" 로 서버가 렌더링 시점에 이미 결정.
                   th:text="${nickname}" 으로 닉네임을 서버가 주입.
         MSA:      display:none 으로 숨겨두고, JS 가 API 응답의 nickname 을
                   #successNickname span 에 textContent 로 삽입 후 카드를 표시.
    --------------------------------------------------------------- -->
    <div id="successCard" class="result-card" style="display:none; position: relative; overflow: visible;">
        <!-- 컨페티 파티클 (모노리틱과 동일) -->
        <div class="confetti" style="top: -10px; left: 20%; background: #8e85b0; animation-delay: 0.5s;"></div>
        <div class="confetti" style="top: -10px; left: 40%; background: #a099bd; animation-delay: 0.6s;"></div>
        <div class="confetti" style="top: -10px; left: 60%; background: #bfa473; animation-delay: 0.7s;"></div>
        <div class="confetti" style="top: -10px; left: 80%; background: #7fac8e; animation-delay: 0.8s;"></div>
        <div class="confetti" style="top: -10px; left: 30%; background: #bfa473; animation-delay: 0.9s;"></div>
        <div class="confetti" style="top: -10px; left: 70%; background: #c4917e; animation-delay: 1.0s;"></div>

        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="result-title">이메일 인증 완료!</h1>
        <p class="result-subtitle">
            <!--
                [모노리틱] th:text="${nickname}" → 서버 렌더링.
                [MSA]      JS 가 API 응답의 data.nickname 을 여기에 삽입한다.
            -->
            <strong id="successNickname"></strong>님, 환영합니다<br>
            이제 스터디올래의 모든 기능을 이용할 수 있어요
        </p>
        <a class="btn-home" href="/">
            <i class="fa-solid fa-house"></i> 홈으로 이동
        </a>
    </div>

    <!-- ---------------------------------------------------------------
         실패 카드 (초기 숨김)
         [모노리틱과의 차이]
         모노리틱: th:if="${error}" 로 서버가 결정.
         MSA:      API 가 4xx 를 반환하면 JS 가 이 카드를 표시.
                   재시도 링크로 check-email 페이지를 제공한다.
    --------------------------------------------------------------- -->
    <div id="errorCard" class="result-card error-state" style="display:none;">
        <div class="error-icon">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <h1 class="result-title">인증 실패</h1>
        <p class="result-subtitle">
            이메일 확인 링크가 만료되었거나 올바르지 않습니다.<br>
            새 인증 이메일을 요청해주세요.
        </p>
        <!-- 재발송 페이지로 이동. email 파라미터를 담아서 입력 필드를 미리 채워준다. -->
        <a id="retryLink" class="btn-home" href="/check-email">
            <i class="fa-solid fa-paper-plane"></i> 인증 이메일 다시 받기
        </a>
    </div>

    <!-- API_BASE 주입 -->
    <script th:inline="javascript">
        const API_BASE = [[${apiBase}]];
    </script>

    <script>
        // ---------------------------------------------------------------
        // 이메일 토큰 검증
        //
        // [전체 흐름]
        // 1. URL 파라미터에서 token, email 을 꺼낸다.
        // 2. GET /api/auth/check-email-token?token=...&email=... 를 호출한다.
        // 3. 성공(200):
        //    - 응답의 data.accessToken, data.refreshToken 을 localStorage 에 저장.
        //    - 응답의 data.nickname 을 성공 카드에 삽입.
        //    - 로딩 카드 → 성공 카드로 전환.
        // 4. 실패(400~):
        //    - 로딩 카드 → 실패 카드로 전환.
        //    - 재시도 링크에 email 파라미터를 붙인다.
        //
        // [account-service 응답 구조 - 성공]
        // CommonApiResponse<TokenResponse>:
        //   { data: { accessToken, refreshToken, nickname } }
        //
        // [account-service 응답 구조 - 실패]
        // ErrorResponse:
        //   { errorCode: "INVALID_EMAIL_TOKEN" | ..., message: "..." }
        // ---------------------------------------------------------------

        (async function verifyEmailToken() {
            // URL 파라미터 파싱
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');
            const email  = params.get('email');

            // 파라미터 자체가 없으면 즉시 실패 카드 표시
            if (!token || !email) {
                showError(email);
                return;
            }

            // 재시도 링크에 email 미리 설정
            const retryLink = document.getElementById('retryLink');
            if (email) {
                retryLink.href = '/check-email?email=' + encodeURIComponent(email);
            }

            try {
                const response = await fetch(
                    API_BASE + '/api/auth/check-email-token'
                    + '?token=' + encodeURIComponent(token)
                    + '&email=' + encodeURIComponent(email),
                    { method: 'GET' }
                );

                const result = await response.json();

                if (response.ok) {
                    // ---------------------------------------------------
                    // 인증 성공
                    //
                    // [모노리틱과의 차이]
                    // 모노리틱: 서버가 세션에 인증 정보를 저장하고 홈으로 리다이렉트.
                    //           이 페이지는 그냥 성공 안내 역할만 했다.
                    //
                    // MSA:      이메일 인증 성공 = 첫 로그인과 동일하게 JWT 를 발급받는 것.
                    //           account-service 가 토큰 검증 후 JWT 를 응답으로 돌려준다.
                    //           이를 localStorage 에 저장해 이후 API 호출에 사용한다.
                    // ---------------------------------------------------
                    const data = result.data;

                    localStorage.setItem('accessToken',  data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);

                    // 성공 카드에 닉네임 삽입
                    document.getElementById('successNickname').textContent = data.nickname || '';

                    showSuccess();

                } else {
                    showError(email);
                }

            } catch (e) {
                // 네트워크 오류 등 fetch 자체 실패
                showError(email);
                console.error('이메일 토큰 검증 실패:', e);
            }
        })();

        function showSuccess() {
            document.getElementById('loadingCard').style.display  = 'none';
            document.getElementById('successCard').style.display  = 'block';
            document.getElementById('errorCard').style.display    = 'none';
        }

        function showError(email) {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'none';
            document.getElementById('errorCard').style.display   = 'block';

            // 재시도 링크에 email 파라미터 설정 (email 이 없으면 기본 링크 유지)
            if (email) {
                document.getElementById('retryLink').href =
                    '/check-email?email=' + encodeURIComponent(email);
            }
        }
    </script>

</body>
</html>
