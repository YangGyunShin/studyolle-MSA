<!--
  check-email-token.html

  ====================================================================
  역할: 이메일 인증 링크 클릭 시 도착하는 페이지.
        URL 파라미터의 token, email 로 account-service 에 검증 요청을 보내고
        결과에 따라 성공/실패 화면을 렌더링한다.

  [Phase 8 옵션 B 변경 — JWT 재발급 흐름]
  변경 전: 성공 시 "로그인 페이지로 이동하세요" 안내만 함
  변경 후: account-service 가 새 JWT 를 응답에 실어주므로
          localStorage / 쿠키에 새 토큰을 저장하고 홈으로 자동 이동

  변경 후의 이점:
  - 사용자가 인증 메일 클릭 후 추가로 로그인할 필요가 없음
  - 새 JWT 에는 emailVerified=true 가 담겨있어 즉시 모든 기능 사용 가능
  - 기존 JWT (emailVerified=false) 를 가진 채로 쓰기 기능이 막히는 상황이 해소됨
-->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이메일 인증 - StudyOlle</title>

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/auth-style.css}">
</head>

<body class="glass-page">

    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <a class="page-logo" href="/">
        <span>StudyOlle</span>
    </a>

    <!-- 로딩 카드 — fetch 응답 대기 중 -->
    <div id="loadingCard" class="result-card">
        <div class="mail-icon" style="animation: none; transform: scale(1); opacity: 1;">
            <i class="fa-solid fa-spinner fa-spin"></i>
        </div>
        <h1 class="result-title" style="animation: none; opacity: 1; transform: none;">인증 확인 중...</h1>
        <p class="result-subtitle" style="animation: none; opacity: 1; transform: none;">잠시만 기다려주세요</p>
    </div>

    <!-- 성공 카드 (초기 숨김) — JWT 저장 후 잠시 보여주고 홈으로 자동 이동 -->
    <div id="successCard" class="result-card" style="display:none; position: relative; overflow: visible;">
        <div class="confetti" style="top: -10px; left: 20%; background: #8e85b0; animation-delay: 0.5s;"></div>
        <div class="confetti" style="top: -10px; left: 40%; background: #a099bd; animation-delay: 0.6s;"></div>
        <div class="confetti" style="top: -10px; left: 60%; background: #bfa473; animation-delay: 0.7s;"></div>
        <div class="confetti" style="top: -10px; left: 80%; background: #7fac8e; animation-delay: 0.8s;"></div>
        <div class="confetti" style="top: -10px; left: 30%; background: #bfa473; animation-delay: 0.9s;"></div>
        <div class="confetti" style="top: -10px; left: 70%; background: #c4917e; animation-delay: 1.0s;"></div>

        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="result-title">이메일 인증 완료!</h1>
        <p class="result-subtitle">
            환영합니다!<br>
            <span id="successSubtext">잠시 후 홈으로 이동합니다...</span>
        </p>
        <a class="btn-home" href="/" id="homeLink">
            <i class="fa-solid fa-house"></i> 홈으로 이동
        </a>
    </div>

    <!-- 실패 카드 (초기 숨김) -->
    <div id="errorCard" class="result-card error-state" style="display:none;">
        <div class="error-icon">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <h1 class="result-title">인증 실패</h1>
        <p class="result-subtitle">
            이메일 확인 링크가 만료되었거나 올바르지 않습니다.<br>
            새 인증 이메일을 요청해주세요.
        </p>
        <a id="retryLink" class="btn-home" href="/check-email">
            <i class="fa-solid fa-paper-plane"></i> 인증 이메일 다시 받기
        </a>
    </div>

    <script th:inline="javascript">
        const API_BASE = [[${apiBase}]];
    </script>

    <script>
        (async function verifyEmailToken() {
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');
            const email  = params.get('email');

            if (!token || !email) {
                showError(email);
                return;
            }

            const retryLink = document.getElementById('retryLink');
            if (email) {
                retryLink.href = '/check-email?email=' + encodeURIComponent(email);
            }

            try {
                const response = await fetch(
                    API_BASE + '/api/auth/check-email-token'
                    + '?token=' + encodeURIComponent(token)
                    + '&email=' + encodeURIComponent(email),
                    { method: 'GET' }
                );

                if (response.ok) {
                    // -------------------------------------------------------
                    // 인증 성공 — 새 JWT 저장 후 홈으로 이동
                    //
                    // 응답 본문 구조:
                    //   {
                    //     "success": true,
                    //     "message": "이메일 인증이 완료되었습니다.",
                    //     "data": {
                    //       "accessToken": "...",
                    //       "refreshToken": "..."
                    //     }
                    //   }
                    //
                    // 이 새 JWT 에는 emailVerified=true 가 담겨 있어
                    // 다음 요청부터 쓰기 기능을 즉시 쓸 수 있다.
                    // -------------------------------------------------------
                    const result = await response.json();

                    if (result && result.data && result.data.accessToken) {
                        const accessToken = result.data.accessToken;
                        const refreshToken = result.data.refreshToken;

                        // localStorage 저장 — JS fetch 호출용
                        localStorage.setItem('accessToken', accessToken);
                        if (refreshToken) {
                            localStorage.setItem('refreshToken', refreshToken);
                        }

                        // 쿠키 저장 — 브라우저 페이지 이동용
                        // max-age 는 login.html 과 동일한 30분으로 맞춘다 (1800초)
                        // path=/ 로 설정해 모든 경로에서 쿠키가 전송되게 한다
                        document.cookie = 'accessToken=' + accessToken +
                                          '; path=/; max-age=1800; SameSite=Lax';

                        showSuccess();

                        // 1.5초 후 홈으로 자동 이동 (성공 애니메이션 감상 시간)
                        setTimeout(function () {
                            window.location.href = '/';
                        }, 1500);
                    } else {
                        // 예상치 못한 응답 구조 — 실패 처리하되 사용자는 로그인으로 복귀시킴
                        console.warn('예상치 못한 응답 구조:', result);
                        showSuccessWithoutToken();
                    }
                } else {
                    showError(email);
                }

            } catch (e) {
                showError(email);
                console.error('이메일 토큰 검증 실패:', e);
            }
        })();

        function showSuccess() {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
            document.getElementById('errorCard').style.display   = 'none';
        }

        // 응답에 토큰이 없는 예외적 경우 — 성공 화면은 보여주되 사용자가 로그인 페이지로 가게 안내
        function showSuccessWithoutToken() {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
            document.getElementById('errorCard').style.display   = 'none';

            document.getElementById('successSubtext').textContent =
                '로그인 페이지에서 다시 로그인해주세요';
            const homeLink = document.getElementById('homeLink');
            homeLink.href = '/login';
            homeLink.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> 로그인하기';
        }

        function showError(email) {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'none';
            document.getElementById('errorCard').style.display   = 'block';

            if (email) {
                document.getElementById('retryLink').href =
                    '/check-email?email=' + encodeURIComponent(email);
            }
        }
    </script>

</body>
</html>
