<!DOCTYPE html>
<!--
    account/sign-up.html  (MSA 버전)

    [모노리틱과의 차이]
    - 모노리틱: th:object="${signUpForm}" 으로 서버 DTO 와 폼을 바인딩.
                th:field="*{nickname}" 이 name/id/value 를 자동으로 렌더링.
                서버 검증 실패 시 th:errors="*{nickname}" 으로 에러 메시지를 서버가 렌더링.
                CSRF 토큰이 hidden input 으로 자동 포함.
                성공 시 서버가 /check-email 로 리다이렉트.

    - MSA:      폼 바인딩 없음. 순수 HTML input.
                버튼 클릭 시 JS 가 fetch() 로 POST /api/auth/signup 직접 호출.
                서버 검증 실패 시 응답 JSON 의 message 또는 fieldErrors 를
                JS 가 읽어서 각 필드 아래 에러 메시지를 DOM 에 직접 삽입.
                성공 시 JS 가 location.href = '/check-email?email=...' 로 이동.

    [필드별 에러 표시 전략]
    account-service GlobalExceptionHandler 가 @Valid 실패 시 반환하는 구조:
      { message: "닉네임은 3~20자 사이여야 합니다", errorCode: "VALIDATION_ERROR" }
    또는 중복 검사 실패:
      { message: "이미 사용 중인 닉네임입니다", errorCode: "DUPLICATE_NICKNAME" }

    errorCode 에 따라 특정 필드의 .field-error div 에 message 를 표시한다.
    알 수 없는 에러는 상단 공통 에러 박스(#errorGeneral)에 표시한다.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StudyOlle 회원가입</title>

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth-style.css}">
</head>

<body class="glass-page">

    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <a href="/" class="back-link">
        <i class="bi bi-arrow-left"></i> 홈으로
    </a>

    <div class="glass-card">

        <h1 class="page-title stagger-1">회원가입</h1>
        <p class="page-subtitle stagger-1">스터디올래와 함께 성장하세요</p>

        <!--
            공통 에러 박스:
            DUPLICATE_NICKNAME, DUPLICATE_EMAIL 처럼 특정 필드에 귀속되지 않거나
            네트워크 오류 같은 범용 에러를 표시한다.
            초기 상태는 display:none.
        -->
        <div id="errorGeneral" class="glass-alert stagger-1" style="display:none;">
            <span id="errorGeneralMsg"></span>
        </div>

        <!--
            [모노리틱 제거] th:action, th:object, method="post"
            [MSA]          div 로 교체. submit 이벤트 없음.
        -->
        <div>

            <!-- 닉네임 -->
            <div class="form-group stagger-2">
                <label for="nickname">닉네임</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <!--
                        [모노리틱 제거] th:field="*{nickname}"
                        [MSA]          일반 input. glass-validation.js 가
                                       data-validate="nickname" 을 보고 실시간 검사 수행.
                    -->
                    <input id="nickname" type="text"
                           placeholder="whiteship"
                           minlength="3" maxlength="20"
                           data-validate="nickname"
                           autocomplete="username">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">공백 없이 문자와 숫자로 3~20자</div>
                <!--
                    [모노리틱 제거] th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"
                    [MSA]          JS 가 API 응답의 message 를 여기에 직접 setText 한다.
                -->
                <div id="nicknameError" class="field-error" style="display:none;"></div>
            </div>

            <!-- 이메일 -->
            <div class="form-group stagger-3">
                <label for="email">이메일</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope input-icon"></i>
                    <input id="email" type="email"
                           placeholder="your@email.com"
                           data-validate="email"
                           autocomplete="email">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">스터디올래는 이메일을 공개하지 않습니다</div>
                <div id="emailError" class="field-error" style="display:none;"></div>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group stagger-4">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input id="password" type="password"
                           minlength="8" maxlength="50"
                           data-validate="password"
                           autocomplete="new-password">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">8자 이상, 영문자 · 숫자 · 특수기호 포함</div>
                <div id="passwordError" class="field-error" style="display:none;"></div>
            </div>

            <!-- 가입 버튼 -->
            <div class="stagger-5">
                <button type="button" id="signUpBtn" class="btn-glass btn-signup">가입하기</button>
            </div>

            <div class="terms-text stagger-5">
                가입 시 <a href="#">이용 약관</a>에 동의하게 됩니다
            </div>

        </div>
    </div>

    <div class="footer-area">
        <span class="brand-name">&copy; 2025 StudyOlle</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/glass-validation.js}"></script>

    <!-- API_BASE: AuthPageController 가 주입한 apiBase 값 -->
    <script th:inline="javascript">
        const API_BASE = [[${apiBase}]];
    </script>

    <script>
        // ---------------------------------------------------------------
        // 회원가입 처리
        //
        // [흐름]
        // 1. 버튼 클릭
        // 2. 클라이언트 사이드 기본 검증 (빈 값, glass-validation 통과 여부)
        // 3. fetch(POST /api/auth/signup)
        // 4. 성공(201) → /check-email?email=... 으로 이동
        //    실패(400~) → errorCode 에 따라 필드별 에러 또는 공통 에러 표시
        //
        // [account-service SignUpRequest 필드]
        //   nickname : 3~20자, 영문/숫자/한글
        //   email    : 이메일 형식
        //   password : 8~50자
        //
        // [예상 errorCode 목록]
        //   DUPLICATE_NICKNAME : 이미 사용 중인 닉네임
        //   DUPLICATE_EMAIL    : 이미 가입된 이메일
        //   VALIDATION_ERROR   : Bean Validation @Valid 실패 (형식 오류 등)
        // ---------------------------------------------------------------

        const signUpBtn = document.getElementById('signUpBtn');

        signUpBtn.addEventListener('click', async function () {
            // 에러 메시지 전부 초기화
            clearAllErrors();

            const nickname = document.getElementById('nickname').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // 클라이언트 사이드 빈 값 검증
            // (glass-validation.js 의 실시간 검사와 이중 방어)
            if (!nickname || !email || !password) {
                showGeneralError('모든 필드를 올바르게 입력해주세요.');
                return;
            }

            signUpBtn.disabled = true;
            signUpBtn.textContent = '가입 중...';

            try {
                const response = await fetch(API_BASE + '/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // account-service SignUpRequest 구조와 동일
                    body: JSON.stringify({ nickname, email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // -------------------------------------------------------
                    // 회원가입 성공
                    // account-service 가 인증 이메일을 발송하고 201 을 반환한다.
                    //
                    // [모노리틱과의 차이]
                    // 모노리틱: 서버가 직접 /check-email 로 리다이렉트.
                    // MSA:      JS 가 이메일 주소를 쿼리 파라미터로 담아 이동.
                    //           check-email.html 컨트롤러가 @RequestParam email 을 받아
                    //           Thymeleaf 에서 ${email} 로 표시한다.
                    // -------------------------------------------------------
                    window.location.href = '/check-email?email=' + encodeURIComponent(email);

                } else {
                    // -------------------------------------------------------
                    // 회원가입 실패 - errorCode 에 따라 필드별 에러 표시
                    // -------------------------------------------------------
                    const errorCode = result.errorCode || '';
                    const message   = result.message   || '회원가입 중 오류가 발생했습니다.';

                    if (errorCode === 'DUPLICATE_NICKNAME') {
                        showFieldError('nicknameError', message);
                    } else if (errorCode === 'DUPLICATE_EMAIL') {
                        showFieldError('emailError', message);
                    } else if (errorCode === 'VALIDATION_ERROR') {
                        // Bean Validation 실패: message 에 어느 필드 문제인지 포함되어 있음
                        // 단순하게 공통 에러로 표시 (향후 fieldErrors 배열로 세분화 가능)
                        showGeneralError(message);
                    } else {
                        showGeneralError(message);
                    }
                }

            } catch (e) {
                showGeneralError('서버와 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
                console.error('회원가입 요청 실패:', e);
            } finally {
                signUpBtn.disabled = false;
                signUpBtn.textContent = '가입하기';
            }
        });

        // --- 헬퍼 함수 ---

        function showFieldError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        function showGeneralError(message) {
            document.getElementById('errorGeneralMsg').textContent = message;
            document.getElementById('errorGeneral').style.display = 'block';
        }

        function clearAllErrors() {
            ['nicknameError', 'emailError', 'passwordError'].forEach(function (id) {
                const el = document.getElementById(id);
                el.textContent = '';
                el.style.display = 'none';
            });
            document.getElementById('errorGeneralMsg').textContent = '';
            document.getElementById('errorGeneral').style.display = 'none';
        }
    </script>

</body>
</html>
