<!DOCTYPE html>
<!--
    error/error.html

    Spring Boot BasicErrorController 가 자동으로 인식하는 범용 에러 페이지.
    404.html 이 없을 때 또는 5xx 서버 오류 등 나머지 모든 에러에 적용된다.

    [BasicErrorController 탐색 우선순위]
    templates/error/{status}.html  ->  templates/error/{series}xx.html  ->  templates/error/error.html
    이 파일은 맨 마지막 fallback 이다.

    [모델에 자동 주입되는 속성]
    - status    : HTTP 상태 코드 (500, 403 등)
    - error     : 상태 설명 ("Internal Server Error", "Forbidden" 등)
    - message   : 상세 메시지 (운영 환경에서는 비어 있을 수 있음)
    - path      : 요청 경로
    - timestamp : 오류 발생 시각

    [status 에 따른 화면 분기]
    403  ->  "접근 권한이 없습니다" 메시지 + 로그인 유도
    500  ->  "서버 오류가 발생했습니다" 메시지 + 홈 안내
    그 외 ->  일반 오류 메시지

    [주의] footer 프래그먼트는 사용하지 않는다.
    이유는 404.html 과 동일하다: apiBase 모델 속성 미존재 -> Thymeleaf 예외.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head('오류가 발생했습니다')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 text-center">

            <!-- 상태 코드 숫자 장식 -->
            <div class="mb-3" style="line-height: 1; user-select: none;">
                <span style="font-size: 7rem; font-weight: 700; letter-spacing: -4px;
                             color: #e8e4dd;"
                      th:text="${status ?: 'Error'}">Error</span>
            </div>

            <!-- 상태별 아이콘 + 제목 + 설명 -->

            <!-- 403 Forbidden -->
            <th:block th:if="${status == 403}">
                <div class="mb-3">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle"
                         style="width: 72px; height: 72px; background: #fdf0ed;">
                        <i class="fa-solid fa-lock" style="color: #c4917e; font-size: 1.8rem;"></i>
                    </div>
                </div>
                <h2 class="fw-bold mb-2" style="color: #2c2843; font-size: 1.5rem;">
                    접근 권한이 없습니다
                </h2>
                <p class="text-muted mb-4" style="font-size: 0.95rem;">
                    이 페이지를 볼 수 있는 권한이 없습니다.<br>
                    로그인하거나 다른 계정으로 시도해 보세요.
                </p>
                <div class="d-flex justify-content-center gap-3 flex-wrap mb-5">
                    <a href="/login"
                       class="btn rounded-pill px-4 py-2 text-white fw-semibold"
                       style="background: #c4917e; border: none; font-size: 0.9rem;">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>로그인
                    </a>
                    <a href="/"
                       class="btn rounded-pill px-4 py-2"
                       style="border: 1.5px solid #8e85b0; color: #8e85b0;
                              background: transparent; font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-2"></i>홈으로 이동
                    </a>
                </div>
            </th:block>

            <!-- 500 Internal Server Error -->
            <th:block th:if="${status == 500}">
                <div class="mb-3">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle"
                         style="width: 72px; height: 72px; background: #f0ece8;">
                        <i class="fa-solid fa-triangle-exclamation"
                           style="color: #bfa473; font-size: 1.8rem;"></i>
                    </div>
                </div>
                <h2 class="fw-bold mb-2" style="color: #2c2843; font-size: 1.5rem;">
                    서버에서 오류가 발생했습니다
                </h2>
                <p class="text-muted mb-4" style="font-size: 0.95rem;">
                    일시적인 문제가 발생했습니다.<br>
                    잠시 후 다시 시도해 주세요.
                </p>
                <div class="d-flex justify-content-center gap-3 flex-wrap mb-5">
                    <a href="/"
                       class="btn rounded-pill px-4 py-2 text-white fw-semibold"
                       style="background: #8e85b0; border: none; font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-2"></i>홈으로 이동
                    </a>
                    <button onclick="history.back()"
                            class="btn rounded-pill px-4 py-2"
                            style="border: 1.5px solid #8e85b0; color: #8e85b0;
                                   background: transparent; font-size: 0.9rem;">
                        <i class="fa-solid fa-arrow-left me-2"></i>이전 페이지
                    </button>
                </div>
            </th:block>

            <!-- 그 외 나머지 에러 (fallback) -->
            <th:block th:if="${status != 403 and status != 500}">
                <div class="mb-3">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle"
                         style="width: 72px; height: 72px; background: #f0ece8;">
                        <i class="fa-solid fa-circle-exclamation"
                           style="color: #8e85b0; font-size: 1.8rem;"></i>
                    </div>
                </div>
                <h2 class="fw-bold mb-2" style="color: #2c2843; font-size: 1.5rem;">
                    오류가 발생했습니다
                </h2>
                <p class="text-muted mb-1" style="font-size: 0.95rem;"
                   th:text="${error ?: '알 수 없는 오류가 발생했습니다.'}">오류 메시지</p>
                <p class="mb-4"></p>
                <div class="d-flex justify-content-center gap-3 flex-wrap mb-5">
                    <a href="/"
                       class="btn rounded-pill px-4 py-2 text-white fw-semibold"
                       style="background: #8e85b0; border: none; font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-2"></i>홈으로 이동
                    </a>
                    <button onclick="history.back()"
                            class="btn rounded-pill px-4 py-2"
                            style="border: 1.5px solid #8e85b0; color: #8e85b0;
                                   background: transparent; font-size: 0.9rem;">
                        <i class="fa-solid fa-arrow-left me-2"></i>이전 페이지
                    </button>
                </div>
            </th:block>

            <!-- 요청 경로 + 상태 코드 (path 가 있을 때만) -->
            <th:block th:if="${path != null}">
                <hr style="border-color: #e8e4dd; max-width: 320px; margin: 0 auto 1.5rem;">
                <p class="text-muted small mb-0">
                    <code class="rounded-2 px-2 py-1"
                          style="background: #f0ece8; color: #8e85b0;
                                 font-family: monospace; font-size: 0.78rem;"
                          th:text="${path}">경로</code>
                </p>
            </th:block>

        </div>
    </div>
</div>

<!-- footer 프래그먼트 대신 필수 JS 만 직접 포함 -->
<div class="border-top bg-white mt-5 py-4">
    <div class="container">
        <div class="text-center text-muted small">
            &copy; 2025 StudyOlle. All rights reserved.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jdenticon@3.2.0/dist/jdenticon.min.js"></script>

<script>
    function handleLogout(e) {
        e.preventDefault();
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    }
</script>

</body>
</html>
