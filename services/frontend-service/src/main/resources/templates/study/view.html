<!DOCTYPE html>
<!--
    study/view.html  (MSA 버전)

    [모노리틱과의 핵심 차이]

    1. sec:authorize 완전 제거
       - 모노리틱: sec:authorize="isAuthenticated()" + study.isManager(#authentication.principal)
       - MSA:       th:if="${isManager}", th:if="${isMember}", th:if="${account != null}"
                    StudyPageController 가 API 호출 결과를 기반으로 model 에 주입

    2. study.isManager / study.isMember 메서드 호출 제거
       - 모노리틱: th:if="${study.isManager(#authentication.principal)}"
       - MSA:       th:if="${isManager}" — 컨트롤러가 미리 계산해서 boolean 으로 전달

    3. 모임 만들기 링크 (관리자용)
       - 모노리틱: sec:authorize + study.isManager() 체크 후 링크 표시
       - MSA:       th:if="${isManager && study.published && !study.closed}" 로 단순화

    4. 날짜 포맷
       - 모노리틱: JavaScript 로 fromNow, date-weekday-time 클래스를 처리하는 fragment 사용
       - MSA:       동일 클래스 유지, footer 에서 moment.js 로 처리 (선택 사항)
                   현재는 서버에서 포맷된 문자열을 그대로 출력하는 방식 사용

    [필요한 model 속성]
    - study           : StudyResponse (path, title, shortDesc, fullDesc, published, closed,
                                        recruiting, useBanner, image, joinType,
                                        managers:List, members:List)
    - account         : AccountSummaryDto or null
    - isManager       : boolean
    - isMember        : boolean
    - hasPendingRequest : boolean (승인제 가입 신청 대기 여부)
    - newEvents       : List<EventSummaryDto>
    - oldEvents       : List<EventSummaryDto>
    - apiBase         : String
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head(${study.title})}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>
<div th:replace="~{fragments.html :: study-info}"></div>

<!-- 본문: 소개 + 구성원 + 모임 -->
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- ========== 1. 소개 ========== -->
            <div class="mb-5">
                <h5 class="fw-bold mb-3 d-flex align-items-center" style="color: #2c2843;">
                    <i class="fa-solid fa-circle-info me-2" style="color: #8e85b0;"></i> 소개
                </h5>
                <div class="card border-0 shadow-sm rounded-3">
                    <!--
                        th:utext : HTML 태그가 포함된 Summernote 결과물을 그대로 렌더링.
                        XSS 방어는 study-service 저장 시 처리됨을 전제로 한다.
                    -->
                    <div class="card-body p-4" th:utext="${study.fullDescription}">
                        스터디 상세 소개 내용
                    </div>
                </div>
                <!-- 소개가 비어있을 때 -->
                <div th:if="${#strings.isEmpty(study.fullDescription)}"
                     class="text-center py-5 text-muted">
                    <i class="fa-solid fa-pen-fancy fa-2x mb-2" style="color: #d0ccdf;"></i>
                    <p class="mb-0 small">아직 상세 소개가 작성되지 않았습니다.</p>
                </div>
            </div>

            <hr class="my-4" style="border-color: #e8e5f0;">

            <!-- ========== 2. 구성원 ========== -->
            <div class="mb-5">
                <h5 class="fw-bold mb-3 d-flex align-items-center" style="color: #2c2843;">
                    <i class="fa-solid fa-users me-2" style="color: #8e85b0;"></i> 구성원
                    <span class="badge rounded-pill ms-2 fw-normal"
                          style="background: #f0ece8; color: #6d6484; font-size: 0.8rem;"
                          th:text="${study.managers.size() + study.members.size()} + '명'">0명</span>
                </h5>

                <!-- 관리자 -->
                <div class="mb-3" th:if="${!study.managers.isEmpty()}">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-crown text-warning me-1"></i> 관리자
                    </p>
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4" th:each="manager : ${study.managers}">
                            <a th:href="@{'/profile/' + ${manager.nickname}}" class="text-decoration-none">
                                <div class="card border-0 shadow-sm rounded-3 h-100"
                                     style="transition: transform 0.15s; cursor: pointer;"
                                     onmouseover="this.style.transform='translateY(-2px)'"
                                     onmouseout="this.style.transform='translateY(0)'">
                                    <div class="card-body d-flex align-items-center p-3">
                                        <svg th:if="${#strings.isEmpty(manager.profileImage)}"
                                             th:data-jdenticon-value="${manager.nickname}"
                                             width="48" height="48"
                                             class="rounded-circle border flex-shrink-0 me-3"></svg>
                                        <img th:if="${!#strings.isEmpty(manager.profileImage)}"
                                             th:src="${manager.profileImage}"
                                             width="48" height="48"
                                             class="rounded-circle border object-fit-cover flex-shrink-0 me-3"
                                             alt="프로필"/>
                                        <div>
                                            <span class="fw-semibold text-dark"
                                                  th:text="${manager.nickname}">닉네임</span>
                                            <span class="badge rounded-pill ms-1"
                                                  style="background: #f0ece8; color: #bfa473; font-size: 0.7rem;">관리자</span>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 일반 멤버 -->
                <div th:if="${!study.members.isEmpty()}">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-user me-1"></i> 멤버
                    </p>
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4" th:each="member : ${study.members}">
                            <a th:href="@{'/profile/' + ${member.nickname}}" class="text-decoration-none">
                                <div class="card border-0 shadow-sm rounded-3 h-100"
                                     style="transition: transform 0.15s; cursor: pointer;"
                                     onmouseover="this.style.transform='translateY(-2px)'"
                                     onmouseout="this.style.transform='translateY(0)'">
                                    <div class="card-body d-flex align-items-center p-3">
                                        <svg th:if="${#strings.isEmpty(member.profileImage)}"
                                             th:data-jdenticon-value="${member.nickname}"
                                             width="48" height="48"
                                             class="rounded-circle border flex-shrink-0 me-3"></svg>
                                        <img th:if="${!#strings.isEmpty(member.profileImage)}"
                                             th:src="${member.profileImage}"
                                             width="48" height="48"
                                             class="rounded-circle border object-fit-cover flex-shrink-0 me-3"
                                             alt="프로필"/>
                                        <div>
                                            <span class="fw-semibold text-dark"
                                                  th:text="${member.nickname}">닉네임</span>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 멤버가 한 명도 없을 때 -->
                <div th:if="${study.members.isEmpty()}" class="text-center py-4 text-muted">
                    <i class="fa-solid fa-user-group fa-2x mb-2" style="color: #d0ccdf;"></i>
                    <p class="mb-0 small">아직 가입한 멤버가 없습니다.</p>
                </div>
            </div>

            <hr class="my-4" style="border-color: #e8e5f0;">

            <!-- ========== 3. 모임 ========== -->
            <div class="mb-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="fw-bold mb-0 d-flex align-items-center" style="color: #2c2843;">
                        <i class="fa-solid fa-calendar-days me-2" style="color: #8e85b0;"></i> 모임
                        <span class="badge rounded-pill ms-2 fw-normal"
                              style="background: #f0ece8; color: #6d6484; font-size: 0.8rem;"
                              th:text="${newEvents.size() + oldEvents.size()} + '개'">0개</span>
                    </h5>

                    <!--
                        [모임 만들기 버튼] 관리자 + 공개 중 + 종료 전
                        모노리틱: sec:authorize="isAuthenticated()" + study.isManager() + th:if
                        MSA:       th:if="${isManager && study.published && !study.closed}"
                    -->
                    <a th:if="${isManager && study.published && !study.closed}"
                       th:href="@{'/study/' + ${study.path} + '/new-event'}"
                       class="btn btn-sm rounded-pill px-3"
                       style="border: 1.5px solid #8e85b0; color: #8e85b0; font-size: 0.85rem;">
                        <i class="fa-solid fa-plus me-1"></i> 모임 만들기
                    </a>
                </div>

                <!-- 예정된 모임 -->
                <div th:if="${!newEvents.isEmpty()}" class="mb-4">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-calendar-plus text-success me-1"></i> 예정된 모임
                        <span class="badge rounded-pill ms-1"
                              style="background: #e8f4ee; color: #7fac8e; font-size: 0.75rem;"
                              th:text="${newEvents.size()}">0</span>
                    </p>
                    <div class="row g-3">
                        <div class="col-md-6" th:each="event : ${newEvents}">
                            <a th:href="@{'/study/' + ${study.path} + '/events/' + ${event.id}}"
                               class="card border-0 shadow-sm rounded-3 text-decoration-none h-100"
                               style="transition: transform 0.15s;"
                               onmouseover="this.style.transform='translateY(-2px)'"
                               onmouseout="this.style.transform='translateY(0)'">
                                <div class="card-body p-4">
                                    <h6 class="fw-bold text-dark mb-3"
                                        th:text="${event.title}">모임 이름</h6>
                                    <div class="d-flex flex-column gap-2">
                                        <div class="d-flex align-items-center text-muted small">
                                            <i class="fa-solid fa-calendar-days me-2"
                                               style="color: #8e85b0;"></i>
                                            <span th:text="${event.startDateTime}">시작 일시</span>
                                        </div>
                                        <div class="d-flex align-items-center text-muted small">
                                            <i class="fa-solid fa-clock me-2"
                                               style="color: #8e85b0;"></i>
                                            <span>모집 마감:
                                                <span th:text="${event.endEnrollmentDateTime}">마감</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer bg-transparent border-top-0 pb-3 px-4">
                                    <span class="small fw-semibold"
                                          style="color: #8e85b0;">자세히 보기 <i class="fa-solid fa-arrow-right ms-1"></i></span>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 지난 모임 -->
                <div th:if="${!oldEvents.isEmpty()}" class="mb-3">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-clock-rotate-left text-secondary me-1"></i> 지난 모임
                        <span class="badge rounded-pill ms-1"
                              style="background: #f0f0f0; color: #888; font-size: 0.75rem;"
                              th:text="${oldEvents.size()}">0</span>
                    </p>
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-3 fw-semibold">#</th>
                                        <th class="py-3 fw-semibold">모임 이름</th>
                                        <th class="py-3 fw-semibold">종료 일시</th>
                                        <th class="pe-4 py-3"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="event, stat : ${oldEvents}">
                                        <td class="ps-4 text-muted"
                                            th:text="${stat.count}">1</td>
                                        <td class="fw-semibold"
                                            th:text="${event.title}">모임 이름</td>
                                        <td class="text-muted small"
                                            th:text="${event.endDateTime}">종료</td>
                                        <td class="pe-4">
                                            <a th:href="@{'/study/' + ${study.path} + '/events/' + ${event.id}}"
                                               class="btn btn-sm btn-outline-secondary rounded-pill px-3">보기</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 모임 없을 때 -->
                <div th:if="${newEvents.isEmpty() && oldEvents.isEmpty()}"
                     class="text-center py-4 text-muted">
                    <i class="fa-solid fa-calendar-xmark fa-2x mb-2" style="color: #d0ccdf;"></i>
                    <p class="mb-0 small">아직 등록된 모임이 없습니다.</p>
                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

</body>
</html>
