<!DOCTYPE html>
<!--
    study/settings/banner.html  (MSA 버전)

    [모노리틱과의 핵심 차이]

    1. 배너 활성화/비활성화 폼 POST 제거
       - 모노리틱: <form th:action="@{.../banner/enable}" method="post"> 서버 form submit
       - MSA:       버튼 onclick → fetch(POST /api/studies/{path}/settings/banner/enable)
                   + Authorization: Bearer 헤더

    2. 배너 이미지 저장 폼 POST 제거
       - 모노리틱: <form id="imageForm" th:action="@{.../settings/banner}" method="post">
                   hidden input name="image" 에 base64 데이터 담아 submit
       - MSA:       Cropper.js 로 크롭 후 base64 를 fetch body 에 담아 POST

    3. CSRF 제거

    [Cropper.js 플로우 - 모노리틱과 동일]
    파일 선택 → FileReader → img 생성 → Cropper 초기화 →
    자르기 버튼 → getCroppedCanvas().toDataURL() → 확인 버튼 → 저장 버튼 → fetch POST

    [필요한 model 속성]
    - study    : StudyResponse (path, useBanner, image)
    - account  : AccountSummaryDto (nav 용)
    - apiBase  : String
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head(${study.title} + ' - 배너 이미지')}"></head>

<!-- Cropper.js CSS -->
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>
<div th:replace="~{fragments.html :: study-info}"></div>

<!-- 설정 탭 바 -->
<div class="border-bottom bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav class="nav py-2">
                    <a class="nav-link rounded-pill px-3 text-muted"
                       style="font-size: 0.9rem;"
                       th:href="@{'/study/' + ${study.path}}">
                        <i class="fa-solid fa-arrow-left me-1"></i> 스터디로 돌아가기
                    </a>
                    <span class="nav-link px-3 fw-semibold"
                          style="color: #8e85b0; font-size: 0.9rem;">
                        <i class="fa-solid fa-gear me-1"></i> 스터디 설정
                    </span>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="row g-4">

                <!-- 사이드바 -->
                <div class="col-md-3">
                    <div th:replace="~{fragments.html :: study-settings-menu('image')}"></div>
                </div>

                <!-- 메인 콘텐츠 -->
                <div class="col-md-9">

                    <!-- 작업 완료 / 에러 알림 -->
                    <div id="alertSuccess" class="alert border-0 rounded-3 mb-3"
                         style="background: #e8f4ee; color: #4a8a62; display: none;">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <span id="alertSuccessMsg">저장되었습니다.</span>
                    </div>
                    <div id="alertError" class="alert border-0 rounded-3 mb-3"
                         style="background: #fdf0ed; color: #b05a3a; display: none;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="alertErrorMsg"></span>
                    </div>

                    <!-- 배너 사용 토글 카드 -->
                    <div class="card border-0 shadow-sm rounded-3 mb-4">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-toggle-on text-primary me-2"></i>배너 이미지 사용
                            </h6>
                        </div>
                        <div class="card-body p-4">

                            <!--
                                [모노리틱 제거] th:if + form POST
                                [MSA]          th:if 조건 유지, 버튼 onclick 으로 fetch 호출
                            -->
                            <div th:if="${!study.useBanner}">
                                <div class="alert alert-primary border-0 rounded-3" role="alert">
                                    <i class="fa-solid fa-circle-info me-2"></i>
                                    배너 이미지를 사용하면 스터디 페이지 상단에 배너가 표시됩니다.
                                    아직 이미지를 설정하지 않았다면 기본 이미지를 사용합니다.
                                </div>
                                <button type="button"
                                        class="btn btn-outline-primary rounded-pill w-100"
                                        onclick="toggleBanner('enable')">
                                    <i class="fa-solid fa-eye me-1"></i> 배너 이미지 사용하기
                                </button>
                            </div>

                            <div th:if="${study.useBanner}">
                                <div class="alert alert-info border-0 rounded-3" role="alert">
                                    <i class="fa-solid fa-circle-info me-2"></i>
                                    현재 배너 이미지를 사용 중입니다. 비활성화하면 배너가 숨겨집니다.
                                </div>
                                <button type="button"
                                        class="btn btn-outline-secondary rounded-pill w-100"
                                        onclick="toggleBanner('disable')">
                                    <i class="fa-solid fa-eye-slash me-1"></i> 배너 이미지 사용하지 않기
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 배너 이미지 변경 카드 -->
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-image text-warning me-2"></i>배너 이미지 변경
                            </h6>
                        </div>
                        <div class="card-body p-4">

                            <!-- 현재 이미지 -->
                            <div id="currentImageArea" class="text-center mb-3">
                                <img id="currentImage"
                                     th:src="${study.image}"
                                     class="rounded-3 img-fluid shadow-sm"
                                     style="max-width: 100%; max-height: 200px; object-fit: cover;"
                                     alt="현재 배너"/>
                            </div>

                            <!-- 크롭 대상 이미지 (초기 숨김) -->
                            <div id="newImageArea" class="mb-3" style="display: none;">
                                <img id="newImage" src="" style="max-width: 100%;" alt="새 배너"/>
                            </div>

                            <!-- 크롭 결과 미리보기 (초기 숨김) -->
                            <div id="croppedPreview" class="text-center mb-3" style="display: none;">
                                <img id="croppedImage" src="" width="640" class="rounded-3" alt="크롭 결과"/>
                            </div>

                            <!-- 파일 선택 -->
                            <div class="mb-3">
                                <input type="file" id="imageFileInput"
                                       class="form-control" accept="image/*">
                            </div>

                            <!-- 컨트롤 버튼 -->
                            <div id="imageControls" class="d-flex flex-wrap gap-2" style="display: none !important;">
                                <button id="cutBtn" type="button"
                                        class="btn btn-outline-primary rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-crop-simple me-1"></i> 자르기
                                </button>
                                <button id="confirmBtn" type="button"
                                        class="btn btn-outline-success rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-check me-1"></i> 확인
                                </button>
                                <button id="saveImageBtn" type="button"
                                        class="btn btn-primary rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-floppy-disk me-1"></i> 저장
                                </button>
                                <button id="resetBtn" type="button"
                                        class="btn btn-outline-warning rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-rotate-left me-1"></i> 취소
                                </button>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<!-- Cropper.js -->
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-cropper@1.0.1/dist/jquery-cropper.min.js"></script>

<script th:inline="javascript">
    const STUDY_PATH = [[${study.path}]];
</script>

<script>
    // ---------------------------------------------------------------
    // 배너 활성화 / 비활성화
    //
    // [모노리틱 차이]
    // 모노리틱: <form> submit → 서버 처리 → redirect (페이지 새로고침)
    // MSA:       fetch(POST .../enable|disable) → 성공 시 location.reload()
    // ---------------------------------------------------------------
    async function toggleBanner(action) {
        const url = API_BASE + '/api/studies/' + STUDY_PATH + '/settings/banner/' + action;
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                }
            });
            if (res.ok) {
                location.reload();
            } else {
                const data = await res.json();
                showError(data.message || '처리 중 오류가 발생했습니다.');
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
            console.error(e);
        }
    }

    // ---------------------------------------------------------------
    // Cropper.js 이미지 크롭 로직
    // 모노리틱과 동일한 플로우를 jQuery 없이 구현.
    //
    // [플로우]
    // 1. 파일 선택 → FileReader 로 base64 읽기
    // 2. <img> 에 src 설정 → Cropper 초기화 (aspect 13:2)
    // 3. 자르기 버튼 → getCroppedCanvas().toDataURL()
    // 4. 확인 버튼 → dataUrl 을 croppedImageDataUrl 변수에 저장
    // 5. 저장 버튼 → fetch(POST .../banner) + body: { image: dataUrl }
    // ---------------------------------------------------------------
    let cropper = null;
    let croppedImageDataUrl = '';

    const fileInput      = document.getElementById('imageFileInput');
    const currentArea    = document.getElementById('currentImageArea');
    const newArea        = document.getElementById('newImageArea');
    const newImg         = document.getElementById('newImage');
    const croppedPreview = document.getElementById('croppedPreview');
    const croppedImg     = document.getElementById('croppedImage');
    const cutBtn         = document.getElementById('cutBtn');
    const confirmBtn     = document.getElementById('confirmBtn');
    const saveBtn        = document.getElementById('saveImageBtn');
    const resetBtn       = document.getElementById('resetBtn');

    fileInput.addEventListener('change', function (e) {
        if (e.target.files.length !== 1) return;
        const reader = new FileReader();
        reader.onload = function (ev) {
            if (!ev.target.result || !ev.target.result.startsWith('data:image')) {
                alert('이미지 파일을 선택하세요.');
                return;
            }
            newImg.src = ev.target.result;
            newArea.style.display = 'block';
            currentArea.style.display = 'none';
            croppedPreview.style.display = 'none';

            // 이전 Cropper 인스턴스 정리
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            // Cropper 초기화 (aspect ratio 13:2 — 모노리틱과 동일)
            cropper = new Cropper(newImg, { aspectRatio: 13 / 2 });

            cutBtn.style.display = 'inline-flex';
            resetBtn.style.display = 'inline-flex';
            confirmBtn.style.display = 'none';
            saveBtn.style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    cutBtn.addEventListener('click', function () {
        if (!cropper) return;
        const dataUrl = cropper.getCroppedCanvas().toDataURL();

        // 1MB 초과 경고 (모노리틱과 동일 기준)
        if (dataUrl.length > 1000 * 1024) {
            alert('이미지 파일이 너무 큽니다. 1024000 보다 작은 파일을 사용하세요.\n현재 크기: ' + dataUrl.length);
            return;
        }
        croppedImg.src = dataUrl;
        croppedPreview.style.display = 'block';
        confirmBtn.style.display = 'inline-flex';
    });

    confirmBtn.addEventListener('click', function () {
        croppedImageDataUrl = croppedImg.src;
        // 크롭 완료 → 에디터 이미지를 크롭 결과로 교체
        newImg.src = croppedImageDataUrl;
        cutBtn.style.display = 'none';
        confirmBtn.style.display = 'none';
        saveBtn.style.display = 'inline-flex';
    });

    resetBtn.addEventListener('click', function () {
        if (cropper) { cropper.destroy(); cropper = null; }
        newArea.style.display = 'none';
        croppedPreview.style.display = 'none';
        currentArea.style.display = 'block';
        fileInput.value = '';
        croppedImageDataUrl = '';
        cutBtn.style.display = 'none';
        confirmBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        resetBtn.style.display = 'none';
    });

    saveBtn.addEventListener('click', async function () {
        if (!croppedImageDataUrl) {
            showError('먼저 이미지를 자르고 확인해주세요.');
            return;
        }
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

        try {
            const res = await fetch(API_BASE + '/api/studies/' + STUDY_PATH + '/settings/banner', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                },
                body: JSON.stringify({ image: croppedImageDataUrl })
            });

            if (res.ok) {
                showSuccess('배너 이미지가 저장되었습니다.');
                // 현재 이미지 미리보기 업데이트
                document.getElementById('currentImage').src = croppedImageDataUrl;
                resetBtn.click(); // 편집 UI 초기화
            } else {
                const data = await res.json();
                showError(data.message || '저장 중 오류가 발생했습니다.');
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
            console.error(e);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk me-1"></i> 저장';
        }
    });

    function showSuccess(msg) {
        document.getElementById('alertSuccessMsg').textContent = msg || '저장되었습니다.';
        document.getElementById('alertSuccess').style.display = 'block';
        document.getElementById('alertError').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showError(msg) {
        document.getElementById('alertErrorMsg').textContent = msg;
        document.getElementById('alertError').style.display = 'block';
        document.getElementById('alertSuccess').style.display = 'none';
    }
</script>

</body>
</html>
