<!DOCTYPE html>
<!--
    settings/profile.html

    [API 엔드포인트]
    - 프로필 저장: PUT /api/accounts/settings/profile
      body: { bio, url, occupation, location, profileImage }
    - 닉네임 변경: PUT /api/accounts/settings/nickname
      body: { nickname }
      ※ 닉네임은 JWT 에 포함되므로 변경 후 재로그인 필요 (안내 표시)

    [필요한 model 속성]
    - account        : AccountSummaryDto  (nav 바)
    - accountSettings: AccountSettingsDto (폼 초기값)
    - apiBase        : String
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head('프로필 설정')}"></head>
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>

<!-- 페이지 헤더 -->
<div class="border-bottom bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav class="nav py-2">
                    <a class="nav-link rounded-pill px-3 text-muted" href="/"
                       style="font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-1"></i> 홈
                    </a>
                    <span class="nav-link px-3 fw-semibold"
                          style="color: #8e85b0; font-size: 0.9rem;">
                        <i class="fa-solid fa-gear me-1"></i> 계정 설정
                    </span>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="row g-4">

                <!-- 사이드바 -->
                <div class="col-md-3">
                    <div th:replace="~{fragments.html :: account-settings-menu('profile')}"></div>
                </div>

                <!-- 메인 콘텐츠 -->
                <div class="col-md-9">

                    <!-- 알림 영역 -->
                    <div id="alertSuccess" class="alert border-0 rounded-3 mb-3"
                         style="background: #e8f4ee; color: #4a8a62; display: none;">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <span id="alertSuccessMsg">저장되었습니다.</span>
                    </div>
                    <div id="alertError" class="alert border-0 rounded-3 mb-3"
                         style="background: #fdf0ed; color: #b05a3a; display: none;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="alertErrorMsg"></span>
                    </div>

                    <!-- ===== 프로필 이미지 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-4">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-image text-warning me-2"></i>프로필 이미지
                            </h6>
                        </div>
                        <div class="card-body p-4">

                            <!-- 현재 이미지 / Jdenticon -->
                            <div id="currentImageArea" class="text-center mb-3">
                                <img th:if="${!#strings.isEmpty(accountSettings?.profileImage)}"
                                     id="currentImage"
                                     th:src="${accountSettings.profileImage}"
                                     width="96" height="96"
                                     class="rounded-circle border shadow-sm object-fit-cover"
                                     alt="현재 프로필"/>
                                <svg th:if="${#strings.isEmpty(accountSettings?.profileImage)}"
                                     id="currentJdenticon"
                                     th:data-jdenticon-value="${accountSettings?.nickname}"
                                     width="96" height="96"
                                     class="rounded-circle border shadow-sm"></svg>
                            </div>

                            <!-- 크롭 대상 이미지 (초기 숨김) -->
                            <div id="newImageArea" class="mb-3" style="display: none;">
                                <img id="newImage" src="" style="max-width: 100%;" alt="새 이미지"/>
                            </div>

                            <!-- 크롭 결과 미리보기 (초기 숨김) -->
                            <div id="croppedPreview" class="text-center mb-3" style="display: none;">
                                <img id="croppedImage" src=""
                                     width="96" height="96"
                                     class="rounded-circle border" alt="크롭 결과"/>
                            </div>

                            <div class="mb-3">
                                <input type="file" id="imageFileInput" class="form-control" accept="image/*">
                            </div>

                            <div class="d-flex flex-wrap gap-2">
                                <button id="cutBtn" type="button"
                                        class="btn btn-outline-primary rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-crop-simple me-1"></i> 자르기
                                </button>
                                <button id="confirmBtn" type="button"
                                        class="btn btn-outline-success rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-check me-1"></i> 확인
                                </button>
                                <button id="saveImageBtn" type="button"
                                        class="btn btn-primary rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-floppy-disk me-1"></i> 저장
                                </button>
                                <button id="resetBtn" type="button"
                                        class="btn btn-outline-warning rounded-pill flex-fill"
                                        style="display: none;">
                                    <i class="fa-solid fa-rotate-left me-1"></i> 취소
                                </button>
                            </div>

                        </div>
                    </div>

                    <!-- ===== 프로필 정보 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-4">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-user-pen text-primary me-2"></i>기본 정보
                            </h6>
                        </div>
                        <div class="card-body p-4">

                            <div class="mb-3">
                                <label for="bio" class="form-label fw-semibold">소개</label>
                                <textarea id="bio" class="form-control" rows="2" maxlength="35"
                                          placeholder="자신을 짧게 소개해 주세요."
                                          th:text="${accountSettings?.bio}"></textarea>
                                <div class="form-text">35자 이내</div>
                            </div>

                            <div class="mb-3">
                                <label for="url" class="form-label fw-semibold">링크</label>
                                <input id="url" type="url" class="form-control"
                                       placeholder="https://github.com/username"
                                       maxlength="50"
                                       th:value="${accountSettings?.url}">
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="occupation" class="form-label fw-semibold">직업</label>
                                    <input id="occupation" type="text" class="form-control"
                                           placeholder="예) 백엔드 개발자" maxlength="50"
                                           th:value="${accountSettings?.occupation}">
                                </div>
                                <div class="col-md-6">
                                    <label for="location" class="form-label fw-semibold">활동 지역</label>
                                    <input id="location" type="text" class="form-control"
                                           placeholder="예) 서울" maxlength="50"
                                           th:value="${accountSettings?.location}">
                                </div>
                            </div>

                            <div class="d-grid">
                                <button id="saveProfileBtn" type="button"
                                        class="btn btn-primary rounded-pill">
                                    <i class="fa-solid fa-check me-1"></i> 프로필 저장
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ===== 닉네임 변경 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-4">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-at text-warning me-2"></i>닉네임
                            </h6>
                        </div>
                        <div class="card-body p-4">
                            <div class="alert alert-warning border-0 rounded-3 mb-3" role="alert">
                                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                                닉네임 변경 후에는 <strong>재로그인이 필요합니다.</strong>
                                JWT 토큰에 닉네임이 포함되어 있어 변경 즉시 반영되지 않습니다.
                            </div>
                            <div class="mb-3">
                                <input id="nickname" type="text" class="form-control"
                                       maxlength="20"
                                       th:value="${accountSettings?.nickname}">
                                <div id="nicknameError" class="text-danger small mt-1"
                                     style="display: none;"></div>
                            </div>
                            <div class="d-grid">
                                <button id="saveNicknameBtn" type="button"
                                        class="btn btn-outline-warning rounded-pill">
                                    <i class="fa-solid fa-pen me-1"></i> 닉네임 변경
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-cropper@1.0.1/dist/jquery-cropper.min.js"></script>

<script>
    // ---------------------------------------------------------------
    // 프로필 이미지 Cropper.js (aspect 1:1 - 정사각형)
    // ---------------------------------------------------------------
    let cropper = null;
    let croppedImageDataUrl = '';

    const fileInput      = document.getElementById('imageFileInput');
    const currentArea    = document.getElementById('currentImageArea');
    const newArea        = document.getElementById('newImageArea');
    const newImg         = document.getElementById('newImage');
    const croppedPreview = document.getElementById('croppedPreview');
    const croppedImg     = document.getElementById('croppedImage');
    const cutBtn         = document.getElementById('cutBtn');
    const confirmBtn     = document.getElementById('confirmBtn');
    const saveImageBtn   = document.getElementById('saveImageBtn');
    const resetBtn       = document.getElementById('resetBtn');

    fileInput.addEventListener('change', function (e) {
        if (e.target.files.length !== 1) return;
        const reader = new FileReader();
        reader.onload = function (ev) {
            if (!ev.target.result || !ev.target.result.startsWith('data:image')) {
                alert('이미지 파일을 선택하세요.');
                return;
            }
            newImg.src = ev.target.result;
            newArea.style.display = 'block';
            currentArea.style.display = 'none';
            croppedPreview.style.display = 'none';
            if (cropper) { cropper.destroy(); cropper = null; }
            // aspect 1:1 — 프로필 이미지는 정사각형
            cropper = new Cropper(newImg, { aspectRatio: 1 / 1 });
            cutBtn.style.display = 'inline-flex';
            resetBtn.style.display = 'inline-flex';
            confirmBtn.style.display = 'none';
            saveImageBtn.style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    cutBtn.addEventListener('click', function () {
        if (!cropper) return;
        const dataUrl = cropper.getCroppedCanvas().toDataURL();
        if (dataUrl.length > 1000 * 1024) {
            alert('이미지 파일이 너무 큽니다. 더 작은 파일을 사용해 주세요.');
            return;
        }
        croppedImg.src = dataUrl;
        croppedPreview.style.display = 'block';
        confirmBtn.style.display = 'inline-flex';
    });

    confirmBtn.addEventListener('click', function () {
        croppedImageDataUrl = croppedImg.src;
        newImg.src = croppedImageDataUrl;
        cutBtn.style.display = 'none';
        confirmBtn.style.display = 'none';
        saveImageBtn.style.display = 'inline-flex';
    });

    resetBtn.addEventListener('click', function () {
        if (cropper) { cropper.destroy(); cropper = null; }
        newArea.style.display = 'none';
        croppedPreview.style.display = 'none';
        currentArea.style.display = 'block';
        fileInput.value = '';
        croppedImageDataUrl = '';
        cutBtn.style.display = 'none';
        confirmBtn.style.display = 'none';
        saveImageBtn.style.display = 'none';
        resetBtn.style.display = 'none';
    });

    // 이미지만 저장 (나머지 프로필 필드와 별도로 저장)
    saveImageBtn.addEventListener('click', async function () {
        if (!croppedImageDataUrl) { showError('이미지를 자르고 확인해주세요.'); return; }
        saveImageBtn.disabled = true;
        saveImageBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';
        try {
            const res = await fetch(API_BASE + '/api/accounts/settings/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json',
                           'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({
                    bio:          document.getElementById('bio').value,
                    url:          document.getElementById('url').value,
                    occupation:   document.getElementById('occupation').value,
                    location:     document.getElementById('location').value,
                    profileImage: croppedImageDataUrl
                })
            });
            if (res.ok) {
                showSuccess('프로필 이미지가 저장되었습니다.');
                resetBtn.click();
            } else {
                const data = await res.json();
                showError(data.message || '저장 중 오류가 발생했습니다.');
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
        } finally {
            saveImageBtn.disabled = false;
            saveImageBtn.innerHTML = '<i class="fa-solid fa-floppy-disk me-1"></i> 저장';
        }
    });

    // ---------------------------------------------------------------
    // 프로필 정보 저장
    // ---------------------------------------------------------------
    document.getElementById('saveProfileBtn').addEventListener('click', async function () {
        clearAlerts();
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';
        try {
            const res = await fetch(API_BASE + '/api/accounts/settings/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json',
                           'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({
                    bio:          document.getElementById('bio').value.trim(),
                    url:          document.getElementById('url').value.trim(),
                    occupation:   document.getElementById('occupation').value.trim(),
                    location:     document.getElementById('location').value.trim(),
                    profileImage: croppedImageDataUrl || undefined
                })
            });
            if (res.ok) {
                showSuccess('프로필이 저장되었습니다.');
            } else {
                const data = await res.json();
                showError(data.message || '저장 중 오류가 발생했습니다.');
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> 프로필 저장';
        }
    });

    // ---------------------------------------------------------------
    // 닉네임 변경
    // ---------------------------------------------------------------
    document.getElementById('saveNicknameBtn').addEventListener('click', async function () {
        clearAlerts();
        document.getElementById('nicknameError').style.display = 'none';

        const nickname = document.getElementById('nickname').value.trim();
        if (!nickname) {
            const el = document.getElementById('nicknameError');
            el.textContent = '닉네임을 입력해주세요.';
            el.style.display = 'block';
            return;
        }

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>변경 중...';
        try {
            const res = await fetch(API_BASE + '/api/accounts/settings/nickname', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json',
                           'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ nickname })
            });
            if (res.ok) {
                showSuccess('닉네임이 변경되었습니다. 변경 사항 적용을 위해 재로그인해주세요.');
            } else {
                const data = await res.json();
                const el = document.getElementById('nicknameError');
                el.textContent = data.message || '닉네임 변경 중 오류가 발생했습니다.';
                el.style.display = 'block';
            }
        } catch (e) {
            showError('서버와 연결할 수 없습니다.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-pen me-1"></i> 닉네임 변경';
        }
    });

    // ---------------------------------------------------------------
    // 헬퍼
    // ---------------------------------------------------------------
    function getToken() { return localStorage.getItem('accessToken') || ''; }

    function showSuccess(msg) {
        document.getElementById('alertSuccessMsg').textContent = msg;
        document.getElementById('alertSuccess').style.display = 'block';
        document.getElementById('alertError').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function showError(msg) {
        document.getElementById('alertErrorMsg').textContent = msg;
        document.getElementById('alertError').style.display = 'block';
        document.getElementById('alertSuccess').style.display = 'none';
    }
    function clearAlerts() {
        document.getElementById('alertSuccess').style.display = 'none';
        document.getElementById('alertError').style.display = 'none';
    }
</script>

</body>
</html>
