<!DOCTYPE html>
<!--
    settings/notifications.html

    [API 엔드포인트]
    PUT /api/accounts/settings/notifications
    body: {
        studyCreatedByEmail, studyCreatedByWeb,
        studyEnrollmentResultByEmail, studyEnrollmentResultByWeb,
        studyUpdatedByEmail, studyUpdatedByWeb
    }

    [필요한 model 속성]
    - account        : AccountSummaryDto  (nav 바)
    - accountSettings: AccountSettingsDto (현재 알림 설정 초기값)
    - apiBase        : String
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head('알림 설정')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="border-bottom bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav class="nav py-2">
                    <a class="nav-link rounded-pill px-3 text-muted" href="/"
                       style="font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-1"></i> 홈
                    </a>
                    <span class="nav-link px-3 fw-semibold"
                          style="color: #8e85b0; font-size: 0.9rem;">
                        <i class="fa-solid fa-gear me-1"></i> 계정 설정
                    </span>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="row g-4">

                <div class="col-md-3">
                    <div th:replace="~{fragments.html :: account-settings-menu('notifications')}"></div>
                </div>

                <div class="col-md-9">

                    <div id="alertSuccess" class="alert border-0 rounded-3 mb-3"
                         style="background: #e8f4ee; color: #4a8a62; display: none;">
                        <i class="fa-solid fa-circle-check me-2"></i>알림 설정이 저장되었습니다.
                    </div>
                    <div id="alertError" class="alert border-0 rounded-3 mb-3"
                         style="background: #fdf0ed; color: #b05a3a; display: none;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="alertErrorMsg"></span>
                    </div>

                    <!-- 안내 메시지 -->
                    <div class="alert alert-primary border-0 rounded-3 mb-4" role="alert">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        스터디와 모임 관련 알림 수신 방식을 설정합니다.
                        웹 알림은 사이트 내 알림 아이콘으로, 이메일 알림은 가입한 이메일로 전송됩니다.
                    </div>

                    <!-- ===== 스터디 생성 알림 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-3">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-start justify-content-between mb-3">
                                <div>
                                    <h6 class="fw-bold mb-1" style="color: #2c2843;">
                                        <i class="fa-solid fa-book-open me-2" style="color: #8e85b0;"></i>
                                        스터디 생성 알림
                                    </h6>
                                    <p class="text-muted small mb-0">
                                        관심 주제·활동 지역과 일치하는 새 스터디가 생성될 때 알림을 받습니다.
                                    </p>
                                </div>
                            </div>
                            <div class="d-flex gap-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyCreatedByWeb" role="switch"
                                           th:checked="${accountSettings?.studyCreatedByWeb}">
                                    <label class="form-check-label" for="studyCreatedByWeb">
                                        <i class="fa-solid fa-globe me-1 text-muted"></i>웹 알림
                                    </label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyCreatedByEmail" role="switch"
                                           th:checked="${accountSettings?.studyCreatedByEmail}">
                                    <label class="form-check-label" for="studyCreatedByEmail">
                                        <i class="fa-solid fa-envelope me-1 text-muted"></i>이메일
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ===== 모임 신청 결과 알림 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-3">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-start justify-content-between mb-3">
                                <div>
                                    <h6 class="fw-bold mb-1" style="color: #2c2843;">
                                        <i class="fa-solid fa-calendar-check me-2" style="color: #7fac8e;"></i>
                                        모임 신청 결과 알림
                                    </h6>
                                    <p class="text-muted small mb-0">
                                        참가 신청한 모임의 결과(선착순 확정, 대기, 취소)를 알립니다.
                                    </p>
                                </div>
                            </div>
                            <div class="d-flex gap-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyEnrollmentResultByWeb" role="switch"
                                           th:checked="${accountSettings?.studyEnrollmentResultByWeb}">
                                    <label class="form-check-label" for="studyEnrollmentResultByWeb">
                                        <i class="fa-solid fa-globe me-1 text-muted"></i>웹 알림
                                    </label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyEnrollmentResultByEmail" role="switch"
                                           th:checked="${accountSettings?.studyEnrollmentResultByEmail}">
                                    <label class="form-check-label" for="studyEnrollmentResultByEmail">
                                        <i class="fa-solid fa-envelope me-1 text-muted"></i>이메일
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ===== 스터디 소식 알림 ===== -->
                    <div class="card border-0 shadow-sm rounded-3 mb-4">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-start justify-content-between mb-3">
                                <div>
                                    <h6 class="fw-bold mb-1" style="color: #2c2843;">
                                        <i class="fa-solid fa-bullhorn me-2" style="color: #bfa473;"></i>
                                        스터디 소식 알림
                                    </h6>
                                    <p class="text-muted small mb-0">
                                        참여 중인 스터디의 새 모임 생성, 소개 변경 등 소식을 알립니다.
                                    </p>
                                </div>
                            </div>
                            <div class="d-flex gap-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyUpdatedByWeb" role="switch"
                                           th:checked="${accountSettings?.studyUpdatedByWeb}">
                                    <label class="form-check-label" for="studyUpdatedByWeb">
                                        <i class="fa-solid fa-globe me-1 text-muted"></i>웹 알림
                                    </label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="studyUpdatedByEmail" role="switch"
                                           th:checked="${accountSettings?.studyUpdatedByEmail}">
                                    <label class="form-check-label" for="studyUpdatedByEmail">
                                        <i class="fa-solid fa-envelope me-1 text-muted"></i>이메일
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 저장 버튼 -->
                    <div class="d-grid">
                        <button id="saveBtn" type="button"
                                class="btn btn-primary rounded-pill">
                            <i class="fa-solid fa-check me-1"></i> 알림 설정 저장
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<script>
    document.getElementById('saveBtn').addEventListener('click', async function () {
        document.getElementById('alertSuccess').style.display = 'none';
        document.getElementById('alertError').style.display = 'none';

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

        try {
            const res = await fetch(API_BASE + '/api/accounts/settings/notifications', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                },
                body: JSON.stringify({
                    studyCreatedByWeb:              document.getElementById('studyCreatedByWeb').checked,
                    studyCreatedByEmail:            document.getElementById('studyCreatedByEmail').checked,
                    studyEnrollmentResultByWeb:     document.getElementById('studyEnrollmentResultByWeb').checked,
                    studyEnrollmentResultByEmail:   document.getElementById('studyEnrollmentResultByEmail').checked,
                    studyUpdatedByWeb:              document.getElementById('studyUpdatedByWeb').checked,
                    studyUpdatedByEmail:            document.getElementById('studyUpdatedByEmail').checked
                })
            });

            if (res.ok) {
                document.getElementById('alertSuccess').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const data = await res.json();
                document.getElementById('alertErrorMsg').textContent =
                    data.message || '저장 중 오류가 발생했습니다.';
                document.getElementById('alertError').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('alertErrorMsg').textContent = '서버와 연결할 수 없습니다.';
            document.getElementById('alertError').style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> 알림 설정 저장';
        }
    });
</script>

</body>
</html>
