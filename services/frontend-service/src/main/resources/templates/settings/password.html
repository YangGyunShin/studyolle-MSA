<!DOCTYPE html>
<!--
    settings/password.html

    [API 엔드포인트]
    PUT /api/accounts/settings/password
    body: { newPassword, newPasswordConfirm }
    — 서버에서 두 값 일치 여부를 확인한다.

    [필요한 model 속성]
    - account        : AccountSummaryDto  (nav 바)
    - accountSettings: AccountSettingsDto (사용하지 않지만 공통 model 에 포함)
    - apiBase        : String
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments.html :: head('비밀번호 변경')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="border-bottom bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav class="nav py-2">
                    <a class="nav-link rounded-pill px-3 text-muted" href="/"
                       style="font-size: 0.9rem;">
                        <i class="fa-solid fa-house me-1"></i> 홈
                    </a>
                    <span class="nav-link px-3 fw-semibold"
                          style="color: #8e85b0; font-size: 0.9rem;">
                        <i class="fa-solid fa-gear me-1"></i> 계정 설정
                    </span>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="row g-4">

                <div class="col-md-3">
                    <div th:replace="~{fragments.html :: account-settings-menu('password')}"></div>
                </div>

                <div class="col-md-9">

                    <div id="alertSuccess" class="alert border-0 rounded-3 mb-3"
                         style="background: #e8f4ee; color: #4a8a62; display: none;">
                        <i class="fa-solid fa-circle-check me-2"></i>비밀번호가 변경되었습니다.
                    </div>
                    <div id="alertError" class="alert border-0 rounded-3 mb-3"
                         style="background: #fdf0ed; color: #b05a3a; display: none;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span id="alertErrorMsg"></span>
                    </div>

                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-white border-bottom pt-3 pb-2">
                            <h6 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-lock text-primary me-2"></i>비밀번호 변경
                            </h6>
                        </div>
                        <div class="card-body p-4">

                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">
                                    새 비밀번호 <span class="text-danger">*</span>
                                </label>
                                <input id="newPassword" type="password" class="form-control"
                                       placeholder="8자 이상 입력해 주세요." minlength="8">
                                <div id="passwordError" class="text-danger small mt-1"
                                     style="display: none;"></div>
                            </div>

                            <div class="mb-4">
                                <label for="newPasswordConfirm" class="form-label fw-semibold">
                                    새 비밀번호 확인 <span class="text-danger">*</span>
                                </label>
                                <input id="newPasswordConfirm" type="password" class="form-control"
                                       placeholder="비밀번호를 한 번 더 입력해 주세요.">
                                <div id="confirmError" class="text-danger small mt-1"
                                     style="display: none;"></div>
                            </div>

                            <div class="d-grid">
                                <button id="saveBtn" type="button"
                                        class="btn btn-primary rounded-pill">
                                    <i class="fa-solid fa-check me-1"></i> 비밀번호 변경
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>

<script>
    document.getElementById('saveBtn').addEventListener('click', async function () {
        // 에러 초기화
        ['passwordError', 'confirmError'].forEach(function (id) {
            const el = document.getElementById(id);
            el.textContent = '';
            el.style.display = 'none';
        });
        document.getElementById('alertSuccess').style.display = 'none';
        document.getElementById('alertError').style.display = 'none';

        const newPassword        = document.getElementById('newPassword').value;
        const newPasswordConfirm = document.getElementById('newPasswordConfirm').value;

        // 클라이언트 검증
        if (newPassword.length < 8) {
            const el = document.getElementById('passwordError');
            el.textContent = '비밀번호는 8자 이상이어야 합니다.';
            el.style.display = 'block';
            return;
        }
        if (newPassword !== newPasswordConfirm) {
            const el = document.getElementById('confirmError');
            el.textContent = '비밀번호가 일치하지 않습니다.';
            el.style.display = 'block';
            return;
        }

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>변경 중...';

        try {
            const res = await fetch(API_BASE + '/api/accounts/settings/password', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '')
                },
                body: JSON.stringify({ newPassword, newPasswordConfirm })
            });

            if (res.ok) {
                document.getElementById('alertSuccess').style.display = 'block';
                document.getElementById('newPassword').value = '';
                document.getElementById('newPasswordConfirm').value = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const data = await res.json();
                document.getElementById('alertErrorMsg').textContent =
                    data.message || '비밀번호 변경 중 오류가 발생했습니다.';
                document.getElementById('alertError').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('alertErrorMsg').textContent = '서버와 연결할 수 없습니다.';
            document.getElementById('alertError').style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> 비밀번호 변경';
        }
    });
</script>

</body>
</html>
