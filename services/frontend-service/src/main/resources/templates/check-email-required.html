<!--
  check-email-required.html

  ====================================================================
  용도: 이메일 인증 안 한 사용자가 인증 필수 기능(스터디 생성, 모임 생성 등)에
        접근하려고 할 때 EmailVerifiedInterceptor 가 여기로 리다이렉트한다.

  [모노리틱의 유사 페이지와의 차이]
  모노리틱에서는 Spring Security 가 403 Forbidden 에러 페이지로 직행했다.
  MSA 에서는 리다이렉트로 안내 페이지를 거치게 해서 "왜 막혔는지 + 무엇을 해야 하는지" 를
  명확히 안내하고 즉시 해결(메일 재전송) 할 수 있게 한다.

  [페이지의 세 가지 역할]
  1. "인증이 필요하다" 를 명확히 알림 (사용자가 왜 막혔는지 이해)
  2. "어떻게 해결하는가" 를 제시 (메일 재전송, 스팸함 확인 등)
  3. "대안 경로" 를 제공 (홈으로 돌아가기, 로그아웃)

  [Model 속성 — Controller 가 주입]
  account   : AccountSummaryDto (이메일 주소 표시용, 네비게이션 바 렌더링용)
  apiBase   : String (재전송 API 호출용, http://localhost:8080)

  [기존 check-email.html 과의 차이]
  - check-email.html         : "방금 회원가입 했고 인증 메일이 갔으니 확인하세요" (신규 가입자)
  - check-email-required.html: "인증 안 한 상태에서 뭔가 하려다 막혔으니 인증하세요" (기존 사용자)
  둘 다 재전송 버튼을 가지지만 맥락과 톤이 다르다.
-->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('이메일 인증 필요')}"></head>

<body style="background: #f8f7fc;">

    <!-- 상단 네비게이션 (로그인 상태이므로 프로필 드롭다운 표시됨) -->
    <nav th:replace="~{fragments :: main-nav}"></nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <!-- 메인 카드 -->
                <div class="card border-0 shadow-sm rounded-3 overflow-hidden">

                    <!-- 상단 배너 — 경고 톤의 그라데이션 -->
                    <div class="p-4 text-center"
                         style="background: linear-gradient(135deg, #bfa473 0%, #c4917e 100%);">
                        <div class="mb-3">
                            <i class="fa-solid fa-envelope-circle-check"
                               style="font-size: 3rem; color: white;"></i>
                        </div>
                        <h3 class="text-white fw-bold mb-1">이메일 인증이 필요합니다</h3>
                        <p class="text-white mb-0" style="opacity: 0.9; font-size: 0.9rem;">
                            이 기능은 이메일 인증을 완료한 회원만 이용할 수 있습니다
                        </p>
                    </div>

                    <!-- 본문 -->
                    <div class="card-body p-4">

                        <!-- 현재 이메일 주소 표시 -->
                        <div class="alert border-0 rounded-3 mb-4"
                             style="background: #f0ece8; color: #2c2843;">
                            <div class="d-flex align-items-center">
                                <i class="fa-solid fa-at me-3"
                                   style="font-size: 1.3rem; color: #8e85b0;"></i>
                                <div class="flex-grow-1">
                                    <div class="small text-muted mb-1">가입한 이메일 주소</div>
                                    <div class="fw-semibold" th:text="${account?.email}">your@email.com</div>
                                </div>
                            </div>
                        </div>

                        <!-- 안내 카드 — 이메일 확인 방법 -->
                        <div class="mb-4">
                            <h6 class="fw-bold mb-3" style="color: #2c2843;">
                                <i class="fa-solid fa-circle-info me-2" style="color: #8e85b0;"></i>
                                인증 메일을 받지 못하셨나요?
                            </h6>
                            <ol class="ps-3 mb-0" style="font-size: 0.9rem; color: #5a5668;">
                                <li class="mb-2">
                                    이메일의 <strong>스팸 메일함</strong>을 확인해 주세요.
                                </li>
                                <li class="mb-2">
                                    발신자가 <code class="small">noreply@studyolle.com</code> 인 메일을 찾아보세요.
                                </li>
                                <li class="mb-0">
                                    그래도 없다면 아래의 <strong>인증 메일 재전송</strong> 버튼을 눌러주세요.
                                </li>
                            </ol>
                        </div>

                        <!-- 주 버튼: 인증 메일 재전송 -->
                        <button type="button" id="resendBtn"
                                class="btn w-100 text-white fw-semibold py-2 rounded-pill mb-3"
                                style="background: #7fac8e; border: none; font-size: 0.95rem;">
                            <i class="fa-solid fa-paper-plane me-2"></i>
                            <span id="resendBtnText">인증 메일 재전송</span>
                        </button>

                        <!-- 재전송 결과 메시지 — JS 가 내용과 색상을 동적으로 채움 -->
                        <div id="resendMsg" class="text-center small mb-3"
                             style="display: none; padding: 0.5rem;"></div>

                        <!-- 보조 액션: 홈으로 / 로그아웃 -->
                        <div class="d-flex gap-2 justify-content-center pt-2 border-top">
                            <a href="/" class="btn btn-link text-muted text-decoration-none small">
                                <i class="fa-solid fa-house me-1"></i>홈으로 돌아가기
                            </a>
                            <span class="text-muted">·</span>
                            <a href="#" onclick="handleLogout(event)"
                               class="btn btn-link text-decoration-none small"
                               style="color: #c4917e;">
                                <i class="fa-solid fa-right-from-bracket me-1"></i>로그아웃
                            </a>
                        </div>

                    </div>
                </div>

                <!-- 하단 부가 안내 -->
                <p class="text-center text-muted small mt-3 mb-0">
                    이메일이 다른 주소로 잘못 등록되었다면<br>
                    <a href="/settings/profile" class="text-decoration-none"
                       style="color: #8e85b0;">계정 탈퇴 후 재가입</a>이 필요합니다.
                </p>

            </div>
        </div>
    </main>

    <!-- footer — 공통 JS (handleLogout 함수 포함) -->
    <div th:replace="~{fragments :: footer}"></div>

    <!--
      ============================================================
      인증 메일 재전송 JS
      ============================================================

      기존 check-email.html 의 로직을 거의 그대로 가져왔다.
      차이점: 쿨다운이 끝난 후 버튼 복구 시 아이콘 + 텍스트 구조를 유지하기 위해
      스팬을 별도로 조작한다.
    -->
    <script th:inline="javascript">
        /*<![CDATA[*/

        // Thymeleaf 에서 주입되는 값들
        // account 가 null 이면 이 페이지에 도달하지 못하므로 email 은 항상 존재해야 한다.
        var USER_EMAIL = /*[[${account?.email}]]*/ '';

        var resendBtn = document.getElementById('resendBtn');
        var resendBtnText = document.getElementById('resendBtnText');
        var resendMsg = document.getElementById('resendMsg');
        var cooldown = false;

        resendBtn.addEventListener('click', async function () {
            if (cooldown) return;

            if (!USER_EMAIL) {
                showMsg('이메일 정보를 찾을 수 없습니다. 다시 로그인해 주세요.', false);
                return;
            }

            // 쿨다운 시작 + UI 업데이트
            cooldown = true;
            resendBtn.disabled = true;
            resendBtn.style.opacity = '0.6';
            resendBtnText.textContent = '발송 중...';

            try {
                // POST /api/auth/resend-confirm-email?email=xxx
                // 쿼리 파라미터 방식임에 주의 (@RequestParam)
                var res = await fetch(
                    API_BASE + '/api/auth/resend-confirm-email?email=' + encodeURIComponent(USER_EMAIL),
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    }
                );

                if (res.ok) {
                    showMsg('인증 메일을 다시 발송했습니다. 메일함(스팸함 포함)을 확인해 주세요.', true);
                } else {
                    // account-service 의 1시간 쿨다운에 걸린 경우 등
                    var data = await res.json().catch(function () { return null; });
                    var errMsg = (data && data.message)
                        ? data.message
                        : '발송에 실패했습니다. 잠시 후 다시 시도해 주세요.';
                    showMsg(errMsg, false);
                }
            } catch (e) {
                showMsg('서버와 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.', false);
                console.error('재발송 요청 실패:', e);
            } finally {
                // 5초 후 재시도 허용 (account-service 의 DB 레벨 1시간 쿨다운과 별개로
                // 연타 방지용 클라이언트 쿨다운이다)
                setTimeout(function () {
                    resendBtn.disabled = false;
                    resendBtn.style.opacity = '1';
                    resendBtnText.textContent = '인증 메일 재전송';
                    cooldown = false;
                }, 5000);
            }
        });

        function showMsg(text, isSuccess) {
            resendMsg.textContent = text;
            resendMsg.style.display = 'block';
            resendMsg.style.borderRadius = '8px';
            if (isSuccess) {
                resendMsg.style.background = 'rgba(127, 172, 142, 0.12)';
                resendMsg.style.color = '#3d6b4a';
                resendMsg.style.border = '1px solid rgba(127, 172, 142, 0.3)';
            } else {
                resendMsg.style.background = 'rgba(196, 145, 126, 0.12)';
                resendMsg.style.color = '#a06850';
                resendMsg.style.border = '1px solid rgba(196, 145, 126, 0.3)';
            }
        }

        /*]]>*/
    </script>

</body>
</html>
