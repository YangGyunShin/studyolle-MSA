server:
  port: 8090

spring:
  application:
    name: frontend-service
  thymeleaf:
    cache: false  # 개발 중 템플릿 수정 즉시 반영 (운영 배포 시 true로 변경)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  api-base-url: http://localhost:8080    # api-gateway 주소. 모든 fetch()가 이 주소로 향함.
  frontend-base-url: http://localhost:8090  # frontend-service 자신의 주소.
