server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5433/account_db
    username: studyolle
    password: studyolle
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  # 개발용 콘솔 메일 (실제 SMTP 설정 전까지 콘솔에 출력)
  mail:
    host: localhost
    port: 25

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일

app:
  host: http://localhost:8090  # frontend-service 주소 - 이메일 인증 링크의 호스트