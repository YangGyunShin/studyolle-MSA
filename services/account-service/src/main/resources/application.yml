server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5433/account_db
    username: studyolle
    password: studyolle
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: localhost
    port: 25

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일

app:
  # 이메일 인증 링크의 호스트.
  # 브라우저가 링크를 클릭하면 api-gateway(8080)로 들어오고,
  # api-gateway가 /check-email-token 경로를 frontend-service로 라우팅한다.
  # frontend-service의 JS가 토큰 검증 API를 호출하고 JWT를 localStorage에 저장한다.
  host: http://localhost:8080
