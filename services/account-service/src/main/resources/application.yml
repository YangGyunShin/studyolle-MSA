server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5433/account_db
    username: studyolle
    password: studyolle
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# JWT 설정
jwt:
  secret: studyolle-msa-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 1800000   # 30분
  refresh-token-expiration: 604800000 # 7일