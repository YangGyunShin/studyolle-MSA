server:
  port: 8084

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://localhost:5435/event_db
    username: studyolle
    password: studyolle
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 100

  # RabbitMQ Producer 설정 (Phase 5) — notification-service 로 enrollment 이벤트 발행
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
