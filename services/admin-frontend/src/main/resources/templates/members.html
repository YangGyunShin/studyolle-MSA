<!--
  admin-frontend 회원 관리 페이지 (GET /members)

  [데이터 흐름 — 목록 조회]
  브라우저
    → GET /members?keyword=...&page=...   (admin-gateway 경유, OptionalJwtFilter 가 토큰 검증)
    → admin-frontend AdminMemberController.members()
    → AdminInternalClient.listMembers()
    → admin-service GET /api/admin/members
    → AccountAdminClient (Feign)
    → account-service GET /internal/accounts
    → account_db

  한 번의 페이지 요청을 위해 다섯 번의 네트워크 호출이 일어난다. 모놀리틱이었다면
  account.findAll() 한 줄이면 됐을 일이 MSA 에서는 이렇게 늘어난다. 이것이 MSA 의
  본질적인 오버헤드이며, 성능 문제의 주된 원인이다. 대신 각 서비스가 독립적으로
  배포·확장·장애 격리될 수 있다는 이점을 얻는다.

  [데이터 흐름 — 권한 변경 (Phase 8)]
  브라우저 fetch
    → POST /members/{id}/role  body: { role: "ROLE_ADMIN" }
    → admin-frontend AdminMemberController.updateMemberRole()
    → AdminInternalClient.updateMemberRole()
    → admin-service PATCH /api/admin/members/{id}/role
    → AccountAdminClient.updateRole() (Feign)
    → account-service PATCH /internal/accounts/{id}/role
    → AccountInternalService.updateRole() — 자기 자신/유효 role 검증 후 DB UPDATE

  성공 응답이 같은 길을 거꾸로 올라와 fetch 의 then 블록에서 수신되며,
  JS 가 페이지 새로고침 없이 해당 행의 배지/버튼만 즉석에서 갱신한다.

  [페이지 모델 속성 — 컨트롤러가 주입하는 값]
  members           List<AdminMemberDto>   현재 페이지의 회원 목록
  totalElements     long                    전체 회원 수
  totalPages        int                     전체 페이지 수
  currentPage       int                     현재 페이지 번호 (0-base)
  pageSize          int                     페이지 크기
  keyword           String                  검색어 (없으면 빈 문자열)
  currentAccountId  Long                    현재 로그인한 관리자의 id (본인 행 식별용)
-->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('회원 관리')}"></head>

<body>

    <nav th:replace="~{fragments :: admin-nav('members')}"></nav>

    <main class="admin-main">

        <div class="page-header">
            <h1 class="page-title">회원 관리</h1>
            <p class="page-subtitle">
                이메일이나 닉네임으로 회원을 검색하고, 계정 상태와 권한을 변경할 수 있습니다.
            </p>
        </div>

        <!--
          토스트 메시지 영역.

          권한 변경 결과를 화면 상단에 잠깐 보여주고 자동으로 사라지게 한다.
          페이지 로드 시점에는 비어 있고, JS 가 동적으로 메시지 카드를 추가/제거한다.
          position: sticky 로 스크롤해도 화면에 따라오게 만들면 더 좋지만,
          여기서는 단순히 페이지 흐름 안에 두어 일반적인 alert 처럼 동작시킨다.
        -->
        <div id="toast-area" class="toast-area" aria-live="polite"></div>

        <!--
          검색 툴바

          GET 방식의 전통적 HTML form 을 쓴다. Submit 하면 브라우저가 자동으로
          쿼리 파라미터를 붙여 /members?keyword=... 로 이동시켜준다. JS 없이도
          동작하며, 뒤로 가기·북마크·검색 기록 같은 브라우저 네이티브 기능을
          그대로 활용할 수 있다.

          page 파라미터는 form 에 포함시키지 않는다. 새로운 키워드로 검색할 때는
          언제나 첫 페이지부터 보여주는 것이 자연스럽기 때문이다. (3페이지에서
          검색어를 바꿨는데 여전히 3페이지로 가면 결과가 없을 수 있다.)
        -->
        <form method="get" action="/members" class="toolbar">
            <input type="text"
                   name="keyword"
                   class="form-input"
                   placeholder="이메일 또는 닉네임으로 검색..."
                   th:value="${keyword}">
            <div class="toolbar-meta">
                총 <strong th:text="${totalElements}">0</strong>명
            </div>
            <button type="submit" class="btn btn-primary btn-sm">검색</button>
            <a th:if="${keyword != null and keyword != ''}"
               href="/members"
               class="btn btn-ghost btn-sm">초기화</a>
        </form>

        <!-- 회원이 한 명이라도 있을 때는 테이블을 보여주고, 아무도 없으면 빈 상태를 보여준다.
             Thymeleaf 의 th:if 와 th:unless 를 한 쌍으로 묶어 분기한다. -->
        <div th:if="${not #lists.isEmpty(members)}" class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 70px;">ID</th>
                        <th>이메일</th>
                        <th>닉네임</th>
                        <th>권한</th>
                        <th>이메일 인증</th>
                        <th class="hide-sm" style="text-align: center;">태그</th>
                        <th class="hide-sm" style="text-align: center;">지역</th>
                        <th style="width: 160px; text-align: center;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <!--
                      각 행에 data-member-id 와 data-member-role 을 박아둔다.
                      JS 가 fetch 응답을 받았을 때 이 속성을 단서로 정확한 행을 찾아내
                      배지와 버튼을 새로 그려넣는다. data-* 속성은 HTML5 표준이며
                      JS 의 element.dataset 으로 깔끔하게 읽을 수 있다.
                    -->
                    <tr th:each="m : ${members}"
                        th:attr="data-member-id=${m.id}, data-member-role=${m.role}">
                        <td class="col-id" th:text="${m.id}">1</td>
                        <td class="col-email" th:text="${m.email}">user@example.com</td>
                        <td class="col-nickname" th:text="${m.nickname}">닉네임</td>
                        <td class="cell-role">
                            <!-- role 에 따라 다른 배지 색상.
                                 권한 변경 후 JS 가 이 셀의 innerHTML 을 통째로 교체한다. -->
                            <span class="badge"
                                  th:classappend="${m.role == 'ROLE_ADMIN'} ? ' badge-admin' : ' badge-user'"
                                  th:text="${m.role == 'ROLE_ADMIN'} ? 'ADMIN' : 'USER'">USER</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${m.emailVerified} ? ' badge-verified' : ' badge-unverified'"
                                  th:text="${m.emailVerified} ? '인증됨' : '미인증'">미인증</span>
                        </td>
                        <td class="hide-sm" style="text-align: center;" th:text="${m.tagCount}">0</td>
                        <td class="hide-sm" style="text-align: center;" th:text="${m.zoneCount}">0</td>

                        <!--
                          관리 컬럼.

                          본인 계정 행에서는 버튼 자리에 "본인 계정" 안내 텍스트만 띄운다.
                          th:if 로 currentAccountId 와 비교해 분기한다.
                          이렇게 서버 사이드에서 미리 렌더링을 분기해두면, JS 가 켜지지 않은
                          상태에서도 (예: 스크린리더, 또는 JS 비활성 환경) 본인 계정에는
                          애초에 위험한 버튼이 노출되지 않는다.

                          본인이 아니면 토글 버튼 하나를 보여준다:
                            - 현재 ROLE_USER  → "관리자로 승격" 버튼 (파란 강조)
                            - 현재 ROLE_ADMIN → "사용자로 강등" 버튼 (회색 차분)
                          버튼의 data-target-role 속성에 "전환 후 원하는 role" 을 박아
                          JS 가 그 값을 그대로 fetch 본문에 실어 보낸다.
                        -->
                        <td class="cell-actions" style="text-align: center;">
                            <span th:if="${m.id == currentAccountId}"
                                  class="muted-text" style="font-size: 0.85em; opacity: 0.6;">
                                본인 계정
                            </span>
                            <button th:if="${m.id != currentAccountId and m.role != 'ROLE_ADMIN'}"
                                    type="button"
                                    class="btn btn-primary btn-sm btn-role-change"
                                    data-target-role="ROLE_ADMIN">
                                관리자로 승격
                            </button>
                            <button th:if="${m.id != currentAccountId and m.role == 'ROLE_ADMIN'}"
                                    type="button"
                                    class="btn btn-ghost btn-sm btn-role-change"
                                    data-target-role="ROLE_USER">
                                사용자로 강등
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 빈 상태 —
             검색 결과가 없을 때와 애초에 회원이 한 명도 없을 때 두 경우를 구분해서
             다른 메시지를 보여주면 UX 가 훨씬 좋다. -->
        <div th:if="${#lists.isEmpty(members)}" class="card">
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-title"
                     th:text="${keyword != null and keyword != ''} ?
                              '검색 결과가 없습니다' :
                              '등록된 회원이 없습니다'">검색 결과가 없습니다</div>
                <div class="empty-state-sub"
                     th:if="${keyword != null and keyword != ''}">
                    '<span th:text="${keyword}">keyword</span>' 에 해당하는 회원을 찾을 수 없습니다.
                </div>
            </div>
        </div>

        <!--
          페이지네이션

          전체 페이지 수가 2개 이상일 때만 보여준다. 페이지가 하나뿐이면 굳이 그릴 필요 없다.

          currentPage 는 0-base 이므로 사용자에게 보여줄 때는 +1 해서 1-base 로 변환한다.
          Thymeleaf 의 #numbers.sequence(start, end) 는 start 부터 end 까지의 정수 리스트를
          만들어주는 유틸이다. 여기서는 0 부터 totalPages-1 까지를 만들어 페이지 링크를 생성한다.

          실제 서비스에서는 페이지가 수백 개가 될 수 있으므로 "앞뒤 몇 페이지만 보이고
          나머지는 ... 으로 생략" 하는 전략을 쓰는 게 보통이지만, 학습 프로젝트에서는
          단순한 전체 표시로 충분하다.
        -->
        <div th:if="${totalPages > 1}" class="pagination">

            <!-- 이전 페이지 링크.
                 현재가 0페이지면 disabled 상태로 표시한다. -->
            <a th:href="@{/members(keyword=${keyword}, page=${currentPage - 1})}"
               class="page-link"
               th:classappend="${currentPage == 0} ? ' disabled'">‹</a>

            <!-- 각 페이지 번호 링크 -->
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/members(keyword=${keyword}, page=${i})}"
               class="page-link"
               th:classappend="${i == currentPage} ? ' active'"
               th:text="${i + 1}">1</a>

            <!-- 다음 페이지 링크 -->
            <a th:href="@{/members(keyword=${keyword}, page=${currentPage + 1})}"
               class="page-link"
               th:classappend="${currentPage >= totalPages - 1} ? ' disabled'">›</a>

        </div>

    </main>

    <!--
      ============================================================
      회원 관리 페이지 전용 JS

      [왜 외부 .js 파일이 아니라 인라인인가]
      이 스크립트는 오직 members.html 에서만 쓰이고, 행 갱신·토스트 로직은
      이 페이지의 마크업 구조에 강하게 결합되어 있다. 외부 파일로 빼면 한
      파일에서 다른 파일을 오가며 읽어야 해서 가독성이 오히려 떨어진다.
      여러 페이지가 공유하는 공통 유틸이 생기면 그때 /js/admin-common.js 같은
      파일로 분리하는 것이 자연스럽다.

      [전체 흐름]
      1. 페이지 로드 후 .btn-role-change 버튼들에 클릭 리스너를 한 번에 위임 등록
      2. 클릭되면 행에서 memberId 를, 버튼에서 targetRole 을 읽어 fetch 호출
      3. 서버 응답이 success: true 면 행의 배지와 버튼을 새 role 에 맞게 다시 그림
      4. 결과 메시지를 토스트로 띄움 (3초 후 자동 사라짐)

      [에러 처리]
      네트워크 실패, 권한 없음(403), 자기 자신 변경 시도(400), 서버 에러(500)
      모두 토스트로 사용자에게 알려주고, 행 상태는 변경하지 않는다.
      ============================================================
    -->
    <script th:inline="javascript">
        /*<![CDATA[*/

        // -------------------------------------------------------
        // (1) 토스트 헬퍼 — 메시지를 띄우고 3초 뒤 사라지게 한다
        // -------------------------------------------------------
        var toastArea = document.getElementById('toast-area');

        function showToast(message, type) {
            // type: 'success' | 'error' — CSS 클래스 분기에 사용
            var box = document.createElement('div');
            box.className = 'toast toast-' + (type || 'success');
            box.textContent = message;
            toastArea.appendChild(box);

            // 3초 후 페이드 아웃 트랜지션을 위해 클래스를 토글하고,
            // 트랜지션 끝나면 DOM 에서 완전히 제거한다.
            setTimeout(function () {
                box.classList.add('toast-leaving');
                setTimeout(function () { box.remove(); }, 300);
            }, 3000);
        }

        // -------------------------------------------------------
        // (2) 버튼 클릭 핸들러 — 이벤트 위임 패턴
        //
        // 버튼마다 addEventListener 를 다는 대신 document 에 한 번만 달고
        // event.target 으로 클릭된 요소를 판별한다. 이렇게 하면 나중에 행이
        // 동적으로 추가되어도 새 핸들러를 달 필요가 없다.
        // -------------------------------------------------------
        document.addEventListener('click', function (event) {
            var btn = event.target.closest('.btn-role-change');
            if (!btn) return;   // 다른 버튼 클릭은 무시

            var row = btn.closest('tr');
            var memberId = row.dataset.memberId;
            var nickname = row.querySelector('.col-nickname').textContent.trim();
            var targetRole = btn.dataset.targetRole;

            // 사용자 확인 — 권한 변경은 되돌릴 수 있지만 예방적으로 확인을 받는다
            var roleLabel = (targetRole === 'ROLE_ADMIN') ? '관리자' : '일반 사용자';
            if (!confirm(nickname + ' 님을 ' + roleLabel + ' 로 변경하시겠습니까?')) {
                return;
            }

            // 중복 클릭 방지 — 응답 받기 전까지 버튼을 비활성화
            btn.disabled = true;
            var originalText = btn.textContent;
            btn.textContent = '처리 중...';

            // -------------------------------------------------------
            // (3) fetch 호출
            //
            // credentials: 'same-origin' 은 같은 출처라면 쿠키를 자동 포함한다.
            // admin-frontend 는 :9000 에서 직접 서비스되지만, 사용자는 보통
            // admin-gateway :9080 을 통해 접근한다. 그 경우에도 쿠키가 따라오게 하려면
            // same-origin 으로 충분하다 (출처가 같은 도메인이므로).
            // -------------------------------------------------------
            fetch('/members/' + memberId + '/role', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ role: targetRole })
            })
                .then(function (res) {
                    // 응답 상태와 본문을 함께 받아 분기 처리.
                    // res.json() 은 Promise 를 반환하므로 then 체인으로 풀어준다.
                    return res.json().then(function (data) {
                        return { ok: res.ok, status: res.status, data: data };
                    });
                })
                .then(function (result) {
                    if (result.ok && result.data.success) {
                        // ── 성공 경로 ─────────────────────────────────
                        applyRoleChange(row, result.data.role);
                        showToast(nickname + ' 님이 ' + roleLabel + ' 로 변경되었습니다.', 'success');
                    } else {
                        // ── 실패 경로 (서버가 success: false 를 명시했거나 4xx/5xx) ──
                        var msg = (result.data && result.data.message) || '알 수 없는 오류가 발생했습니다.';
                        showToast(msg, 'error');
                        // 버튼 원상 복구
                        btn.disabled = false;
                        btn.textContent = originalText;
                    }
                })
                .catch(function (err) {
                    // ── 네트워크 자체 실패 (서버 다운, 끊김 등) ──
                    console.error('권한 변경 호출 실패', err);
                    showToast('네트워크 오류로 권한 변경에 실패했습니다.', 'error');
                    btn.disabled = false;
                    btn.textContent = originalText;
                });
        });

        // -------------------------------------------------------
        // (4) 행 갱신 함수 — 응답 받은 새 role 로 배지와 버튼을 재구성
        //
        // 페이지 새로고침 없이 즉석에서 업데이트하면 사용자 입장에서
        // 클릭 → 즉시 변화가 보여 반응성이 좋다. 다음 페이지 이동이나
        // 검색 시점에 어차피 서버에서 최신 값을 다시 받아오므로
        // 화면과 DB 가 영구적으로 어긋날 위험은 없다.
        // -------------------------------------------------------
        function applyRoleChange(row, newRole) {
            // 1. 행의 data 속성 업데이트
            row.dataset.memberRole = newRole;

            // 2. 권한 배지 셀 다시 그리기
            var roleCell = row.querySelector('.cell-role');
            var isAdmin = (newRole === 'ROLE_ADMIN');
            roleCell.innerHTML =
                '<span class="badge ' + (isAdmin ? 'badge-admin' : 'badge-user') + '">'
                + (isAdmin ? 'ADMIN' : 'USER')
                + '</span>';

            // 3. 버튼 셀 다시 그리기 — 다음 토글 방향으로 라벨 전환
            var actionsCell = row.querySelector('.cell-actions');
            var nextRole = isAdmin ? 'ROLE_USER' : 'ROLE_ADMIN';
            var nextLabel = isAdmin ? '사용자로 강등' : '관리자로 승격';
            var nextClass = isAdmin ? 'btn-ghost' : 'btn-primary';
            actionsCell.innerHTML =
                '<button type="button" class="btn ' + nextClass + ' btn-sm btn-role-change" '
                + 'data-target-role="' + nextRole + '">'
                + nextLabel
                + '</button>';
        }

        /*]]>*/
    </script>

    <!--
