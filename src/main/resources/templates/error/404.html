<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     커스텀 404 에러 페이지

     [Spring Boot 자동 인식]
     Spring Boot의 BasicErrorController는 HTTP 상태 코드에 맞는
     템플릿을 자동으로 찾습니다:
       - templates/error/404.html → 404 Not Found
       - templates/error/500.html → 500 Internal Server Error
       - templates/error.html     → 그 외 모든 에러 (범용 폴백)

     별도 설정 없이 이 파일을 두기만 하면 자동 적용됩니다.

     [v2 개선사항]
     - 인라인 style → main-style.css 클래스(.error-code) 분리
     - 배경 오브 3개로 통일 (랜딩 페이지와 일관성)
     - 뒤로가기 <a onclick> → <button> 태그 (접근성 개선)
     ============================================================ -->
<head th:replace="fragments.html :: head"></head>
<body class="page-main">

<!-- ✅ 네비게이션 바 -->
<div th:replace="fragments.html :: main-nav"></div>

<!-- ✅ 배경 장식 오브 (랜딩 페이지와 동일하게 3개) -->
<!-- page-orb 제거 (v4 Warm Flat Minimal) -->

<!-- ✅ 404 메인 콘텐츠 -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <!-- 404 숫자 (인라인 style → .error-code 클래스) -->
            <div class="error-code">404</div>

            <h2 class="fw-bold mb-3">페이지를 찾을 수 없습니다</h2>
            <p class="text-muted mb-4">
                요청하신 페이지가 존재하지 않거나, 이동되었거나, 삭제되었을 수 있습니다.
            </p>

            <!-- 스터디 검색 -->
            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-body p-4">
                    <p class="text-muted small mb-3">
                        <i class="fa-solid fa-magnifying-glass me-1"></i>
                        찾고 있는 스터디가 있다면 검색해보세요
                    </p>
                    <form th:action="@{/search/study}" method="get" class="d-flex gap-2">
                        <input class="form-control" name="keyword" type="search"
                               placeholder="스터디 이름, 태그, 지역으로 검색">
                        <button class="btn btn-primary rounded-pill px-4" type="submit">검색</button>
                    </form>
                </div>
            </div>

            <!-- 네비게이션 링크 (접근성: <a onclick> → <button>) -->
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/}" class="btn btn-outline-primary rounded-pill px-4">
                    <i class="fa-solid fa-house me-1"></i> 홈으로
                </a>
                <button type="button" onclick="history.back()" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="fa-solid fa-arrow-left me-1"></i> 이전 페이지
                </button>
            </div>

        </div>
    </div>
</div>

<!-- ✅ 푸터 -->
<div th:replace="fragments.html :: footer"></div>

</body>
</html>
