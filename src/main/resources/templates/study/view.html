<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- ============================================================
     스터디 상세 페이지 (통합 뷰)

     [리팩터링]
     기존에는 소개/구성원/모임이 각각 별도 탭 페이지였으나,
     사용성 개선을 위해 한 페이지에 모두 표시합니다.
     설정만 별도 페이지로 분리됩니다.
     ============================================================ -->
<head th:replace="fragments.html :: head"></head>

<body>
<div th:replace="fragments.html :: main-nav"></div>
<div th:replace="fragments.html :: study-banner"></div>
<div th:replace="fragments.html :: study-info"></div>

<!-- ============================
     본문 시작: 소개 + 구성원 + 모임
     ============================ -->
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- ========== 1. 소개 ========== -->
            <div class="mb-5">
                <h5 class="fw-bold mb-3 d-flex align-items-center">
                    <i class="fa-solid fa-circle-info me-2 section-icon"></i> 소개
                </h5>
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-4" th:utext="${study.fullDescription}">
                        스터디 상세 소개 내용
                    </div>
                </div>
                <!-- 소개가 비어있을 때 -->
                <div th:if="${#strings.isEmpty(study.fullDescription)}"
                     class="text-center py-5 text-muted">
                    <div class="empty-icon empty-icon-indigo mb-2">
                        <i class="fa-solid fa-pen-fancy"></i>
                    </div>
                    <p class="mb-0 small">아직 상세 소개가 작성되지 않았습니다.</p>
                </div>
            </div>

            <!-- 섹션 구분선 -->
            <div class="section-divider"></div>

            <!-- ========== 2. 구성원 ========== -->
            <div class="mb-5">
                <h5 class="fw-bold mb-3 d-flex align-items-center">
                    <i class="fa-solid fa-users me-2 section-icon-violet"></i> 구성원
                    <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill ms-2 fw-normal"
                          th:text="${study.managers.size() + study.members.size()} + '명'">0명</span>
                </h5>

                <!-- 관리자 -->
                <div class="mb-3" th:if="${study.managers.size() > 0}">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-crown text-warning me-1"></i> 관리자
                    </p>
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4" th:each="manager : ${study.managers}">
                            <a th:href="@{'/profile/' + ${manager.nickname}}" class="text-decoration-none">
                                <div class="card border-0 shadow-sm rounded-3 h-100 hover-lift">
                                    <div class="card-body d-flex align-items-center p-3">
                                        <svg th:if="${#strings.isEmpty(manager?.profileImage)}"
                                             th:data-jdenticon-value="${manager.nickname}"
                                             width="48" height="48" class="rounded-circle border flex-shrink-0 me-3"></svg>
                                        <img th:if="${!#strings.isEmpty(manager?.profileImage)}"
                                             th:src="${manager?.profileImage}"
                                             width="48" height="48" class="rounded-circle border object-fit-cover flex-shrink-0 me-3"/>
                                        <div>
                                            <span class="fw-semibold text-dark" th:text="${manager.nickname}">닉네임</span>
                                            <span class="badge badge-admin rounded-pill ms-1">관리자</span>
                                            <p class="text-muted small mb-0 mt-1 text-truncate" style="max-width: 180px;"
                                               th:text="${manager.bio ?: ''}"></p>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 일반 멤버 -->
                <div th:if="${study.members.size() > 0}">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-user me-1"></i> 멤버
                    </p>
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4" th:each="member : ${study.members}">
                            <a th:href="@{'/profile/' + ${member.nickname}}" class="text-decoration-none">
                                <div class="card border-0 shadow-sm rounded-3 h-100 hover-lift">
                                    <div class="card-body d-flex align-items-center p-3">
                                        <svg th:if="${#strings.isEmpty(member?.profileImage)}"
                                             th:data-jdenticon-value="${member.nickname}"
                                             width="48" height="48" class="rounded-circle border flex-shrink-0 me-3"></svg>
                                        <img th:if="${!#strings.isEmpty(member?.profileImage)}"
                                             th:src="${member?.profileImage}"
                                             width="48" height="48" class="rounded-circle border object-fit-cover flex-shrink-0 me-3"/>
                                        <div>
                                            <span class="fw-semibold text-dark" th:text="${member.nickname}">닉네임</span>
                                            <p class="text-muted small mb-0 mt-1 text-truncate" style="max-width: 180px;"
                                               th:text="${member.bio ?: ''}"></p>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 멤버 없을 때 -->
                <div th:if="${study.members.size() == 0}" class="text-center py-4 text-muted">
                    <div class="empty-icon empty-icon-rose mb-2">
                        <i class="fa-solid fa-user-group"></i>
                    </div>
                    <p class="mb-0 small">아직 가입한 멤버가 없습니다.</p>
                </div>
            </div>

            <!-- 섹션 구분선 -->
            <div class="section-divider"></div>

            <!-- ========== 3. 모임 ========== -->
            <div class="mb-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="fw-bold mb-0 d-flex align-items-center">
                        <i class="fa-solid fa-calendar-days me-2 section-icon"></i> 모임
                        <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill ms-2 fw-normal"
                              th:text="${newEvents.size() + oldEvents.size()} + '개'">0개</span>
                    </h5>
                    <!-- 모임 만들기 버튼 (관리자용) -->
                    <a sec:authorize="isAuthenticated()"
                       th:if="${study.published && !study.closed && study.isManager(#authentication.principal)}"
                       class="btn btn-sm btn-outline-primary rounded-pill px-3"
                       th:href="@{'/study/' + ${study.path} + '/new-event'}">
                        <i class="fa-solid fa-plus me-1"></i> 모임 만들기
                    </a>
                </div>

                <!-- 새 모임 -->
                <div th:if="${newEvents.size() > 0}" class="mb-4">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-calendar-plus text-success me-1"></i> 예정된 모임
                        <span class="badge bg-success-subtle text-success-emphasis rounded-pill ms-1"
                              th:text="${newEvents.size()}">0</span>
                    </p>
                    <div class="row g-3">
                        <div class="col-md-6" th:each="event : ${newEvents}">
                            <a th:href="@{'/study/' + ${study.path} + '/events/' + ${event.id}}"
                               class="card border-0 shadow-sm rounded-3 text-decoration-none h-100 hover-lift">
                                <div class="card-body p-4">
                                    <h6 class="fw-bold text-dark mb-3" th:text="${event.title}">모임 이름</h6>
                                    <div class="d-flex flex-column gap-2">
                                        <div class="d-flex align-items-center text-muted small">
                                            <i class="fa-solid fa-calendar-days me-2 section-icon"></i>
                                            <span class="calendar" th:text="${event.startDateTime}">시작 일시</span>
                                        </div>
                                        <div class="d-flex align-items-center text-muted small">
                                            <i class="fa-solid fa-clock me-2 section-icon-violet"></i>
                                            <span>모집 마감 <span class="fromNow fw-semibold" th:text="${event.endEnrollmentDateTime}">마감</span></span>
                                        </div>
                                        <div th:if="${event.limitOfEnrollments != 0}" class="d-flex align-items-center text-muted small">
                                            <i class="fa-solid fa-users me-2 section-icon"></i>
                                            <span>
                                                <span th:text="${event.limitOfEnrollments}">10</span>명 모집
                                                (<span class="fw-semibold section-icon" th:text="${event.numberOfRemainSpots()}">5</span>자리 남음)
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer bg-transparent border-top-0 pb-3 px-4">
                                    <span class="small fw-semibold section-icon">자세히 보기 <i class="fa-solid fa-arrow-right ms-1"></i></span>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 지난 모임 -->
                <div th:if="${oldEvents.size() > 0}" class="mb-3">
                    <p class="text-muted small fw-semibold mb-2">
                        <i class="fa-solid fa-clock-rotate-left text-secondary me-1"></i> 지난 모임
                        <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill ms-1"
                              th:text="${oldEvents.size()}">0</span>
                    </p>
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-3">#</th>
                                        <th class="py-3">모임 이름</th>
                                        <th class="py-3">종료 일시</th>
                                        <th class="pe-4 py-3"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="event, stat : ${oldEvents}">
                                        <td class="ps-4 text-muted" th:text="${stat.count}">1</td>
                                        <td class="fw-semibold" th:text="${event.title}">모임 이름</td>
                                        <td class="text-muted small">
                                            <span class="date-weekday-time" th:text="${event.endDateTime}">종료</span>
                                        </td>
                                        <td class="pe-4">
                                            <a th:href="@{'/study/' + ${study.path} + '/events/' + ${event.id}}"
                                               class="btn btn-sm btn-outline-secondary rounded-pill px-3">보기</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 모임 없을 때 -->
                <div th:if="${newEvents.size() == 0 && oldEvents.size() == 0}" class="text-center py-4 text-muted">
                    <div class="empty-icon empty-icon-emerald mb-2">
                        <i class="fa-solid fa-calendar-xmark"></i>
                    </div>
                    <p class="mb-0 small">아직 등록된 모임이 없습니다.</p>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments.html :: footer"></div>
<script th:replace="fragments.html :: tooltip"></script>
<script th:replace="fragments.html :: date-time"></script>
</body>
</html>
