<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- ============================================================
     가입 신청 관리 페이지

     [기능]
     1. 가입 방식 설정 (자유 가입 / 승인제)
     2. 대기 중인 가입 신청 목록 표시
     3. 개별 신청에 대한 승인/거절 처리

     [접근 권한]
     - 스터디 관리자(managers)만 접근 가능
     - StudySettingsController에서 관리자 권한 검증

     [기존 패턴 참고]
     - study/settings/study.html의 카드 레이아웃 패턴 재활용
     - 사이드바 메뉴 + 메인 콘텐츠 2컬럼 구조
     ============================================================ -->
<head th:replace="fragments.html :: head"></head>

<body>
    <nav th:replace="fragments.html :: main-nav"></nav>
    <div th:replace="fragments.html :: study-banner"></div>
    <div th:replace="fragments.html :: study-info"></div>
    <div th:replace="fragments.html :: study-menu(studyMenu='settings')"></div>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="row g-4">
            <!-- 사이드바 -->
            <div class="col-md-3">
              <div th:replace="fragments.html :: study-settings-menu(currentMenu='join-requests')"></div>
            </div>
            <!-- 메인 콘텐츠 -->
            <div class="col-md-9">
              <div th:replace="fragments.html :: message"></div>

              <!-- ========== 가입 방식 설정 ========== -->
              <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom pt-3 pb-2">
                  <h6 class="fw-bold text-dark mb-0">
                    <i class="fa-solid fa-door-open text-primary me-2"></i>가입 방식
                  </h6>
                </div>
                <div class="card-body p-4">
                  <form th:action="@{'/study/' + ${study.getPath()} + '/settings/join-type'}"
                        method="post" novalidate>
                    <div class="alert alert-primary border-0 rounded-3 mb-3" role="alert">
                      <i class="fa-solid fa-circle-info me-2"></i>
                      <strong>자유 가입</strong>은 누구나 바로 가입할 수 있고,
                      <strong>승인제</strong>는 관리자가 신청을 확인한 뒤 승인해야 가입됩니다.
                    </div>

                    <!-- 라디오 버튼: 자유 가입 -->
                    <div class="form-check mb-3 p-3 rounded-3 border"
                         th:classappend="${study.joinType.name() == 'OPEN'} ? 'border-primary bg-primary bg-opacity-10' : ''">
                      <input class="form-check-input" type="radio" name="joinType" id="joinTypeOpen"
                             value="OPEN" th:checked="${study.joinType.name() == 'OPEN'}">
                      <label class="form-check-label d-flex align-items-center" for="joinTypeOpen">
                        <div>
                          <span class="fw-semibold">
                            <i class="fa-solid fa-unlock text-success me-1"></i> 자유 가입
                          </span>
                          <p class="text-muted small mb-0 mt-1">
                            모집 중인 스터디에 누구나 즉시 가입할 수 있습니다.
                          </p>
                        </div>
                      </label>
                    </div>

                    <!-- 라디오 버튼: 승인제 -->
                    <div class="form-check mb-3 p-3 rounded-3 border"
                         th:classappend="${study.joinType.name() == 'APPROVAL_REQUIRED'} ? 'border-primary bg-primary bg-opacity-10' : ''">
                      <input class="form-check-input" type="radio" name="joinType" id="joinTypeApproval"
                             value="APPROVAL_REQUIRED" th:checked="${study.joinType.name() == 'APPROVAL_REQUIRED'}">
                      <label class="form-check-label d-flex align-items-center" for="joinTypeApproval">
                        <div>
                          <span class="fw-semibold">
                            <i class="fa-solid fa-shield-halved text-warning me-1"></i> 승인제
                          </span>
                          <p class="text-muted small mb-0 mt-1">
                            가입 신청 후 관리자가 승인해야 멤버로 등록됩니다.
                          </p>
                        </div>
                      </label>
                    </div>

                    <button class="btn btn-primary rounded-pill w-100" type="submit">
                      <i class="fa-solid fa-check me-1"></i> 가입 방식 저장
                    </button>
                  </form>
                </div>
              </div>

              <!-- ========== 대기 중인 가입 신청 ========== -->
              <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom pt-3 pb-2 d-flex align-items-center justify-content-between">
                  <h6 class="fw-bold text-dark mb-0">
                    <i class="fa-solid fa-user-clock text-warning me-2"></i>대기 중인 가입 신청
                  </h6>
                  <span class="badge bg-warning-subtle text-warning-emphasis rounded-pill px-3 py-2"
                        th:text="${pendingCount} + '건'">0건</span>
                </div>
                <div class="card-body p-4">

                  <!-- 신청이 없을 때 -->
                  <div th:if="${pendingRequests.size() == 0}" class="text-center py-4 text-muted">
                    <div class="empty-icon empty-icon-emerald mb-2">
                      <i class="fa-solid fa-inbox"></i>
                    </div>
                    <p class="mb-0 small">대기 중인 가입 신청이 없습니다.</p>
                  </div>

                  <!-- 신청 목록 -->
                  <div th:if="${pendingRequests.size() > 0}">
                    <div th:each="request : ${pendingRequests}" class="d-flex align-items-center justify-content-between p-3 mb-2 rounded-3 border hover-lift">
                      <!-- 신청자 정보 -->
                      <div class="d-flex align-items-center">
                        <a th:href="@{'/profile/' + ${request.account.nickname}}" class="text-decoration-none">
                          <svg th:if="${#strings.isEmpty(request.account?.profileImage)}"
                               th:data-jdenticon-value="${request.account.nickname}"
                               width="48" height="48" class="rounded-circle border flex-shrink-0 me-3"></svg>
                          <img th:if="${!#strings.isEmpty(request.account?.profileImage)}"
                               th:src="${request.account?.profileImage}"
                               width="48" height="48" class="rounded-circle border object-fit-cover flex-shrink-0 me-3"/>
                        </a>
                        <div>
                          <a th:href="@{'/profile/' + ${request.account.nickname}}"
                             class="fw-semibold text-dark text-decoration-none"
                             th:text="${request.account.nickname}">닉네임</a>
                          <p class="text-muted small mb-0 mt-1">
                            <i class="fa-regular fa-clock me-1"></i>
                            <span class="fromNow" th:text="${request.requestedAt}">3일 전</span> 신청
                          </p>
                          <p th:if="${!#strings.isEmpty(request.account?.bio)}"
                             class="text-muted small mb-0 text-truncate" style="max-width: 250px;"
                             th:text="${request.account.bio}">소개</p>
                        </div>
                      </div>
                      <!-- 승인/거절 버튼 -->
                      <div class="d-flex gap-2 flex-shrink-0">
                        <form th:action="@{'/study/' + ${study.getPath()} + '/settings/join-requests/' + ${request.id} + '/approve'}"
                              method="post" class="d-inline">
                          <button type="submit" class="btn btn-success btn-sm rounded-pill px-3"
                                  data-bs-toggle="tooltip" title="가입 승인">
                            <i class="fa-solid fa-check me-1"></i> 승인
                          </button>
                        </form>
                        <form th:action="@{'/study/' + ${study.getPath()} + '/settings/join-requests/' + ${request.id} + '/reject'}"
                              method="post" class="d-inline">
                          <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                  data-bs-toggle="tooltip" title="가입 거절">
                            <i class="fa-solid fa-xmark me-1"></i> 거절
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- ========== 가입 방식 안내 (승인제일 때만) ========== -->
              <div th:if="${study.joinType.name() == 'APPROVAL_REQUIRED'}" class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom pt-3 pb-2">
                  <h6 class="fw-bold text-dark mb-0">
                    <i class="fa-solid fa-lightbulb text-info me-2"></i>승인제 안내
                  </h6>
                </div>
                <div class="card-body p-4">
                  <div class="d-flex flex-column gap-3">
                    <div class="d-flex align-items-start">
                      <span class="badge bg-primary rounded-circle me-3 flex-shrink-0 d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px;">1</span>
                      <div>
                        <span class="fw-semibold">사용자가 "가입 신청" 버튼 클릭</span>
                        <p class="text-muted small mb-0">기존 "가입하기" 버튼 대신 "가입 신청" 버튼이 표시됩니다.</p>
                      </div>
                    </div>
                    <div class="d-flex align-items-start">
                      <span class="badge bg-primary rounded-circle me-3 flex-shrink-0 d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px;">2</span>
                      <div>
                        <span class="fw-semibold">관리자에게 알림 발송</span>
                        <p class="text-muted small mb-0">이 페이지에서 대기 중인 신청을 확인할 수 있습니다.</p>
                      </div>
                    </div>
                    <div class="d-flex align-items-start">
                      <span class="badge bg-primary rounded-circle me-3 flex-shrink-0 d-flex align-items-center justify-content-center"
                            style="width: 28px; height: 28px;">3</span>
                      <div>
                        <span class="fw-semibold">승인 시 자동으로 멤버 등록</span>
                        <p class="text-muted small mb-0">거절하면 신청자에게 알림이 전송됩니다.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <div th:replace="fragments.html :: footer"></div>
    <script th:replace="fragments.html :: tooltip"></script>
    <script th:replace="fragments.html :: date-time"></script>
</body>
</html>
