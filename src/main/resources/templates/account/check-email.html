<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이메일 인증 - StudyOlle</title>

    <!-- 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous"/>

    <!-- 인증 페이지 CSS -->
    <link rel="stylesheet" th:href="@{/css/glassmorphism.css}">

    <style>
        .result-card {
            background: #fdfcfa;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: 1px solid #e8e4dd;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            padding: 3rem 2.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .mail-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #8e85b0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            color: #fff;
            animation: iconBounce 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            box-shadow: none;
        }

        .error-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #c4917e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            color: #fff;
            animation: iconBounce 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            box-shadow: none;
        }

        @keyframes iconBounce {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-family: 'IBM Plex Sans KR', 'Pretendard Variable', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: #4a4540;
            margin-bottom: 0.5rem;
            animation: textFadeIn 0.5s 0.6s ease both;
        }

        .result-subtitle {
            font-size: 0.95rem;
            color: #6b6560;
            margin-bottom: 0.5rem;
            animation: textFadeIn 0.5s 0.7s ease both;
        }

        .result-email {
            font-weight: 700;
            color: #8e85b0;
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            animation: textFadeIn 0.5s 0.8s ease both;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .btn-resend {
            background: #4a4540;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 2.5rem;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: textFadeIn 0.5s 0.9s ease both;
        }

        .btn-resend:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            color: #fff;
        }

        .page-logo {
            position: fixed;
            top: 24px;
            left: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            z-index: 10;
            animation: textFadeIn 0.5s 0.2s ease both;
        }

        .page-logo img { width: 32px; height: 32px; }

        .page-logo span {
            font-family: 'IBM Plex Sans KR', 'Pretendard Variable', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: #4a4540;
        }

        .result-card.error-state {
            border-color: rgba(239, 68, 68, 0.15);
        }
    </style>
</head>

<body class="glass-page">

<!-- 배경 -->
<div class="bg-animated"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 로고 -->
<a class="page-logo" th:href="@{/}">
    <img src="/images/logo_sm.png" alt="로고">
    <span>StudyOlle</span>
</a>

<!-- ✅ 정상: 인증 이메일 확인 안내 -->
<div class="result-card" th:if="${error == null}">
    <div class="mail-icon">
        <i class="fa-solid fa-envelope-open-text"></i>
    </div>
    <h1 class="result-title">인증 이메일을 확인해주세요</h1>
    <p class="result-subtitle">아래 주소로 인증 메일을 발송했습니다</p>
    <p class="result-email" th:text="${email}">your@email.com</p>
    <a class="btn-resend" th:href="@{/resend-confirm-email}">
        <i class="fa-solid fa-paper-plane"></i> 인증 이메일 다시 보내기
    </a>
</div>

<!-- ❌ 에러 발생 시 -->
<div class="result-card error-state" th:if="${error != null}">
    <div class="error-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <h1 class="result-title">이메일 인증 오류</h1>
    <p class="result-subtitle" th:text="${error}">에러 메시지</p>
    <p class="result-email" th:text="${email}">your@email.com</p>
    <a class="btn-resend" th:href="@{/resend-confirm-email}">
        <i class="fa-solid fa-paper-plane"></i> 인증 이메일 다시 보내기
    </a>
</div>

</body>
</html>
