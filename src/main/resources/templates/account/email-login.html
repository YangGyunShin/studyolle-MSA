<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments.html :: head"></head>
<body>

<!-- 네비게이션 바 -->
<nav th:replace="fragments.html :: main-nav"></nav>

<div class="container py-5">
    <!-- 페이지 제목 -->
    <div class="text-center mb-5">
        <p class="lead">스터디올래</p>
        <h2 class="fw-bold">패스워드 없이 로그인하기</h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- 에러 메시지 -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}">문제가 발생했습니다</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- 정보 메시지 -->
            <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
                <span th:text="${message}">이메일이 전송되었습니다</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- 이메일 로그인 폼 -->
            <form th:action="@{/email-login}" method="post"
                  class="bg-white p-4 shadow rounded needs-validation" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">가입 할 때 사용한 이메일</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="your@email.com" aria-describedby="emailHelp" required>
                    <small id="emailHelp" class="form-text text-muted">
                        가입할 때 사용한 이메일을 입력하세요.
                    </small>
                    <div class="invalid-feedback">이메일을 입력하세요.</div>
                </div>

                <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-success btn-lg">로그인 링크 보내기</button>
                </div>

                <small id="submitHelp" class="form-text text-muted">
                    스터디올래에 처음 오셨다면
                    <a th:href="@{/sign-up}">계정을 먼저 만드세요.</a>
                </small>
            </form>
        </div>
    </div>

    <!-- 푸터 -->
    <footer th:replace="fragments.html :: footer" class="mt-5"></footer>
</div>

<!-- Bootstrap JS 및 폼 유효성 검사 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="fragments.html :: form-validation"></script>

</body>
</html>
