<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments.html :: head"></head>

<body>

<!-- ✅ 내비게이션 바 -->
<div th:replace="fragments.html :: main-nav"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <!-- 프로필 이미지 -->
        <div class="col-md-3 text-center">
            <svg th:if="${#strings.isEmpty(account.profileImage)}"
                 th:data-jdenticon-value="${account.nickname}"
                 class="img-thumbnail rounded-circle" width="140" height="140"></svg>
            <img th:if="${!#strings.isEmpty(account.profileImage)}"
                 th:src="${account.profileImage}"
                 class="img-thumbnail rounded-circle" width="140" height="140" alt="프로필 이미지"/>
        </div>

        <!-- 닉네임 및 소개 -->
        <div class="col-md-7">
            <h2 class="fw-bold" th:text="${account.nickname}">닉네임</h2>
            <p class="lead text-muted" th:if="${!#strings.isEmpty(account.bio)}" th:text="${account.bio}">소개글</p>
            <p class="lead text-muted" th:if="${#strings.isEmpty(account.bio) && isOwner}">한 줄 소개를 추가하세요.</p>
        </div>
    </div>

    <!-- 탭 구성 -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-3">
            <div class="nav flex-column nav-pills" id="profile-tab" role="tablist" aria-orientation="vertical">
                <button class="nav-link active" id="intro-tab" data-bs-toggle="pill" data-bs-target="#intro"
                        type="button" role="tab" aria-controls="intro" aria-selected="true">소개
                </button>
                <button class="nav-link" id="study-tab" data-bs-toggle="pill" data-bs-target="#study"
                        type="button" role="tab" aria-controls="study" aria-selected="false">스터디
                </button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="tab-content" id="profile-tabContent">
                <!-- 소개 탭 -->
                <div class="tab-pane fade show active" id="intro" role="tabpanel" aria-labelledby="intro-tab">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex align-items-center" th:if="${!#strings.isEmpty(account.url)}">
                            <i class="fa-solid fa-link me-2 text-secondary"></i>
                            <span th:text="${account.url}"></span>
                        </li>
                        <li class="list-group-item d-flex align-items-center"
                            th:if="${!#strings.isEmpty(account.occupation)}">
                            <i class="fa-solid fa-briefcase me-2 text-secondary"></i>
                            <span th:text="${account.occupation}"></span>
                        </li>
                        <li class="list-group-item d-flex align-items-center"
                            th:if="${!#strings.isEmpty(account.location)}">
                            <i class="fa-solid fa-location-dot me-2 text-secondary"></i>
                            <span th:text="${account.location}"></span>
                        </li>
                        <li class="list-group-item d-flex align-items-center" th:if="${isOwner}">
                            <i class="fa-solid fa-envelope me-2 text-secondary"></i>
                            <span th:text="${account.email}"></span>
                        </li>
                        <li class="list-group-item d-flex align-items-center"
                            th:if="${isOwner || account.emailVerified}">
                            <i class="fa-solid fa-calendar me-2 text-secondary"></i>
                            <span th:if="${isOwner && !account.emailVerified}">
                                <a th:href="@{'/check-email?email=' + ${account.email}}"
                                   class="text-danger text-decoration-none">가입을 완료하려면 이메일을 확인하세요.</a>
                            </span>
                            <span th:if="${account.emailVerified}"
                                  th:text="${#temporals.format(account.joinedAt, 'yyyy년 M월 가입')}"></span>
                        </li>
                    </ul>

                    <div class="mt-3" th:if="${isOwner}">
                        <a class="btn btn-outline-primary" th:href="@{/settings/profile}">프로필 수정</a>
                    </div>
                </div>

                <!-- 스터디 탭 -->
                <div class="tab-pane fade" id="study" role="tabpanel" aria-labelledby="study-tab">

                    <!-- 관리 중인 스터디 -->
                    <div class="mb-4" th:if="${!#lists.isEmpty(studyManagerOf)}">
                        <h6 class="fw-bold text-muted mb-3">
                            <i class="fa-solid fa-crown text-warning me-1"></i> 관리 중인 스터디
                            <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill ms-1"
                                  th:text="${studyManagerOf.size()}">0</span>
                        </h6>
                        <div th:replace="fragments.html :: study-list (studyList=${studyManagerOf})"></div>
                    </div>

                    <!-- 참여 중인 스터디 -->
                    <div class="mb-4" th:if="${!#lists.isEmpty(studyMemberOf)}">
                        <h6 class="fw-bold text-muted mb-3">
                            <i class="fa-solid fa-user-group text-primary me-1"></i> 참여 중인 스터디
                            <span class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill ms-1"
                                  th:text="${studyMemberOf.size()}">0</span>
                        </h6>
                        <div th:replace="fragments.html :: study-list (studyList=${studyMemberOf})"></div>
                    </div>

                    <!-- 스터디가 하나도 없을 때 -->
                    <div th:if="${#lists.isEmpty(studyManagerOf) && #lists.isEmpty(studyMemberOf)}"
                         class="text-center py-5">
                        <i class="fa-solid fa-book-open" style="font-size: 2.5rem; opacity: 0.3;"></i>
                        <p class="text-muted mt-3 mb-0">참여 중인 스터디가 없습니다.</p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ✅ 푸터 -->
    <footer th:replace="fragments.html :: footer" class="mt-5"></footer>
</div>

<!-- ✅ Bootstrap JS는 맨 아래에서 로딩 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-q0A+P1s8C0OghgLChQe35Pst4p8aeAi9RnxO0B4BJp8gzHa0KE/C03k+NNjYTw1K"
        crossorigin="anonymous"></script>

<!-- ✅ 드롭다운 초기화 -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const dropdowns = document.querySelectorAll('[data-bs-toggle="dropdown"]');
        dropdowns.forEach(el => new bootstrap.Dropdown(el));
    });
</script>

<!-- ✅ URL hash 기반 탭 자동 활성화
     /my-studies → /profile/{nickname}#study 리다이렉트 시
     URL의 #study hash를 읽어 해당 Bootstrap pill 탭을 자동 활성화
     Bootstrap pills는 클릭 이벤트로만 탭 전환이 되므로,
     hash 기반 전환을 위해 bootstrap.Tab API를 직접 호출해야 함 -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var hash = window.location.hash;
        if (hash) {
            var tab = document.querySelector('[data-bs-target="' + hash + '"]');
            if (tab) {
                new bootstrap.Tab(tab).show();
            }
        }
    });
</script>

</body>
</html>
