<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이메일 인증 - StudyOlle</title>

    <!-- 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous"/>

    <!-- 인증 페이지 CSS -->
    <link rel="stylesheet" th:href="@{/css/glassmorphism.css}">

    <style>
        /* 이메일 인증 전용 오버라이드 */
        .result-card {
            background: #fdfcfa;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: 1px solid #e8e4dd;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            padding: 3rem 2.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 성공 아이콘 */
        .success-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #7fac8e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            color: #fff;
            animation: iconBounce 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            box-shadow: none;
        }

        @keyframes iconBounce {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 에러 아이콘 */
        .error-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #c4917e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            color: #fff;
            animation: iconBounce 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            box-shadow: none;
        }

        .result-title {
            font-family: 'IBM Plex Sans KR', 'Pretendard Variable', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: #4a4540;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            animation: textFadeIn 0.5s 0.6s ease both;
        }

        .result-subtitle {
            font-size: 0.95rem;
            color: #6b6560;
            margin-bottom: 2rem;
            animation: textFadeIn 0.5s 0.7s ease both;
        }

        .result-subtitle strong {
            color: #8e85b0;
            font-weight: 700;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .btn-home {
            background: #4a4540;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 2.5rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.2px;
            box-shadow: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: textFadeIn 0.5s 0.8s ease both;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            color: #fff;
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        /* 파티클 이펙트 (성공 시) */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: confettiFall 2s ease-out forwards;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(200px) rotate(720deg) scale(0.3);
            }
        }

        /* 로고 */
        .page-logo {
            position: fixed;
            top: 24px;
            left: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            z-index: 10;
            animation: textFadeIn 0.5s 0.2s ease both;
        }

        .page-logo img {
            width: 32px;
            height: 32px;
        }

        .page-logo span {
            font-family: 'IBM Plex Sans KR', 'Pretendard Variable', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: #4a4540;
        }

        /* 에러 카드 배경 톤 */
        .result-card.error-state {
            border-color: rgba(239, 68, 68, 0.15);
        }
    </style>
</head>

<body class="glass-page">

<!-- 배경 -->
<div class="bg-animated"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 로고 -->
<a class="page-logo" th:href="@{/}">
    <img src="/images/logo_sm.png" alt="로고">
    <span>StudyOlle</span>
</a>

<!-- ✅ 인증 성공 -->
<div class="result-card" th:if="${error == null}" style="position: relative; overflow: visible;">
    <!-- 컨페티 파티클 -->
    <div class="confetti" style="top: -10px; left: 20%; background: #8e85b0; animation-delay: 0.5s;"></div>
    <div class="confetti" style="top: -10px; left: 40%; background: #a099bd; animation-delay: 0.6s;"></div>
    <div class="confetti" style="top: -10px; left: 60%; background: #bfa473; animation-delay: 0.7s;"></div>
    <div class="confetti" style="top: -10px; left: 80%; background: #7fac8e; animation-delay: 0.8s;"></div>
    <div class="confetti" style="top: -10px; left: 30%; background: #bfa473; animation-delay: 0.9s;"></div>
    <div class="confetti" style="top: -10px; left: 70%; background: #c4917e; animation-delay: 1.0s;"></div>

    <div class="success-icon">
        <i class="fa-solid fa-check"></i>
    </div>
    <h1 class="result-title">이메일 인증 완료!</h1>
    <p class="result-subtitle">
        <strong th:text="${nickname}">닉네임</strong>님, 환영합니다<br>
        이제 스터디올래의 모든 기능을 이용할 수 있어요
    </p>
    <a class="btn-home" th:href="@{/}">
        <i class="fa-solid fa-house"></i> 홈으로 이동
    </a>
</div>

<!-- ❌ 인증 실패 -->
<div class="result-card error-state" th:if="${error}">
    <div class="error-icon">
        <i class="fa-solid fa-xmark"></i>
    </div>
    <h1 class="result-title">인증 실패</h1>
    <p class="result-subtitle">
        이메일 확인 링크가 정확하지 않습니다.<br>
        링크를 다시 확인하거나 새 인증 메일을 요청해 주세요.
    </p>
    <a class="btn-home" th:href="@{/}">
        <i class="fa-solid fa-house"></i> 홈으로 이동
    </a>
</div>

</body>
</html>
