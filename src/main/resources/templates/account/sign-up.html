<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StudyOlle 회원가입</title>

    <!-- ✅ 웹 폰트: IBM Plex Sans KR + Gowun Batang + Pretendard -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">

    <!-- ✅ Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- ✅ 인증 페이지 스타일 (Warm Flat Minimal) -->
    <link rel="stylesheet" th:href="@{/css/glassmorphism.css}">
</head>

<body class="glass-page">

    <!-- ✅ 밝은 애니메이션 배경 -->
    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ✅ 홈 돌아가기 -->
    <a th:href="@{/}" class="back-link">
        <i class="bi bi-arrow-left"></i> 홈으로
    </a>

    <!-- ✅ 글래스모피즘 회원가입 카드 -->
    <div class="glass-card">

        <h1 class="page-title stagger-1">회원가입</h1>
        <p class="page-subtitle stagger-1">스터디올래와 함께 성장하세요</p>

        <form class="needs-validation" novalidate
              th:action="@{/sign-up}" th:object="${signUpForm}" method="post">

            <!-- ✅ 닉네임 -->
            <div class="form-group stagger-2">
                <label for="nickname">닉네임</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input id="nickname" type="text" th:field="*{nickname}"
                           placeholder="whiteship"
                           required minlength="3" maxlength="20"
                           data-validate="nickname">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">공백 없이 문자와 숫자로 3~20자</div>
                <div class="field-error" th:if="${#fields.hasErrors('nickname')}"
                     th:errors="*{nickname}"></div>
            </div>

            <!-- ✅ 이메일 -->
            <div class="form-group stagger-3">
                <label for="email">이메일</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope input-icon"></i>
                    <input id="email" type="email" th:field="*{email}"
                           placeholder="your@email.com" required
                           data-validate="email">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">스터디올래는 이메일을 공개하지 않습니다</div>
                <div class="field-error" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <!-- ✅ 비밀번호 -->
            <div class="form-group stagger-4">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input id="password" type="password" th:field="*{password}"
                           required minlength="8" maxlength="50"
                           data-validate="password">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">8자 이상, 영문자 · 숫자 · 특수기호 포함</div>
                <div class="field-error" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <!-- ✅ 가입 버튼 -->
            <div class="stagger-5">
                <button type="submit" class="btn-glass btn-signup">가입하기</button>
            </div>

            <!-- ✅ 이용 약관 -->
            <div class="terms-text stagger-5">
                가입 시 <a href="#">이용 약관</a>에 동의하게 됩니다
            </div>

        </form>
    </div>

    <!-- ✅ 하단 브랜드 -->
    <div class="footer-area">
        <span class="brand-name">&copy; 2025 StudyOlle</span>
    </div>

    <!-- ✅ Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ 실시간 유효성 검사 + 체크 아이콘 -->
    <script th:src="@{/js/glass-validation.js}"></script>

</body>
</html>
