<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments.html :: head}"></head>
<body>
<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- 헤더 -->
            <h2 class="fw-bold mb-4" style="color: #4a4540;">
                <i class="fa-solid fa-bell me-2 section-icon"></i> 알림
            </h2>

            <div class="row g-4">
                <!-- 왼쪽: 사이드바 -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-0">
                            <a th:href="@{/notifications}"
                               class="d-flex justify-content-between align-items-center px-3 py-3 text-decoration-none border-bottom"
                               th:classappend="${isNew} ? 'fw-bold'"
                               style="color: #4a4540;">
                                <span><i class="fa-solid fa-envelope me-2 section-icon"></i> 새 알림</span>
                                <span class="badge rounded-pill"
                                      style="background: rgba(142,133,176,0.1); color: #8e85b0;"
                                      th:text="${numberOfNotChecked}">0</span>
                            </a>
                            <a th:href="@{/notifications/old}"
                               class="d-flex justify-content-between align-items-center px-3 py-3 text-decoration-none"
                               th:classappend="${!isNew} ? 'fw-bold'"
                               style="color: #4a4540;">
                                <span><i class="fa-solid fa-envelope-open me-2 text-muted"></i> 읽은 알림</span>
                                <span class="badge rounded-pill"
                                      style="background: rgba(158,150,137,0.1); color: #9e9689;"
                                      th:text="${numberOfChecked}">0</span>
                            </a>
                        </div>
                    </div>

                    <!-- 모두 읽음 처리 (새 알림 탭에서만 표시) -->
                    <form th:if="${isNew && notifications.size() > 0}" th:action="@{/notifications/mark-all-read}" method="post" class="mt-3">
                        <button type="submit" class="btn btn-sm btn-outline-primary rounded-pill w-100">
                            <i class="fa-solid fa-check-double me-1"></i> 모두 읽음 처리
                        </button>
                    </form>

                    <!-- 읽은 알림 삭제 -->
                    <form th:if="${numberOfChecked > 0}" th:action="@{/notifications}" th:method="delete" class="mt-3">
                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill w-100">
                            <i class="fa-solid fa-trash me-1"></i> 읽은 알림 삭제
                        </button>
                        <p class="text-muted mt-1" style="font-size: 0.7rem;">한 달이 지난 알림은 자동 삭제됩니다.</p>
                    </form>
                </div>

                <!-- 오른쪽: 알림 목록 -->
                <div class="col-md-9">

                    <!-- 알림이 없을 때 -->
                    <div th:if="${notifications.size() == 0}" class="card border-0 shadow-sm rounded-3">
                        <div class="card-body text-center py-5">
                            <div class="empty-icon empty-icon-indigo mx-auto mb-2">
                                <i class="fa-solid fa-bell-slash"></i>
                            </div>
                            <p th:if="${isNew}" class="text-muted small mb-2">새로운 알림이 없습니다.</p>
                            <p th:if="${!isNew}" class="text-muted small mb-2">읽은 알림이 없습니다.</p>
                            <a th:href="@{/settings/notifications}"
                               class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                <i class="fa-solid fa-gear me-1"></i> 알림 설정 확인
                            </a>
                        </div>
                    </div>

                    <!-- 새 스터디 알림 -->
                    <div th:if="${newStudyNotifications.size() > 0}" class="card border-0 shadow-sm rounded-3 mb-3">
                        <div class="card-header border-0 bg-transparent px-4 pt-4 pb-2">
                            <h6 class="fw-bold mb-0">
                                <i class="fa-solid fa-book-open me-2 section-icon-violet"></i>
                                관심 주제의 새 스터디
                            </h6>
                        </div>
                        <div class="card-body px-4 pt-0">
                            <div class="d-flex flex-column gap-2">
                                <a th:each="noti : ${newStudyNotifications}"
                                   th:href="@{'/notifications/' + ${noti.id} + '/read'}"
                                   class="d-flex justify-content-between align-items-start p-3 rounded-3 text-decoration-none"
                                   style="background: rgba(142,133,176,0.04); transition: all 0.15s;"
                                   onmouseover="this.style.background='rgba(142,133,176,0.08)'"
                                   onmouseout="this.style.background='rgba(142,133,176,0.04)'">
                                    <div>
                                        <p class="mb-1 fw-medium small" style="color: #4a4540;" th:text="${noti.title}">알림 제목</p>
                                        <p class="mb-0 text-muted" style="font-size: 0.8rem;" th:text="${noti.message}">알림 내용</p>
                                    </div>
                                    <span class="text-muted flex-shrink-0 ms-3" style="font-size: 0.72rem;"
                                          th:text="${#temporals.format(noti.createdDateTime, 'MM.dd HH:mm')}">02.18</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- 모임 참가 알림 -->
                    <div th:if="${eventEnrollmentNotifications.size() > 0}" class="card border-0 shadow-sm rounded-3 mb-3">
                        <div class="card-header border-0 bg-transparent px-4 pt-4 pb-2">
                            <h6 class="fw-bold mb-0">
                                <i class="fa-solid fa-calendar-check me-2 section-icon"></i>
                                모임 참가 신청
                            </h6>
                        </div>
                        <div class="card-body px-4 pt-0">
                            <div class="d-flex flex-column gap-2">
                                <a th:each="noti : ${eventEnrollmentNotifications}"
                                   th:href="@{'/notifications/' + ${noti.id} + '/read'}"
                                   class="d-flex justify-content-between align-items-start p-3 rounded-3 text-decoration-none"
                                   style="background: rgba(142,133,176,0.04); transition: all 0.15s;"
                                   onmouseover="this.style.background='rgba(142,133,176,0.08)'"
                                   onmouseout="this.style.background='rgba(142,133,176,0.04)'">
                                    <div>
                                        <p class="mb-1 fw-medium small" style="color: #4a4540;" th:text="${noti.title}">알림 제목</p>
                                        <p class="mb-0 text-muted" style="font-size: 0.8rem;" th:text="${noti.message}">알림 내용</p>
                                    </div>
                                    <span class="text-muted flex-shrink-0 ms-3" style="font-size: 0.72rem;"
                                          th:text="${#temporals.format(noti.createdDateTime, 'MM.dd HH:mm')}">02.18</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- 참여 스터디 소식 -->
                    <div th:if="${watchingStudyNotifications.size() > 0}" class="card border-0 shadow-sm rounded-3 mb-3">
                        <div class="card-header border-0 bg-transparent px-4 pt-4 pb-2">
                            <h6 class="fw-bold mb-0">
                                <i class="fa-solid fa-eye me-2 section-icon-violet"></i>
                                참여 스터디 소식
                            </h6>
                        </div>
                        <div class="card-body px-4 pt-0">
                            <div class="d-flex flex-column gap-2">
                                <a th:each="noti : ${watchingStudyNotifications}"
                                   th:href="@{'/notifications/' + ${noti.id} + '/read'}"
                                   class="d-flex justify-content-between align-items-start p-3 rounded-3 text-decoration-none"
                                   style="background: rgba(142,133,176,0.04); transition: all 0.15s;"
                                   onmouseover="this.style.background='rgba(142,133,176,0.08)'"
                                   onmouseout="this.style.background='rgba(142,133,176,0.04)'">
                                    <div>
                                        <p class="mb-1 fw-medium small" style="color: #4a4540;" th:text="${noti.title}">알림 제목</p>
                                        <p class="mb-0 text-muted" style="font-size: 0.8rem;" th:text="${noti.message}">알림 내용</p>
                                    </div>
                                    <span class="text-muted flex-shrink-0 ms-3" style="font-size: 0.72rem;"
                                          th:text="${#temporals.format(noti.createdDateTime, 'MM.dd HH:mm')}">02.18</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- 새 게시글 알림 -->
                    <div th:if="${newBoardNotifications.size() > 0}" class="card border-0 shadow-sm rounded-3">
                        <div class="card-header border-0 bg-transparent px-4 pt-4 pb-2">
                            <h6 class="fw-bold mb-0">
                                <i class="fa-solid fa-clipboard-list me-2 section-icon"></i>
                                새 게시글
                            </h6>
                        </div>
                        <div class="card-body px-4 pt-0">
                            <div class="d-flex flex-column gap-2">
                                <a th:each="noti : ${newBoardNotifications}"
                                   th:href="@{'/notifications/' + ${noti.id} + '/read'}"
                                   class="d-flex justify-content-between align-items-start p-3 rounded-3 text-decoration-none"
                                   style="background: rgba(142,133,176,0.04); transition: all 0.15s;"
                                   onmouseover="this.style.background='rgba(142,133,176,0.08)'"
                                   onmouseout="this.style.background='rgba(142,133,176,0.04)'">
                                    <div>
                                        <p class="mb-1 fw-medium small" style="color: #4a4540;" th:text="${noti.title}">알림 제목</p>
                                        <p class="mb-0 text-muted" style="font-size: 0.8rem;" th:text="${noti.message}">알림 내용</p>
                                    </div>
                                    <span class="text-muted flex-shrink-0 ms-3" style="font-size: 0.72rem;"
                                          th:text="${#temporals.format(noti.createdDateTime, 'MM.dd HH:mm')}">02.18</span>
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments.html :: footer}"></div>
</body>
</html>
