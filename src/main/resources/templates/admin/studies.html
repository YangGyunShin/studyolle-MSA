<!-- admin/studies.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments.html :: head"></head>
<body>
<nav th:replace="fragments.html :: main-nav"></nav>

<div class="container-fluid px-0">
  <div class="row g-0 admin-layout">
    <div th:replace="admin/layout.html :: admin-sidebar(currentMenu='studies')"></div>

    <main class="col admin-main">
      <div class="admin-content-wrap">

        <!-- 페이지 헤더 -->
        <div class="admin-page-header">
          <div>
            <h4 class="admin-page-title">
              <i class="fa-solid fa-book-open me-2"></i>스터디 관리
            </h4>
            <p class="admin-page-sub">전체 스터디를 검색하고 관리합니다.</p>
          </div>
        </div>

        <!-- 알림 메시지 -->
        <div th:if="${message}" class="alert alert-success alert-dismissible border-0 rounded-3 mb-4" role="alert">
          <i class="fa-solid fa-circle-check me-2"></i>
          <span th:text="${message}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 검색 바 -->
        <div class="admin-search-bar">
          <form th:action="@{/admin/studies}" method="get" class="d-flex gap-2 w-100 m-0">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control form-control-sm"
                   placeholder="스터디 이름 또는 경로로 검색"
                   style="max-width: 320px;">
            <button type="submit" class="btn btn-sm btn-primary rounded-pill px-3">
              <i class="fa-solid fa-magnifying-glass me-1"></i>검색
            </button>
            <a th:if="${!#strings.isEmpty(keyword)}" th:href="@{/admin/studies}"
               class="btn btn-sm btn-outline-secondary rounded-pill px-3">
              초기화
            </a>
          </form>
          <span class="ms-auto text-muted small text-nowrap">
            총 <strong th:text="${studyPage?.totalElements ?: 0}">0</strong>개
          </span>
        </div>

        <!-- 스터디 테이블 -->
        <div class="admin-card">
          <div class="admin-card-body p-0">
            <div th:if="${studyPage == null or studyPage.isEmpty()}" class="admin-empty-state">
              <i class="fa-solid fa-book-open fa-2x mb-2"></i>
              <p class="mb-0">검색 결과가 없습니다.</p>
            </div>
            <table th:if="${studyPage != null and !studyPage.isEmpty()}" class="admin-table">
              <thead>
                <tr>
                  <th>스터디명</th>
                  <th>경로</th>
                  <th>상태</th>
                  <th>멤버</th>
                  <th>개설일</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="study : ${studyPage.content}">
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <!-- 배너 이미지 or 기본 아이콘 -->
                      <div class="admin-avatar"
                           th:style="${study.useBanner and !#strings.isEmpty(study.image)} ? 'background-image:url(' + ${study.image} + ');' : 'background:#f0ede8;color:#9e9689;'">
                        <i th:if="${!study.useBanner or #strings.isEmpty(study.image)}"
                           class="fa-solid fa-book-open" style="font-size:0.75rem;"></i>
                      </div>
                      <div>
                        <a th:href="@{'/study/' + ${study.path}}"
                           th:text="${study.title}"
                           class="text-decoration-none fw-medium" style="color:#4a4540;" target="_blank">
                          스터디명
                        </a>
                        <div th:if="${!#strings.isEmpty(study.shortDescription)}"
                             class="text-muted mt-0"
                             style="font-size:0.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px;"
                             th:text="${study.shortDescription}">
                        </div>
                      </div>
                    </div>
                  </td>
                  <td class="text-muted small" th:text="${study.path}">path</td>
                  <td>
                    <span th:if="${study.closed}" class="badge admin-badge-danger">종료됨</span>
                    <span th:if="${!study.closed and study.published}" class="badge admin-badge-success">공개</span>
                    <span th:if="${!study.closed and !study.published}" class="badge admin-badge-muted">비공개</span>
                  </td>
                  <td class="text-muted small" th:text="${#lists.size(study.members)} + '명'">0명</td>
                  <td class="text-muted small"
                      th:text="${study.publishedDateTime != null} ? ${#temporals.format(study.publishedDateTime, 'yyyy-MM-dd')} : '-'">
                  </td>
                  <td>
                    <form th:if="${!study.closed}"
                          th:action="@{'/admin/studies/' + ${study.id} + '/close'}"
                          method="post"
                          class="d-inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <button type="submit"
                              class="btn btn-xs rounded"
                              style="background:rgba(196,145,126,0.12);color:#8a5b48;border:1px solid rgba(196,145,126,0.3);font-size:0.75rem;padding:0.2rem 0.55rem;"
                              onclick="return confirm('스터디를 강제 종료하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                        <i class="fa-solid fa-ban me-1"></i>강제 종료
                      </button>
                    </form>
                    <span th:if="${study.closed}" class="text-muted small">-</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 페이지네이션 -->
        <div th:if="${studyPage != null and studyPage.totalPages > 1}"
             class="d-flex justify-content-center mt-3">
          <nav>
            <ul class="pagination pagination-sm">
              <li class="page-item" th:classappend="${studyPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/studies(keyword=${keyword}, page=${studyPage.number - 1})}">
                  <i class="fa-solid fa-chevron-left"></i>
                </a>
              </li>
              <li th:each="i : ${#numbers.sequence(0, studyPage.totalPages - 1)}"
                  class="page-item" th:classappend="${i == studyPage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/studies(keyword=${keyword}, page=${i})}"
                   th:text="${i + 1}">1</a>
              </li>
              <li class="page-item" th:classappend="${studyPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/studies(keyword=${keyword}, page=${studyPage.number + 1})}">
                  <i class="fa-solid fa-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>

      </div>
    </main>
  </div>
</div>

<div th:replace="admin/layout.html :: admin-style"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
