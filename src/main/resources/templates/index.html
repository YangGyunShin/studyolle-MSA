<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     StudyOlle 랜딩 페이지 (비로그인 사용자용)

     [디자인 원칙]
     - glassmorphism.css(로그인/회원가입)와 동일한 디자인 언어 사용
     - 히어로: 파스텔 그라디언트 배경 + 그라디언트 텍스트 (애니메이션 없음)
     - 기능 카드: 글래스 카드 (backdrop-blur, 반투명 배경)
     - 스터디 리스트: 기존 fragment 재사용
     - 애니메이션은 로그인/회원가입 전용, 여기서는 정적 스타일만 적용
     ============================================================ -->
<head th:replace="fragments.html :: head"></head>
<body class="page-main">

<!-- ✅ 글래스 네비게이션 바 -->
<div th:replace="fragments.html :: main-nav"></div>

<!-- ✅ 배경 장식 오브 (정적, 애니메이션 없음) -->
<!-- page-orb 제거 (v4 Warm Flat Minimal) -->

<!-- ✅ 히어로 섹션 (파스텔 그라디언트 배경) -->
<section class="hero-section">
    <div class="container py-5">
        <div class="row align-items-center justify-content-center text-center">
            <div class="col-lg-7 py-4">
                <h1 class="hero-title mb-3">
                    함께 성장하는 스터디,<br/>
                    <span class="highlight">스터디올래</span>
                </h1>
                <p class="hero-subtitle mb-4">
                    관심 주제와 활동 지역 기반으로 나에게 맞는 스터디를 찾고,<br class="d-none d-md-block"/>
                    모임 일정 관리까지 한 곳에서 해결하세요.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a th:href="@{/sign-up}" class="btn btn-gradient-primary btn-lg rounded-pill px-4">
                        <i class="fa-solid fa-user-plus me-1"></i> 회원 가입
                    </a>
                    <a th:href="@{/login}" class="btn btn-glass-outline btn-lg rounded-pill px-4">
                        로그인
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ✅ 기능 소개 (글래스 카드) -->
<div class="container mt-5 mb-4">
    <div class="row g-4 justify-content-center">
        <div class="col-md-4">
            <div class="feature-card h-100">
                <div class="feature-icon icon-indigo">
                    <i class="fa-solid fa-tags"></i>
                </div>
                <h6 class="feature-title">관심 주제 매칭</h6>
                <p class="feature-desc">
                    태그 기반으로 나와 같은 관심사를 가진<br/>스터디를 추천받을 수 있어요
                </p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="feature-card h-100">
                <div class="feature-icon icon-rose">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h6 class="feature-title">지역 기반 검색</h6>
                <p class="feature-desc">
                    내 활동 지역 근처의 오프라인 스터디를<br/>쉽게 찾아 참여할 수 있어요
                </p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="feature-card h-100">
                <div class="feature-icon icon-emerald">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
                <h6 class="feature-title">모임 일정 관리</h6>
                <p class="feature-desc">
                    모임 생성부터 참석 관리까지<br/>스터디 운영을 한 곳에서 해결하세요
                </p>
            </div>
        </div>
    </div>
</div>

<!-- ✅ 최근 공개된 스터디 -->
<div class="container mb-5">
    <div class="mb-3 d-flex align-items-center">
        <h6 class="section-title mb-0">
            <i class="fa-solid fa-fire text-danger me-1"></i> 최근 공개된 스터디
        </h6>
    </div>

    <!-- 스터디가 있을 때 -->
    <div th:if="${!#lists.isEmpty(studyList)}">
        <div class="row justify-content-center">
            <div th:replace="fragments.html :: study-list (studyList=${studyList})"></div>
        </div>
    </div>

    <!-- 스터디가 없을 때 -->
    <div th:if="${#lists.isEmpty(studyList)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="empty-icon empty-icon-amber mx-auto">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <p class="text-muted fw-medium mb-1">아직 공개된 스터디가 없습니다</p>
            <p class="text-muted small mb-3">첫 번째 스터디를 만들어 보세요!</p>
            <a th:href="@{/sign-up}" class="btn btn-gradient-primary btn-sm rounded-pill px-4">
                <i class="fa-solid fa-user-plus me-1"></i> 가입하고 시작하기
            </a>
        </div>
    </div>
</div>

<!-- ✅ 푸터 및 날짜 변환 스크립트 -->
<div th:replace="fragments.html :: footer"></div>
<div th:replace="fragments.html :: date-time"></div>

</body>
</html>
