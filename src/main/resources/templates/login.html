<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StudyOlle 로그인</title>

    <!-- ✅ 웹 폰트: IBM Plex Sans KR + Gowun Batang + Pretendard -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">

    <!-- ✅ Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- ✅ 인증 페이지 스타일 (Warm Flat Minimal)
         외부 CSS로 분리 (Thymeleaf 응답 버퍼 오버플로우 방지) -->
    <link rel="stylesheet" th:href="@{/css/glassmorphism.css}">
</head>

<body class="glass-page">

    <!-- ✅ 밝은 애니메이션 배경 -->
    <div class="bg-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ✅ 홈 돌아가기 -->
    <a th:href="@{/}" class="back-link">
        <i class="bi bi-arrow-left"></i> 홈으로
    </a>

    <!-- ✅ 글래스모피즘 로그인 카드 -->
    <div class="glass-card">

        <div class="brand-label stagger-1">StudyOlle</div>
        <h1 class="page-title stagger-1">로그인</h1>

        <!-- ✅ 이메일 미인증 에러 메시지 (DisabledException → /login?disabled)
             SecurityConfig의 커스텀 AuthenticationFailureHandler가
             DisabledException 감지 시 ?disabled 파라미터로 리다이렉트 -->
        <div th:if="${param.disabled}" class="glass-alert-warn stagger-1">
            <p style="margin-bottom: 4px; font-weight: 600;">이메일 인증이 필요합니다.</p>
            <p style="margin: 0;">
                가입 시 입력한 이메일에서 인증 링크를 클릭해주세요.
                이메일 인증을 완료해야 로그인할 수 있습니다.
            </p>
        </div>

        <!-- ✅ 일반 로그인 실패 에러 메시지 (BadCredentialsException → /login?error) -->
        <div th:if="${param.error}" class="glass-alert stagger-1">
            <p style="margin-bottom: 4px;">이메일(또는 닉네임)과 패스워드가 정확하지 않습니다.</p>
            <p style="margin: 0;">
                확인 후 다시 입력하거나
                <a th:href="@{/find-password}">패스워드 찾기</a>를 이용하세요.
            </p>
        </div>

        <form class="needs-validation" th:action="@{/login}" method="post" novalidate>

            <!-- ✅ 이메일 또는 닉네임 -->
            <div class="form-group stagger-2">
                <label for="username">이메일 또는 닉네임</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="username" name="username"
                           placeholder="your@email.com" required
                           data-validate="username">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">가입할 때 사용한 이메일 또는 닉네임을 입력하세요</div>
            </div>

            <!-- ✅ 패스워드 -->
            <div class="form-group stagger-3">
                <label for="password">패스워드</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="password" name="password" required
                           data-validate="password">
                    <div class="check-icon"><i class="bi bi-check2"></i></div>
                </div>
                <div class="form-hint">
                    패스워드가 기억나지 않는다면
                    <a th:href="@{/email-login}">패스워드 없이 로그인하기</a>
                </div>
            </div>

            <!-- ✅ 로그인 유지 -->
            <label class="custom-check stagger-4">
                <input type="checkbox" id="rememberMe" name="remember-me" checked>
                <span>로그인 유지</span>
            </label>

            <!-- ✅ 로그인 버튼 -->
            <div class="stagger-5">
                <button type="submit" class="btn-glass btn-login">로그인</button>
            </div>

            <!-- ✅ 회원가입 안내 -->
            <div class="signup-link stagger-6">
                스터디올래에 처음 오셨나요?
                <a th:href="@{/sign-up}">계정을 먼저 만드세요</a>
            </div>

        </form>
    </div>

    <!-- ✅ 하단 브랜드 -->
    <div class="footer-area">
        <span class="brand-name">&copy; 2025 StudyOlle</span>
    </div>

    <!-- ✅ Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ 실시간 유효성 검사 + 체크 아이콘 -->
    <script th:src="@{/js/glass-validation.js}"></script>

</body>
</html>
