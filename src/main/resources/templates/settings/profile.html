<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments.html :: head"></head>
<body>

<!-- ✅ 네비가이션 -->
<div th:replace="fragments.html :: main-nav"></div>

<!-- ✅ 프로필 수정 컨테이너 -->
<div class="container mt-5">
  <div class="row justify-content-center">

    <!-- ✅ 좌측 설정 메뉴 -->
    <div class="col-md-3 mb-4">
      <div th:replace="fragments.html :: settings-menu(currentMenu='profile')"></div>
    </div>

    <!-- ✅ 우측: 프로필 수정 포맷 와 이미지 카드 -->
    <div class="col-md-9">
      <h2 class="fw-bold mb-4" th:text="${account.nickname} + ' 님의 프로필 수정'">당신의 프로필 수정</h2>

      <!-- ✅ 성공 메시지 -->
      <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <div class="row align-items-start">
        <!-- ✅ 프로필 수정 포맷 -->
        <div class="col-md-6">
          <form th:action="@{/settings/profile}" th:object="${profile}" method="post" class="bg-white p-4 shadow rounded needs-validation" novalidate>
            <div class="mb-3">
              <label for="bio" class="form-label">하는 소개</label>
              <input id="bio" type="text" th:field="*{bio}" class="form-control" required placeholder="간단한 소개를 주세요.">
              <div class="form-text">35자 이내로 입력하세요.</div>
              <div class="text-danger small" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></div>
            </div>

            <div class="mb-3">
              <label for="url" class="form-label">URL</label>
              <input id="url" type="url" th:field="*{url}" class="form-control" required placeholder="http://studyolle.com">
              <div class="form-text">자신을 나타내는 블록, 포트폴리오 등을 입력하세요.</div>
              <div class="text-danger small" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
            </div>

            <div class="mb-3">
              <label for="occupation" class="form-label">전문 목록</label>
              <input id="occupation" type="text" th:field="*{occupation}" class="form-control" required placeholder="예: 백어드 개발자">
              <div class="form-text">예: 개발자, 디자인어 등</div>
            </div>

            <div class="mb-4">
              <label for="location" class="form-label">행태 지역</label>
              <input id="location" type="text" th:field="*{location}" class="form-control" required placeholder="예: 서울, 부산">
              <div class="form-text">사는 곳이나 자주 행동하는 경지를 입력하세요.</div>
            </div>

            <input type="hidden" id="profileImage" th:field="*{profileImage}" />

            <div class="d-grid mb-4">
              <button type="submit" class="btn btn-primary btn-lg">프로필 저장</button>
            </div>
          </form>
        </div>

        <!-- ✅ 오른측: 프로필 이미지 -->
        <div class="col-md-6">
          <div class="card text-center">
            <div class="card-header">프로필 이미지</div>
            <div class="mt-3" id="current-profile-image">
              <svg th:if="${#strings.isEmpty(profile.profileImage)}" class="rounded" th:data-jdenticon-value="${account.nickname}" width="125" height="125"></svg>
              <img th:if="${!#strings.isEmpty(profile.profileImage)}" class="rounded" th:src="${profile.profileImage}" width="125" height="125" alt="프로필 이미지" />
            </div>
            <div id="new-profile-image" class="mt-3"></div>
            <div class="card-body">
              <input type="file" class="form-control mb-3" id="profile-image-file">
              <div id="new-profile-image-control" class="d-grid gap-2">
                <button class="btn btn-outline-primary" id="cut-button" type="button">자르기</button>
                <button class="btn btn-outline-success" id="confirm-button" type="button">확인</button>
                <button class="btn btn-outline-warning" id="reset-button" type="button">취소</button>
              </div>
              <div id="cropped-new-profile-image" class="mt-3"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ✅ 푸터 (jQuery, Bootstrap 등 기본 스크립트 로드) -->
<div th:replace="fragments.html :: footer"></div>

<!-- ✅ Cropper.js 의존 스크립트 (jQuery 로드 후 실행) -->
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-cropper@1.0.1/dist/jquery-cropper.min.js"></script>
<script th:replace="fragments.html :: form-validation"></script>

<!-- ✅ 프로필 이미지 자르기 -->
<script type="application/javascript">
  $(function () {
    let cropper = '';
    let $confirmBtn = $("#confirm-button");
    let $resetBtn = $("#reset-button");
    let $cutBtn = $("#cut-button");
    let $newProfileImage = $("#new-profile-image");
    let $currentProfileImage = $("#current-profile-image");
    let $resultImage = $("#cropped-new-profile-image");
    let $profileImage = $("#profileImage");

    $newProfileImage.hide();
    $cutBtn.hide();
    $resetBtn.hide();
    $confirmBtn.hide();

    $("#profile-image-file").change(function (e) {
      if (e.target.files.length === 1) {
        const reader = new FileReader();
        reader.onload = e => {
          if (e.target.result && e.target.result.startsWith("data:image")) {
            let img = document.createElement("img");
            img.id = 'new-profile';
            img.src = e.target.result;
            img.setAttribute('width', '100%');
            $newProfileImage.html(img).show();
            $currentProfileImage.hide();
            let $newImage = $(img);
            $newImage.cropper({aspectRatio: 1});
            cropper = $newImage.data('cropper');
            $cutBtn.show();
            $resetBtn.show();
            $confirmBtn.hide();
          } else {
            alert("이미지 파일을 선택하세요.");
          }
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    $resetBtn.click(function () {
      $currentProfileImage.show();
      $newProfileImage.hide();
      $resultImage.hide();
      $resetBtn.hide();
      $cutBtn.hide();
      $confirmBtn.hide();
      $profileImage.val('');
    });

    $cutBtn.click(function () {
      let dataUrl = cropper.getCroppedCanvas().toDataURL();
      if (dataUrl.length > 1000 * 1024) {
        alert("이미지 파일이 너무 큰데요. 최대 1MB 이하로 업로드해주세요.");
        return;
      }
      let newImage = document.createElement("img");
      newImage.id = "cropped-new-profile-image";
      newImage.src = dataUrl;
      newImage.width = 125;
      $resultImage.html(newImage).show();
      $confirmBtn.show();
      $confirmBtn.click(function () {
        $newProfileImage.html(newImage);
        $cutBtn.hide();
        $confirmBtn.hide();
        $profileImage.val(dataUrl);
      });
    });
  });
</script>

</body>
</html>
