<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments.html :: head"></head>
<body>

<!-- 네비게이션 바 -->
<nav th:replace="fragments.html :: main-nav"></nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <!-- 설정 메뉴 -->
    <div class="col-md-3 mb-4">
      <div th:replace="fragments.html :: settings-menu(currentMenu='notifications')"></div>
    </div>

    <!-- 알림 설정 폼 -->
    <div class="col-md-9">
      <h2 class="fw-bold mb-4">알림 설정</h2>

      <!-- 성공 메시지 -->
      <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${message}">완료</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <form th:action="@{/settings/notifications}" th:object="${notifications}" method="post"
            class="card border-0 shadow-sm p-4 needs-validation" novalidate>

        <!-- 📌 스터디 생성 알림 -->
        <div class="mb-4">
          <div class="alert alert-info mb-3">
            <strong>
              <a th:href="@{/settings/zones}">활동 지역</a>에
              <a th:href="@{/settings/tags}">관심 주제</a>의 스터디가 생겼을 때 알림 받기
            </strong>
          </div>
          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" th:field="*{studyCreatedByEmail}" id="studyCreatedByEmail">
            <label class="form-check-label" for="studyCreatedByEmail">이메일로 받기</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" th:field="*{studyCreatedByWeb}" id="studyCreatedByWeb">
            <label class="form-check-label" for="studyCreatedByWeb">웹으로 받기</label>
          </div>
        </div>

        <!-- 📌 스터디 참가 신청 결과 -->
        <div class="mb-4">
          <div class="alert alert-info mb-3">
            <strong>스터디 모임 참가 신청 결과</strong> 알림 받기
          </div>
          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" th:field="*{studyEnrollmentResultByEmail}" id="studyEnrollmentResultByEmail">
            <label class="form-check-label" for="studyEnrollmentResultByEmail">이메일로 받기</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" th:field="*{studyEnrollmentResultByWeb}" id="studyEnrollmentResultByWeb">
            <label class="form-check-label" for="studyEnrollmentResultByWeb">웹으로 받기</label>
          </div>
        </div>

        <!-- 📌 참여 중인 스터디 알림 -->
        <div class="mb-4">
          <div class="alert alert-info mb-3">
            <strong>참여 중인 스터디</strong> 알림 받기
          </div>
          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" th:field="*{studyUpdatedByEmail}" id="studyUpdatedByEmail">
            <label class="form-check-label" for="studyUpdatedByEmail">이메일로 받기</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" th:field="*{studyUpdatedByWeb}" id="studyUpdatedByWeb">
            <label class="form-check-label" for="studyUpdatedByWeb">웹으로 받기</label>
          </div>
        </div>

        <!-- 저장 버튼 -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">저장하기</button>
        </div>

      </form>
    </div>
  </div>
</div>

<!-- 푸터 -->
<div th:replace="fragments.html :: footer"></div>

<!-- 유효성 검사 -->
<script th:replace="fragments.html :: form-validation"></script>

</body>
</html>
