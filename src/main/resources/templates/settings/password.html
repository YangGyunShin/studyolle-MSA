<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments.html :: head"></head>
<body>

<!-- ✅ 내비게이션 -->
<nav th:replace="fragments.html :: main-nav"></nav>

<!-- ✅ 패스워드 변경 폼 -->
<div class="container py-5">
  <div class="row justify-content-center">
    <!-- 설정 메뉴 -->
    <div class="col-md-3 mb-4">
      <div th:replace="fragments.html :: settings-menu(currentMenu='password')"></div>
    </div>

    <!-- 패스워드 변경 본문 -->
    <div class="col-md-9">
      <h2 class="fw-bold mb-4">패스워드 변경</h2>

      <!-- 알림 메시지 -->
      <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i>
        <span th:text="${message}">메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <form th:action="@{/settings/password}" th:object="${passwordForm}" method="post"
            class="card border-0 shadow-sm p-4 needs-validation" novalidate>

        <!-- 새 비밀번호 -->
        <div class="mb-3">
          <label for="newPassword" class="form-label">새 패스워드</label>
          <div class="pw-wrapper" id="pw1-wrapper">
            <input type="password" id="newPassword" th:field="*{newPassword}"
                   class="form-control" required minlength="8" maxlength="50">
            <div class="pw-match-icon">
              <i class="bi bi-check-lg"></i>
            </div>
          </div>
          <div class="form-text">8자 이상 입력하세요.</div>
          <div class="invalid-feedback">새 패스워드를 입력하세요.</div>
          <div class="text-danger small" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <!-- 새 비밀번호 확인 -->
        <div class="mb-4">
          <label for="newPasswordConfirm" class="form-label">새 패스워드 확인</label>
          <div class="pw-wrapper" id="pw2-wrapper">
            <input type="password" id="newPasswordConfirm" th:field="*{newPasswordConfirm}"
                   class="form-control" required minlength="8" maxlength="50">
            <div class="pw-match-icon">
              <i class="bi bi-check-lg"></i>
            </div>
          </div>
          <div id="pw-match-msg" class="pw-match-text" style="display:none;"></div>
          <div class="form-text" id="pw-help-text">동일한 패스워드를 다시 입력하세요.</div>
          <div class="invalid-feedback">패스워드 확인이 필요합니다.</div>
          <div class="text-danger small" th:if="${#fields.hasErrors('newPasswordConfirm')}" th:errors="*{newPasswordConfirm}"></div>
        </div>

        <!-- 제출 버튼 -->
        <div class="d-grid">
          <button type="submit" id="pw-submit-btn" class="btn btn-primary btn-lg">패스워드 변경하기</button>
        </div>

      </form>
    </div>
  </div>
</div>

<!-- ✅ 푸터 -->
<div th:replace="fragments.html :: footer"></div>

<!-- ✅ 유효성 검사 -->
<script th:replace="fragments.html :: form-validation"></script>

<!-- ✅ 패스워드 일치 검사 (실시간) -->
<script>
(function() {
  const pw1 = document.getElementById('newPassword');
  const pw2 = document.getElementById('newPasswordConfirm');
  const wrap1 = document.getElementById('pw1-wrapper');
  const wrap2 = document.getElementById('pw2-wrapper');
  const msg = document.getElementById('pw-match-msg');
  const helpText = document.getElementById('pw-help-text');
  const icon1 = wrap1.querySelector('.pw-match-icon i');
  const icon2 = wrap2.querySelector('.pw-match-icon i');

  function check() {
    const v1 = pw1.value;
    const v2 = pw2.value;

    // 새 패스워드: 8자 이상이면 체크
    if (v1.length >= 8) {
      wrap1.classList.add('pw-match');
      wrap1.classList.remove('pw-mismatch');
      icon1.className = 'bi bi-check-lg';
    } else if (v1.length > 0) {
      wrap1.classList.remove('pw-match');
      wrap1.classList.add('pw-mismatch');
      icon1.className = 'bi bi-x-lg';
    } else {
      wrap1.classList.remove('pw-match', 'pw-mismatch');
    }

    // 확인 필드 비어있으면 리셋
    if (!v2) {
      wrap2.classList.remove('pw-match', 'pw-mismatch');
      msg.style.display = 'none';
      helpText.style.display = '';
      return;
    }

    helpText.style.display = 'none';
    msg.style.display = '';

    if (v1 === v2 && v1.length >= 8) {
      wrap2.classList.add('pw-match');
      wrap2.classList.remove('pw-mismatch');
      icon2.className = 'bi bi-check-lg';
      msg.textContent = '✓ 패스워드가 일치합니다';
      msg.className = 'pw-match-text text-success';
    } else {
      wrap2.classList.add('pw-mismatch');
      wrap2.classList.remove('pw-match');
      icon2.className = 'bi bi-x-lg';
      msg.textContent = '✗ 패스워드가 일치하지 않습니다';
      msg.className = 'pw-match-text text-danger';
    }
  }

  pw1.addEventListener('input', check);
  pw2.addEventListener('input', check);
})();
</script>

</body>
</html>
